<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>与邻居的乡间生活日记！ - GalGame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-zinc-950 text-white overflow-hidden">
    <!-- TITLE SCREEN -->
    <div id="title-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center" 
         style="background-image: url('galgame_assets/images/title/title.png'); background-size: cover; background-position: center;">
        <div class="absolute inset-0 bg-gradient-to-b from-black/70 via-black/55 to-black/75"></div>
        <div class="relative z-10 text-center px-6 max-w-3xl">
            <div class="mb-6"><i class="fas fa-leaf text-6xl text-[#f9a8d4] mb-2 drop-shadow-[0_0_20px_#f9a8d4]"></i></div>
            <h1 class="title-font text-6xl md:text-7xl font-bold tracking-[4px] gal-title mb-1">与邻居的<br>乡间生活日记！</h1>
            <p class="text-xl text-[#f9a8d4]/90 tracking-[2.5px] font-light mb-8">Countryside Diary with Sakura</p>
            
            <div class="flex flex-col gap-3.5 items-center w-full max-w-[280px] mx-auto">
                <button onclick="startNewGame(1)" class="menu-btn w-full flex items-center justify-center gap-4 bg-white/10 hover:bg-white/15 border border-white/30 hover:border-[#f9a8d4] px-9 py-4 rounded-3xl text-xl font-medium backdrop-blur-xl">
                    <i class="fas fa-play text-[#f9a8d4]"></i><span>开始第一章</span>
                </button>
                <button onclick="continueGame()" class="menu-btn w-full flex items-center justify-center gap-4 bg-white/10 hover:bg-white/15 border border-white/30 hover:border-[#f9a8d4] px-9 py-4 rounded-3xl text-xl font-medium backdrop-blur-xl">
                    <i class="fas fa-redo text-[#f9a8d4]"></i><span>继续游戏</span>
                </button>
                <div class="flex gap-3 w-full">
                    <button onclick="showSaveLoad()" class="menu-btn flex-1 flex items-center justify-center gap-3 bg-white/10 hover:bg-white/15 border border-white/30 hover:border-[#f9a8d4] px-6 py-3.5 rounded-3xl text-lg font-medium backdrop-blur-xl">
                        <i class="fas fa-save text-[#f9a8d4]"></i><span>存档管理</span>
                    </button>
                    <button onclick="showGallery()" class="menu-btn flex-1 flex items-center justify-center gap-3 bg-white/10 hover:bg-white/15 border border-white/30 hover:border-[#f9a8d4] px-6 py-3.5 rounded-3xl text-lg font-medium backdrop-blur-xl">
                        <i class="fas fa-images text-[#f9a8d4]"></i><span>画廊</span>
                    </button>
                </div>
                <button onclick="showSettings()" class="menu-btn w-full flex items-center justify-center gap-3 bg-white/10 hover:bg-white/15 border border-white/30 hover:border-[#f9a8d4] px-6 py-3.5 rounded-3xl text-lg font-medium backdrop-blur-xl">
                    <i class="fas fa-cog text-[#f9a8d4]"></i><span>设置</span>
                </button>
            </div>
        </div>
        <div id="sakura-container" class="absolute inset-0 pointer-events-none z-20"></div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="hidden fixed inset-0 z-40 flex flex-col bg-black">
        <div id="bg-layer" class="absolute inset-0 bg-cover bg-center transition-all duration-1000" 
             style="background-image: url('galgame_assets/images/background/村子主街道-樱花大道.jpg')">
            <div class="absolute inset-0 bg-gradient-to-b from-black/30 via-transparent to-black/70"></div>
        </div>
        
        <div id="character-layer" class="character-layer absolute z-30 hidden"
             style="background-repeat: no-repeat;"></div>
        
        <div id="dialogue-container" class="absolute bottom-0 left-0 right-0 z-40 px-5 pb-5 pointer-events-auto">
            <div onclick="advanceDialogue()" class="dialogue-box mx-auto max-w-[960px] rounded-3xl p-6 cursor-pointer select-none shadow-2xl">
                <div class="flex items-center gap-3 mb-2.5">
                    <div id="speaker-name" class="px-4 py-1 text-xl font-bold tracking-wide rounded-2xl border border-white/20 bg-black/50 inline-block min-w-[92px] text-center"></div>
                    <div class="flex-1 h-px bg-gradient-to-r from-white/30 to-transparent"></div>
                </div>
                <div id="dialogue-text" class="vn-text min-h-[88px] text-[17px] leading-relaxed text-zinc-100 pr-2"></div>
                <div class="flex justify-end mt-1">
                    <div id="next-indicator" class="text-[#f9a8d4] text-xs flex items-center gap-1.5 opacity-60">
                        <span>点击继续</span> <i class="fas fa-chevron-down text-xs animate-bounce"></i>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Quick Menu -->
        <div class="absolute bottom-4 right-4 z-50 flex items-center gap-1.5 bg-black/80 backdrop-blur-2xl border border-white/10 rounded-3xl px-1.5 py-1.5 shadow-xl">
            <button onclick="toggleAuto()" id="btn-auto" class="quick-btn px-3 py-2 text-zinc-300 hover:text-white rounded-2xl hover:bg-white/10 w-[50px]">
                <i class="fas fa-play-circle"></i><span class="text-[9px] font-medium mt-px">自动</span>
            </button>
            <button onclick="toggleSkip()" id="btn-skip" class="quick-btn px-3 py-2 text-zinc-300 hover:text-white rounded-2xl hover:bg-white/10 w-[50px]">
                <i class="fas fa-forward"></i><span class="text-[9px] font-medium mt-px">快进</span>
            </button>
            <div class="w-px h-7 bg-white/20 mx-0.5"></div>
            <button onclick="showSaveLoad()" class="quick-btn px-3 py-2 text-zinc-300 hover:text-white rounded-2xl hover:bg-white/10 w-[70px]">
                <i class="fas fa-save"></i><span class="text-[9px] font-medium mt-px">存档管理</span>
            </button>
            <div class="w-px h-7 bg-white/20 mx-0.5"></div>
            <button onclick="showGallery()" class="quick-btn px-3 py-2 text-zinc-300 hover:text-white rounded-2xl hover:bg-white/10 w-[50px]">
                <i class="fas fa-images"></i><span class="text-[9px] font-medium mt-px">画廊</span>
            </button>
            <button onclick="showSettings()" class="quick-btn px-3 py-2 text-zinc-300 hover:text-white rounded-2xl hover:bg-white/10 w-[50px]">
                <i class="fas fa-cog"></i><span class="text-[9px] font-medium mt-px">设置</span>
            </button>
            <button onclick="returnToTitle()" class="quick-btn px-3 py-2 text-zinc-400 hover:text-red-400 rounded-2xl hover:bg-white/10 w-[50px]">
                <i class="fas fa-sign-out-alt"></i><span class="text-[9px] font-medium mt-px">标题</span>
            </button>
        </div>
        
        <div class="absolute top-4 left-4 z-50 flex items-center gap-2 text-xs bg-black/70 px-3 py-1 rounded-full border border-white/10">
            <i class="fas fa-book text-[#f9a8d4]"></i>
            <span id="progress-text" class="font-mono text-zinc-400">01 / 19</span>
        </div>
        
        <audio id="bgm-audio" src="galgame_assets/audio/the_meadow_path.mp3" loop preload="auto"></audio>
    </div>

    <!-- MODALS (简化版，完整功能已实现) -->
    <div id="saveload-modal" onclick="if (event.target.id === 'saveload-modal') hideSaveLoad()" class="hidden fixed inset-0 z-[65] bg-black/90 flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" class="modal bg-zinc-900 border border-zinc-700 rounded-3xl w-full max-w-md shadow-2xl">
            <div class="px-6 py-4 border-b border-zinc-700 flex items-center justify-between">
                <h3 class="text-2xl font-semibold flex items-center gap-3"><i class="fas fa-save text-[#f9a8d4]"></i> <span>存档管理</span></h3>
                <button onclick="hideSaveLoad()" class="text-3xl text-zinc-400 hover:text-white">&times;</button>
            </div>
            <div class="p-6 space-y-4" id="saveload-slots"></div>
        </div>
    </div>

    <div id="gallery-modal" onclick="if (event.target.id === 'gallery-modal') hideGallery()" class="hidden fixed inset-0 z-[60] bg-black/90 flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" class="modal bg-zinc-900 border border-zinc-700 rounded-3xl w-full max-w-5xl max-h-[88vh] flex flex-col shadow-2xl">
            <div class="px-8 py-5 border-b border-zinc-700 flex items-center justify-between">
                <div><h3 class="text-3xl font-semibold">画廊 / CG Gallery</h3><p class="text-sm text-zinc-400">第一章 + 第二章已解锁</p></div>
                <button onclick="hideGallery()" class="text-4xl leading-none text-zinc-400 hover:text-white">&times;</button>
            </div>
            <div class="flex-1 overflow-auto p-8"><div id="gallery-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5"></div></div>
        </div>
    </div>

    <div id="diary-screen" onclick="if (event.target.id === 'diary-screen') returnToTitleFromEnd()" class="hidden fixed inset-0 z-[55] bg-black/95 flex items-center justify-center p-6"></div>

    <!-- CG Viewer Modal -->
    <div id="cg-viewer" onclick="if (event.target.id === 'cg-viewer') hideCGViewer()" class="hidden fixed inset-0 z-[70] bg-black/95 flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" class="modal bg-zinc-900 border border-zinc-700 rounded-3xl max-w-3xl w-full shadow-2xl overflow-hidden">
            <div class="relative">
                <img id="cg-image" class="w-full max-h-[70vh] object-contain bg-black" alt="CG">
                <button onclick="hideCGViewer()" class="absolute top-4 right-4 text-4xl text-white/80 hover:text-white">&times;</button>
            </div>
            <div class="p-6">
                <div id="cg-title" class="text-2xl font-semibold mb-2"></div>
                <div id="cg-desc" class="text-zinc-400"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 z-[80] bg-zinc-800 border border-[#f9a8d4]/50 px-6 py-3 rounded-2xl shadow-xl flex items-center gap-3 text-sm">
        <i class="fas fa-check-circle text-[#f9a8d4]"></i><span id="toast-text"></span>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" onclick="if (event.target.id === 'settings-modal') hideSettings()" class="hidden fixed inset-0 z-[65] bg-black/90 flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" class="modal bg-zinc-900 border border-zinc-700 rounded-3xl w-full max-w-md shadow-2xl">
            <div class="px-6 py-4 border-b border-zinc-700 flex items-center justify-between">
                <h3 class="text-2xl font-semibold flex items-center gap-3"><i class="fas fa-cog text-[#f9a8d4]"></i> <span>游戏设置</span></h3>
                <button onclick="hideSettings()" class="text-3xl text-zinc-400 hover:text-white">&times;</button>
            </div>
            <div class="p-6 space-y-6">
                <div>
                    <div class="flex justify-between text-sm mb-1.5">
                        <span>文字显示速度</span>
                        <span id="speed-value" class="font-mono text-[#f9a8d4]">45ms</span>
                    </div>
                    <input type="range" id="speed-slider" min="10" max="120" step="5" class="w-full accent-[#f9a8d4]">
                </div>
                <div>
                    <div class="flex justify-between text-sm mb-1.5">
                        <span>自动播放间隔</span>
                        <span id="auto-value" class="font-mono text-[#f9a8d4]">1.6s</span>
                    </div>
                    <input type="range" id="auto-slider" min="600" max="4000" step="200" class="w-full accent-[#f9a8d4]">
                </div>
                <div>
                    <div class="flex justify-between text-sm mb-1.5">
                        <span>BGM 音量</span>
                        <span id="volume-value" class="font-mono text-[#f9a8d4]">65%</span>
                    </div>
                    <input type="range" id="volume-slider" min="0" max="100" step="5" class="w-full accent-[#f9a8d4]" oninput="updateVolume(this.value)">
                </div>
            </div>
            <div class="px-6 py-4 border-t border-zinc-700 flex gap-3">
                <button onclick="resetSettings()" class="flex-1 py-2.5 rounded-2xl border border-zinc-600 hover:bg-zinc-800 text-sm">恢复默认</button>
                <button onclick="saveSettings()" class="flex-1 py-2.5 rounded-2xl bg-[#f9a8d4] text-black font-medium text-sm">保存设置</button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="js/config.js"></script>
    <script src="js/story.js"></script>
    <script src="js/engine.js"></script>
</body>
</html>
