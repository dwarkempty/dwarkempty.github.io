<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>抽卡养成大冒险</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .card-r { border-color: #3b82f6; box-shadow: 0 0 15px #3b82f6; }
    .card-sr { border-color: #a855f7; box-shadow: 0 0 15px #a855f7; }
    .card-ssr { border-color: #eab308; box-shadow: 0 0 15px #eab308; }
    .card-ur { 
      border-color: #ec4899; 
      box-shadow: 0 0 12px #ec4899, 0 0 24px #8b5cf6, 0 0 36px #22d3ee;
      animation: rainbow-glow 2.5s linear infinite;
    }
    @keyframes rainbow-glow {
      0%   { box-shadow: 0 0 12px #ec4899, 0 0 24px #8b5cf6; }
      33%  { box-shadow: 0 0 12px #8b5cf6, 0 0 24px #22d3ee; }
      66%  { box-shadow: 0 0 12px #22d3ee, 0 0 24px #eab308; }
      100% { box-shadow: 0 0 12px #ec4899, 0 0 24px #8b5cf6; }
    }
    .rarity-r { background: #3b82f6; }
    .rarity-sr { background: #a855f7; }
    .rarity-ssr { background: #eab308; }
    .rarity-ur { 
      background: linear-gradient(90deg, #ec4899, #8b5cf6, #22d3ee, #eab308);
      background-size: 300% 300%;
      animation: gradient-shift 3s ease infinite;
    }
    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .character-img {
      height: 220px;
      object-fit: contain;
      filter: drop-shadow(0 15px 20px rgba(0,0,0,0.7));
    }
    .draw-card {
      animation: drawPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
    }
    @keyframes drawPop {
      0% { transform: scale(0.3) rotate(-12deg); opacity: 0; }
      70% { transform: scale(1.15) rotate(8deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .draw-shine { animation: shine 1.8s ease infinite; }
    @keyframes shine {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.6); }
      100% { filter: brightness(1); }
    }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div class="max-w-6xl mx-auto p-4">
    <!-- 头部 -->
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold flex items-center gap-3">
        <i class="fas fa-dragon text-orange-400"></i> 抽卡养成大冒险
      </h1>
      <div class="flex items-center gap-2 bg-gray-900 px-6 py-3 rounded-2xl text-xl">
        <i class="fas fa-gem text-cyan-400"></i>
        <span id="diamonds" class="font-bold">1000</span>
      </div>
    </div>

    <!-- Tab 导航 -->
    <div class="flex gap-2 bg-gray-900 p-2 rounded-3xl mb-8 w-fit mx-auto">
      <button onclick="switchTab(0)" id="tab0" class="tab-btn active px-8 py-3 rounded-2xl font-medium">🃏 抽卡</button>
      <button onclick="switchTab(1)" id="tab1" class="tab-btn px-8 py-3 rounded-2xl font-medium">🏠 养成</button>
      <button onclick="switchTab(2)" id="tab2" class="tab-btn px-8 py-3 rounded-2xl font-medium">🔍 探索</button>
    </div>

    <!-- 抽卡界面 -->
    <div id="panel0" class="panel">
      <div class="text-center py-12">
        <h2 class="text-3xl font-bold mb-6">抽取角色！</h2>
        <div class="flex justify-center gap-6">
          <button onclick="drawCard(1)" class="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 px-10 py-6 rounded-3xl text-2xl font-bold shadow-xl transition">
            单抽 <span class="text-yellow-300">100钻石</span>
          </button>
          <button onclick="drawCard(10)" class="bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 px-10 py-6 rounded-3xl text-2xl font-bold shadow-xl transition">
            十连 <span class="text-yellow-300">900钻石</span>
          </button>
        </div>
        <p class="mt-8 text-gray-400">概率：R 60% • SR 25% • SSR 12% • UR 3%</p>
      </div>
    </div>

    <!-- 养成界面 -->
    <div id="panel1" class="panel hidden">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold flex items-center gap-2"><i class="fas fa-warehouse"></i> 我的仓库</h2>
        <button onclick="toggleDecomposeMode()" id="decomposeBtn"
          class="px-6 py-2 bg-red-600 hover:bg-red-700 rounded-2xl font-medium flex items-center gap-2">
          <i class="fas fa-recycle"></i> 分解角色
        </button>
      </div>

      <div id="decomposeBar" class="hidden bg-red-900/50 border border-red-500 rounded-3xl p-4 mb-6 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <span id="selectedCount" class="font-bold">已选 0 个</span>
          <span id="decomposeValue" class="text-yellow-300 font-bold">预计获得 0 钻石</span>
        </div>
        <div class="flex gap-3">
          <button onclick="selectAll()" class="px-5 py-2 bg-gray-700 hover:bg-gray-600 rounded-2xl text-sm">全选（最多100个）</button>
          <button onclick="decomposeSelected()" class="px-8 py-2 bg-red-600 hover:bg-red-700 rounded-2xl font-bold">确认分解</button>
          <button onclick="toggleDecomposeMode()" class="px-5 py-2 bg-gray-700 hover:bg-gray-600 rounded-2xl text-sm">取消</button>
        </div>
      </div>

      <div id="inventory" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </div>

    <!-- 探索界面 -->
    <div id="panel2" class="panel hidden text-center py-12">
      <h2 class="text-3xl font-bold mb-8">🔍 探索</h2>
      <button onclick="getResource()" class="bg-emerald-500 hover:bg-emerald-600 px-16 py-8 rounded-3xl text-3xl font-bold flex items-center gap-4 mx-auto">
        <i class="fas fa-compass"></i> 探索一次
      </button>
      <p class="mt-6 text-gray-400">每次可随机获得 200~300 钻石</p>
      <p id="resourceResult" class="mt-8 text-2xl font-bold text-yellow-400 min-h-[40px]"></p>
    </div>
  </div>

  <!-- 抽卡动画Modal -->
  <div id="drawModal" onclick="if(event.target.id==='drawModal')hideDrawModal()" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[9999]">
    <div class="max-w-5xl w-full mx-4 bg-gray-900 rounded-3xl p-8 relative">
      <div class="text-center mb-8">
        <h2 id="drawTitle" class="text-4xl font-bold text-yellow-300">🎉 抽卡结果</h2>
      </div>
      <div id="drawResults" class="flex flex-wrap justify-center gap-6 min-h-[420px]"></div>
      <div class="text-center mt-8">
        <button onclick="hideDrawModal()" class="px-12 py-4 bg-white text-black rounded-2xl font-bold text-xl hover:bg-yellow-300 transition">返回游戏</button>
      </div>
    </div>
  </div>

  <!-- 角色详情弹窗 -->
  <div id="modal" onclick="if(event.target===this)hideModal()" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[10000]">
    <div onclick="event.stopImmediatePropagation()" class="bg-gray-900 rounded-3xl max-w-md w-full mx-4 overflow-hidden">
      <div id="modalContent" class="p-6"></div>
    </div>
  </div>

  <script>
    // ==================== 角色数据 ====================
    const characterPool = [
      {id:1, name:"森林游侠·艾伦", enName:"Forest Ranger · Allen", rarity:"R", baseHP:125, baseATK:72, baseDEF:48, image:"images/Allen_Illustration.jpg"},
      {id:2, name:"火焰学徒·莎莉", enName:"Flame Apprentice · Sally", rarity:"R", baseHP:108, baseATK:88, baseDEF:38, image:"images/Sally_Illustration.jpg"},
      {id:3, name:"铁壁卫士·巴克", enName:"Ironclad Guardian · Buck", rarity:"R", baseHP:145, baseATK:62, baseDEF:72, image:"images/Buck_Illustration.jpg"},
      {id:4, name:"月影精灵·莉莉", enName:"Moonshadow Elf · Lily", rarity:"R", baseHP:115, baseATK:82, baseDEF:45, image:"images/Lily_Illustration.jpg"},
      {id:5, name:"疾风剑豪·凯尔", enName:"Gale Swordmaster · Kael", rarity:"SR", baseHP:158, baseATK:98, baseDEF:52, image:"images/Kael_Illustration.jpg"},
      {id:6, name:"自然召唤师·米娅", enName:"Natural Summoner · Mia", rarity:"SR", baseHP:132, baseATK:105, baseDEF:48, image:"images/Mia_Illustration.jpg"},
      {id:7, name:"雷鸣骑士·索雷", enName:"Thunder Knight · Sorey", rarity:"SR", baseHP:165, baseATK:90, baseDEF:58, image:"images/Sorey_Illustration.jpg"},
      {id:8, name:"暗夜刺客·影刃", enName:"Shadow Assassin · Shadowblade", rarity:"SR", baseHP:128, baseATK:118, baseDEF:50, image:"images/Shadowblade_Illustration.jpg"},
      {id:9, name:"星辰魔导师·塞尔维亚", enName:"Starlight Archmage · Sylvia", rarity:"SSR", baseHP:185, baseATK:82, baseDEF:78, image:"images/Sylvia_Illustration.jpg"},
      {id:10, name:"幻月弓神·阿蕾莎", enName:"Illusion Moon Archer Goddess · Alesha", rarity:"SSR", baseHP:172, baseATK:95, baseDEF:65, image:"images/Alesha_Illustration.jpg"},
      {id:11, name:"圣辉骑士王·加兰", enName:"Holy Radiance Knight King · Galan", rarity:"SSR", baseHP:198, baseATK:88, baseDEF:85, image:"images/Galan_Illustration.jpg"},
      {id:12, name:"凤凰圣女·菲妮克斯", enName:"Phoenix Saintess · Fenix", rarity:"SSR", baseHP:175, baseATK:110, baseDEF:70, image:"images/Phoenix_Illustration.jpg"},
      {id:13, name:"创世光辉·露娜薇尔", enName:"Genesis Radiance · Lunaviel", rarity:"UR", baseHP:230, baseATK:145, baseDEF:95, image:"images/Lunaviel_Illustration.jpg"},
      {id:14, name:"永恒时女·克罗诺", enName:"Eternal Time Maiden · Chrono", rarity:"UR", baseHP:210, baseATK:155, baseDEF:88, image:"images/Chrono_Illustration.jpg"},
      {id:15, name:"元素起源·埃尔温", enName:"Element Origin · Elwin", rarity:"UR", baseHP:205, baseATK:160, baseDEF:92, image:"images/Elwin_Illustration.jpg"}
    ];

    const rarityWeights = { R: 60, SR: 25, SSR: 12, UR: 3 };
    const decomposeValue = { R: 10, SR: 50, SSR: 200, UR: 1000 };

    let player = { diamonds: 1000, owned: [] };
    let decomposeMode = false;
    let selected = [];

    function saveGame() { localStorage.setItem("gachaGame", JSON.stringify(player)); }

    function loadGame() {
      const saved = localStorage.getItem("gachaGame");
      if (saved) {
        let data = JSON.parse(saved);
        // 修复旧存档：gold → diamonds
        if (data.gold !== undefined) {
          data.diamonds = data.gold;
          delete data.gold;
        }
        player = data;
        if (!player.diamonds || isNaN(player.diamonds)) player.diamonds = 1000;
      }
      document.getElementById("diamonds").textContent = player.diamonds;
      saveGame(); // 保存修复后的存档
    }

    function getRarityColor(r) {
      if (r === "UR") return "card-ur";
      if (r === "SSR") return "card-ssr";
      if (r === "SR") return "card-sr";
      return "card-r";
    }

    function drawOne() {
      const total = Object.values(rarityWeights).reduce((a,b)=>a+b, 0);
      let rand = Math.random() * total;
      let sum = 0;
      for (let r in rarityWeights) {
        sum += rarityWeights[r];
        if (rand <= sum) {
          const candidates = characterPool.filter(c => c.rarity === r);
          return candidates[Math.floor(Math.random() * candidates.length)];
        }
      }
    }

    function drawCard(times) {
      const cost = times === 1 ? 100 : 900;
      if (player.diamonds < cost) return alert("钻石不够啦！去探索吧～");
      player.diamonds -= cost;
      document.getElementById("diamonds").textContent = player.diamonds;

      let results = [];
      for (let i = 0; i < times; i++) {
        const char = drawOne();
        player.owned.push({ id: Date.now() + i, charId: char.id, level: 1, stars: 0 });
        results.push(char);
      }
      saveGame();
      showDrawAnimation(results);
      if (!document.getElementById("panel1").classList.contains("hidden")) renderInventory();
    }

    function showDrawAnimation(results) {
      const modal = document.getElementById("drawModal");
      const container = document.getElementById("drawResults");
      const title = document.getElementById("drawTitle");
      container.innerHTML = "";
      modal.classList.remove("hidden");
      title.textContent = results.length === 1 ? "🎉 单抽结果" : "🎉 十连结果";

      results.forEach((char, i) => {
        const delay = results.length === 1 ? 0 : i * 80;
        const div = document.createElement("div");
        div.style.animationDelay = delay + "ms";
        div.className = `draw-card bg-gray-800 rounded-3xl p-4 border-4 ${getRarityColor(char.rarity)} text-center w-52`;
        div.innerHTML = `
          <img src="${char.image}" class="character-img w-full rounded-2xl mx-auto draw-shine">
          <div class="rarity-${char.rarity.toLowerCase()} text-xs inline-block px-4 py-1 rounded-full text-white font-bold mt-4">${char.rarity}</div>
          <div class="text-xl font-bold mt-2">${char.name}</div>
          <div class="text-xs text-gray-400">${char.enName}</div>
        `;
        container.appendChild(div);
      });
    }

    function hideDrawModal() {
      document.getElementById("drawModal").classList.add("hidden");
    }

    function renderInventory() {
      const container = document.getElementById("inventory");
      container.innerHTML = "";
      selected = [];

      player.owned.forEach((item, index) => {
        const char = characterPool.find(c => c.id === item.charId);
        const statMult = 1 + (item.level - 1) * 0.08 + item.stars * 0.25;
        const hp = Math.floor(char.baseHP * statMult);
        const atk = Math.floor(char.baseATK * statMult);
        const def = Math.floor(char.baseDEF * statMult);

        const div = document.createElement("div");
        div.className = `relative bg-gray-800 rounded-3xl p-4 cursor-pointer border-4 ${getRarityColor(char.rarity)} hover:scale-105 transition`;

        let html = `
          <img src="${char.image}" class="character-img w-full rounded-2xl mb-3">
          <div class="text-center">
            <div class="rarity-${char.rarity.toLowerCase()} text-xs inline-block px-4 py-1 rounded-full text-white font-bold mb-2">${char.rarity}</div>
            <div class="text-xl font-bold mb-1">${char.name}</div>
            <div class="text-xs text-gray-400">${char.enName}</div>
            <div class="text-sm text-gray-400 mt-2">Lv.${item.level} ★${item.stars}</div>
            <div class="flex justify-between text-sm mt-4">
              <div>❤️ ${hp}</div>
              <div>⚔️ ${atk}</div>
              <div>🛡️ ${def}</div>
            </div>
          </div>
        `;

        if (decomposeMode) {
          html = `<input type="checkbox" class="absolute top-4 right-4 w-6 h-6 accent-red-500 z-10" data-index="${index}" onchange="toggleSelect(this)">` + html;
        }

        div.innerHTML = html;
        if (!decomposeMode) div.onclick = () => showCharacterDetail(index, char, item);
        container.appendChild(div);
      });

      if (player.owned.length === 0) {
        container.innerHTML = `<p class="text-center text-gray-500 py-12 col-span-full">还没有角色，快去抽卡吧！</p>`;
      }
    }

    function toggleDecomposeMode() {
      decomposeMode = !decomposeMode;
      const btn = document.getElementById("decomposeBtn");
      btn.innerHTML = decomposeMode ? `<i class="fas fa-times"></i> 退出分解` : `<i class="fas fa-recycle"></i> 分解角色`;
      document.getElementById("decomposeBar").classList.toggle("hidden", !decomposeMode);
      renderInventory();
    }

    function toggleSelect(checkbox) {
      const index = parseInt(checkbox.dataset.index);
      if (checkbox.checked) {
        if (!selected.includes(index)) selected.push(index);
      } else {
        selected = selected.filter(i => i !== index);
      }
      updateDecomposeBar();
    }

    function updateDecomposeBar() {
      const count = selected.length;
      let value = 0;
      selected.forEach(i => {
        const item = player.owned[i];
        const char = characterPool.find(c => c.id === item.charId);
        value += decomposeValue[char.rarity];
      });
      document.getElementById("selectedCount").textContent = `已选 ${count} 个`;
      document.getElementById("decomposeValue").textContent = `预计获得 ${value} 钻石`;
    }

    function selectAll() {
      selected = [];
      const checkboxes = document.querySelectorAll('#inventory input[type="checkbox"]');
      const maxSelect = Math.min(checkboxes.length, 100);
      for (let i = 0; i < maxSelect; i++) {
        checkboxes[i].checked = true;
        selected.push(parseInt(checkboxes[i].dataset.index));
      }
      updateDecomposeBar();
      if (checkboxes.length > 100) alert(`已自动选中前100个角色（一次最多分解100个）`);
    }

    function decomposeSelected() {
      if (selected.length === 0) return;
      if (selected.length > 100) return alert("一次最多分解100个角色！");
      
      let total = 0;
      selected.sort((a, b) => b - a).forEach(i => {
        const item = player.owned[i];
        const char = characterPool.find(c => c.id === item.charId);
        total += decomposeValue[char.rarity];
        player.owned.splice(i, 1);
      });

      player.diamonds += total;
      document.getElementById("diamonds").textContent = player.diamonds;
      saveGame();
      alert(`✅ 已分解 ${selected.length} 个角色，获得 ${total} 钻石！`);
      selected = [];
      decomposeMode = false;
      document.getElementById("decomposeBar").classList.add("hidden");
      renderInventory();
    }

    let currentIndex = null;
    function showCharacterDetail(index, char, item) {
      currentIndex = index;
      const statMult = 1 + (item.level - 1) * 0.08 + item.stars * 0.25;
      const hp = Math.floor(char.baseHP * statMult);
      const atk = Math.floor(char.baseATK * statMult);
      const def = Math.floor(char.baseDEF * statMult);
      const sameCount = player.owned.filter(o => o.charId === item.charId).length;
      const costLevel = item.level * 30;

      document.getElementById("modalContent").innerHTML = `
        <div class="text-center">
          <img src="${char.image}" class="character-img mx-auto rounded-3xl mb-4">
          <div class="rarity-${char.rarity.toLowerCase()} text-xs inline-block px-6 py-2 rounded-full text-white font-bold">${char.rarity}</div>
          <h2 class="text-4xl font-bold my-3">${char.name}</h2>
          <div class="text-sm text-gray-400 mb-4">${char.enName}</div>
          <div class="text-xl text-gray-400">Lv.${item.level}　★${item.stars}/5　<span class="text-emerald-400">拥有 ${sameCount} 张</span></div>
          
          <div class="grid grid-cols-3 gap-6 my-8 text-xl">
            <div class="text-center"><div class="text-red-400">❤️ 血量</div><div class="font-bold">${hp}</div></div>
            <div class="text-center"><div class="text-orange-400">⚔️ 攻击</div><div class="font-bold">${atk}</div></div>
            <div class="text-center"><div class="text-blue-400">🛡️ 防御</div><div class="font-bold">${def}</div></div>
          </div>

          <div class="space-y-4">
            <button onclick="levelUp()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl text-xl font-bold flex justify-between items-center px-6">
              <span>升级（+8%属性）</span>
              <span class="text-yellow-300">${costLevel} 钻石</span>
            </button>
            <button onclick="starUp()" class="w-full ${item.stars >= 5 ? 'bg-gray-600 cursor-not-allowed' : 'bg-purple-600 hover:bg-purple-700'} py-4 rounded-2xl text-xl font-bold flex justify-between items-center px-6">
              <span>升星（+25%属性）</span>
              <span class="text-yellow-300">消耗 1 张相同角色</span>
            </button>
          </div>
          <button onclick="hideModal()" class="mt-6 text-gray-400">关闭</button>
        </div>
      `;
      document.getElementById("modal").classList.remove("hidden");
    }

    function hideModal() {
      document.getElementById("modal").classList.add("hidden");
      currentIndex = null;
      renderInventory();
    }

    function levelUp() {
      if (currentIndex === null) return;
      const item = player.owned[currentIndex];
      const cost = item.level * 30;
      if (player.diamonds < cost) return alert("钻石不够！");
      player.diamonds -= cost;
      item.level = Math.min(item.level + 1, 100);
      document.getElementById("diamonds").textContent = player.diamonds;
      saveGame();
      const char = characterPool.find(c => c.id === item.charId);
      showCharacterDetail(currentIndex, char, item);
    }

    function starUp() {
      if (currentIndex === null) return;
      const item = player.owned[currentIndex];
      if (item.stars >= 5) return alert("已经满星！");
      const duplicateIndex = player.owned.findIndex(o => o.charId === item.charId && o.id !== item.id);
      if (duplicateIndex === -1) return alert("没有多余的相同角色可以消耗！");
      player.owned.splice(duplicateIndex, 1);
      item.stars++;
      saveGame();
      const char = characterPool.find(c => c.id === item.charId);
      showCharacterDetail(currentIndex, char, item);
    }

    function getResource() {
      const amount = Math.floor(Math.random() * 101) + 200;
      player.diamonds += amount;
      document.getElementById("diamonds").textContent = player.diamonds;
      saveGame();
      const result = document.getElementById("resourceResult");
      result.innerHTML = `🎉 获得 <span class="text-4xl font-bold text-yellow-400">${amount}</span> 钻石！`;
      setTimeout(() => result.innerHTML = "", 3000);
    }

    function switchTab(n) {
      document.querySelectorAll(".panel").forEach(p => p.classList.add("hidden"));
      document.getElementById("panel" + n).classList.remove("hidden");
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active", "bg-white", "text-black"));
      document.getElementById("tab" + n).classList.add("active", "bg-white", "text-black");
      if (n === 1) {
        decomposeMode = false;
        document.getElementById("decomposeBar").classList.add("hidden");
        renderInventory();
      }
    }

    window.onload = () => {
      loadGame();
      switchTab(0);
    };
  </script>
</body>
</html>
