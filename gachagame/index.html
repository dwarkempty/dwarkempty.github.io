<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>抽卡养成大冒险</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-20">

<!-- 顶部资源栏（已包含初始化按钮） -->
<div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between border-b border-zinc-800">
  <div class="flex items-center gap-4">
    <button onclick="resetGame()" 
            class="px-5 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-bold rounded-2xl flex items-center gap-2 transition btn-hover">
      <i class="fas fa-sync-alt"></i> 初始化网页
    </button>

    <div class="flex items-center gap-8">
      <div class="flex items-center gap-2">
        <span class="text-3xl">⭐</span>
        <span id="yaoXing" class="text-3xl font-bold text-yellow-400">1000</span>
        <span class="text-xl font-medium">耀星</span>
      </div>
      <div class="flex items-center gap-2">
        <i class="fas fa-coins text-3xl text-yellow-500"></i>
        <span id="gold" class="text-3xl font-bold text-yellow-400">0</span>
        <span class="text-xl font-medium">金币</span>
      </div>
      <div class="flex items-center gap-2">
        <i class="fas fa-gem text-3xl text-purple-400"></i>
        <span id="reinforceStone" class="text-3xl font-bold text-purple-400">0</span>
        <span class="text-xl font-medium">强化石</span>
      </div>
    </div>
  </div>

  <button onclick="openConsolePrompt()" class="px-6 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center gap-2 text-sm">
    <i class="fas fa-terminal"></i> 控制台
  </button>
</div>

<!-- 导航栏 -->
  <div class="max-w-7xl mx-auto px-4 pt-6">
    <div class="flex justify-center gap-2 mt-6 border-b border-zinc-800 pb-4">
      <button onclick="switchTab(0)" id="tab0" class="tab-btn active px-8 py-3 rounded-3xl flex items-center gap-2 text-xl font-bold">🧙 抽卡</button>
      <button onclick="switchTab(1)" id="tab1" class="tab-btn px-8 py-3 rounded-3xl flex items-center gap-2 text-xl font-bold">🏠 养成</button>
      <button onclick="switchTab(2)" id="tab2" class="tab-btn px-8 py-3 rounded-3xl flex items-center gap-2 text-xl font-bold">🔍 探索</button>
      <button onclick="switchTab(3)" id="tab3" class="tab-btn px-8 py-3 rounded-3xl flex items-center gap-2 text-xl font-bold">📖 图鉴</button>
    </div>
  </div>

  <!-- Panel 0: 抽卡 -->
  <div id="panel0" class="panel max-w-7xl mx-auto px-4">
    <div class="flex justify-between items-center mt-8 mb-6">
      <div class="flex gap-6">
        <button onclick="setDrawPool('char')" id="poolCharBtn" class="active px-8 py-3 bg-zinc-900 hover:bg-zinc-800 rounded-3xl font-bold text-lg flex items-center gap-3">🧙 角色池</button>
        <button onclick="setDrawPool('weapon')" id="poolWeaponBtn" class="px-8 py-3 bg-zinc-900 hover:bg-zinc-800 rounded-3xl font-bold text-lg flex items-center gap-3">⚔️ 武器池</button>
      </div>
      <div class="text-right">
        <div id="poolTitle" class="text-3xl font-bold">角色池抽取</div>
        <div class="text-sm text-emerald-400">概率：R 60% • SR 25% • SSR 12% • UR 3%</div>
        <div class="text-xs text-amber-400 mt-1">保底：10抽必出SSR，80抽必出UR</div>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-6 max-w-md mx-auto">
          <button onclick="drawCard(1)" class="bg-gradient-to-br from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 py-8 rounded-3xl text-2xl font-bold flex flex-col items-center gap-2 transition btn-hover">
            单抽<br><span class="text-4xl">100 ⭐</span>
          </button>
          <button onclick="drawCard(10)" class="bg-gradient-to-br from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 py-8 rounded-3xl text-2xl font-bold flex flex-col items-center gap-2 transition btn-hover">
            十连<br><span class="text-4xl">900 ⭐</span>
          </button>
        </div>
      </div>

    <div class="mt-8 text-center">
      <button onclick="showRecordModal()" class="px-8 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-3xl text-lg flex items-center gap-3 mx-auto">
        📜 记录查询
      </button>
    </div>
  </div>

  <!-- Panel 1: 养成 -->
  <div id="panel1" class="panel hidden max-w-7xl mx-auto px-4">
    <div class="flex justify-between items-center mt-8 mb-6">
      <div class="flex gap-6">
        <button onclick="setInventoryTab(0)" class="inv-tab active px-8 py-3 bg-zinc-900 hover:bg-zinc-800 rounded-3xl font-bold text-lg">🧙 角色仓库</button>
        <button onclick="setInventoryTab(1)" class="inv-tab px-8 py-3 bg-zinc-900 hover:bg-zinc-800 rounded-3xl font-bold text-lg">⚔️ 武器仓库</button>
      </div>
      
      <div class="flex items-center gap-4">
        <select onchange="currentSort=this.value;renderInventory()" class="bg-zinc-900 px-6 py-3 rounded-3xl text-lg">
          <option value="rarity">排序：稀有度优先</option>
          <option value="stars">排序：星级优先</option>
          <option value="level">排序：等级优先</option>
        </select>
        <button onclick="toggleDecomposeMode()" id="decomposeBtn" class="px-8 py-3 bg-red-600 hover:bg-red-500 rounded-3xl font-bold flex items-center gap-2">
          <i class="fas fa-recycle"></i> 分解
        </button>
      </div>
    </div>

    <div id="inventory" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6"></div>

<!-- 分解栏 -->
    <div id="decomposeBar" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 bg-zinc-900 border border-red-500 rounded-3xl px-8 py-5 flex items-center gap-8 shadow-2xl z-50">
      <div class="flex items-center gap-6">
        <span id="selectedCount" class="text-xl font-bold">已选 0 个</span>
        <span id="decomposeValue" class="text-xl font-bold text-emerald-400">预计获得 0 钻石</span>
      </div>
      
      <select id="decomposeType" class="bg-zinc-800 px-4 py-3 rounded-3xl text-base">
        <option value="all">全部分解</option>
        <option value="r">仅R级及以下</option>
        <option value="sr">仅SR级及以下</option>
      </select>

      <div class="flex gap-4">
        <button onclick="selectAll()" class="px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-3xl text-sm">全选（最多500个）</button>
        <button onclick="decomposeSelected()" class="px-8 py-3 bg-red-600 hover:bg-red-500 rounded-3xl font-bold">确认分解</button>
        <button onclick="toggleDecomposeMode()" class="px-6 py-3 bg-zinc-700 hover:bg-zinc-600 rounded-3xl">取消</button>
      </div>
    </div>
  </div>

  <!-- Panel 2: 探索 -->
  <div id="panel2" class="panel hidden max-w-7xl mx-auto px-4">
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6 mt-8" id="explorationGrid"></div>
  </div>

  <!-- 抽卡结果 Modal -->
  <div id="drawModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999]">
    <div class="bg-zinc-900 rounded-3xl max-w-5xl w-full mx-4 p-8">
      <div id="drawTitle" class="text-4xl font-bold text-center mb-8"></div>
      <div id="drawResults" class="flex flex-wrap justify-center gap-6"></div>
      <div class="text-center mt-10">
        <button onclick="hideDrawModal()" class="px-12 py-6 bg-emerald-600 hover:bg-emerald-500 text-2xl font-bold rounded-3xl">返回游戏</button>
      </div>
    </div>
  </div>
  
  <!-- Panel 3: 图鉴 -->
  <div id="panel3" class="panel hidden max-w-7xl mx-auto px-4">
    <div class="flex justify-between items-center mt-8 mb-6">
      <h2 class="text-3xl font-bold">📖 冒险图鉴</h2>
      <div class="flex gap-2 mb-6 overflow-x-auto pb-2 album-tabs">
        <button onclick="setAlbumTab(0)" class="album-tab active flex-1 py-3 px-6 rounded-3xl font-bold text-lg flex items-center justify-center gap-2">
          🧙 角色图鉴
        </button>
        <button onclick="setAlbumTab(1)" class="album-tab flex-1 py-3 px-6 rounded-3xl font-bold text-lg flex items-center justify-center gap-2">
          ⚔️ 武器图鉴
        </button>
        <button onclick="setAlbumTab(2)" class="album-tab flex-1 py-3 px-6 rounded-3xl font-bold text-lg flex items-center justify-center gap-2 bg-gradient-to-r from-purple-500 to-violet-500 text-white">
          🌍 世界观详解
        </button>
      </div>
    </div>
    <div id="albumGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6"></div>
  </div>


  <!-- 模态框区域（修复后恢复） -->
  <div id="recordModal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[9999] hidden">
    <div class="bg-zinc-900 rounded-3xl p-8 max-w-lg w-full mx-4">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-3xl font-bold">📜 记录查询</h3>
        <button onclick="window.hideRecordModal()" class="text-4xl leading-none text-gray-400 hover:text-white">×</button>
      </div>
      <div class="flex gap-2 mb-6">
        <button onclick="window.setRecordTab(0)" class="record-tab active flex-1 py-3 rounded-2xl font-bold">角色记录</button>
        <button onclick="window.setRecordTab(1)" class="record-tab flex-1 py-3 rounded-2xl font-bold">武器记录</button>
      </div>
      <div id="recordContent"></div>
      <div class="flex gap-3 mt-6">
        <button onclick="window.exportSave()" class="flex-1 py-3 bg-zinc-700 hover:bg-zinc-600 rounded-2xl font-bold">导出存档</button>
        <label class="flex-1 py-3 bg-zinc-700 hover:bg-zinc-600 rounded-2xl font-bold text-center cursor-pointer">
          导入存档
          <input type="file" accept=".json" onchange="window.importSave(event)" class="hidden">
        </label>
      </div>
    </div>
  </div>

  <!-- 角色详情模态 -->
  <div id="characterDetailModal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-[99999] hidden">
    <div class="bg-zinc-900 rounded-3xl p-8 max-w-2xl w-full mx-4">
      <div id="characterDetailContent"></div>
      <button onclick="document.getElementById('characterDetailModal').classList.add('hidden')" class="mt-6 w-full py-3 bg-zinc-700 hover:bg-zinc-600 rounded-2xl font-bold">关闭</button>
    </div>
  </div>

  <!-- 武器详情模态 -->
  <div id="weaponDetailModal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-[99999] hidden">
    <div class="bg-zinc-900 rounded-3xl p-8 max-w-2xl w-full mx-4">
      <div id="weaponDetailContent"></div>
      <button onclick="document.getElementById('weaponDetailModal').classList.add('hidden')" class="mt-6 w-full py-3 bg-zinc-700 hover:bg-zinc-600 rounded-2xl font-bold">关闭</button>
    </div>
  </div>

  <!-- 控制台模态 -->
  <div id="consoleModal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-[999999] hidden">
    <div class="bg-zinc-900 rounded-3xl p-8 max-w-2xl w-full mx-4 max-h-[80vh] overflow-auto">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-2xl font-bold text-yellow-400">🛠️ 开发者控制台</h3>
        <button onclick="document.getElementById('consoleModal').classList.add('hidden')" class="text-3xl text-gray-400 hover:text-white">×</button>
      </div>
      <div id="consoleLog" class="bg-black p-4 rounded-2xl text-sm font-mono h-64 overflow-auto mb-4 border border-zinc-700"></div>
      <div class="flex gap-2">
        <input id="consoleInput" class="flex-1 bg-zinc-800 px-4 py-3 rounded-2xl text-white" placeholder="输入命令...">
        <button onclick="window.executeConsoleCommand()" class="px-6 py-3 bg-yellow-600 hover:bg-yellow-700 rounded-2xl font-bold">执行</button>
      </div>
    </div>
  </div>

  <!-- 赌博模态 -->
  <div id="gamblingModal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[9999] hidden">
    <div class="bg-zinc-900 rounded-3xl p-8 max-w-4xl w-full mx-4">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-3xl font-bold">🎰 赌博</h3>
        <button onclick="document.getElementById('gamblingModal').classList.add('hidden')" class="text-4xl text-gray-400 hover:text-white">×</button>
      </div>
      <div class="flex gap-4 mb-6">
        <button onclick="window.switchGamblingTab(0)" class="gambling-tab active flex-1 py-3 rounded-2xl font-bold">老虎机</button>
        <button onclick="window.switchGamblingTab(1)" class="gambling-tab flex-1 py-3 rounded-2xl font-bold">21点</button>
        <button onclick="window.switchGamblingTab(2)" class="gambling-tab flex-1 py-3 rounded-2xl font-bold">硬币翻转</button>
      </div>
      <div id="slotPanel">
        <div class="text-center py-12 text-zinc-400">
          <div class="text-6xl mb-4">🎰</div>
          <div class="text-xl">老虎机功能暂时简化<br>点击下方“开始”按钮测试</div>
          <button onclick="alert('老虎机功能开发中，敬请期待！')" class="mt-6 px-8 py-3 bg-orange-600 hover:bg-orange-700 rounded-2xl font-bold">开始转动</button>
        </div>
      </div>
      <div id="blackjackPanel" class="hidden">
        <div class="text-center py-12 text-zinc-400">
          <div class="text-6xl mb-4">🃏</div>
          <div class="text-xl">21点功能暂时简化</div>
          <button onclick="alert('21点功能开发中！')" class="mt-6 px-8 py-3 bg-purple-600 hover:bg-purple-700 rounded-2xl font-bold">开始游戏</button>
        </div>
      </div>
      <div id="coinFlipPanel" class="hidden">
        <div class="text-center py-8">
          <div class="text-6xl mb-4">🪙</div>
          <div class="text-2xl font-bold mb-4">硬币翻转（连胜加倍）</div>
          <div class="flex justify-center gap-4">
            <button onclick="window.coinFlip('heads')" class="px-8 py-4 bg-yellow-500 hover:bg-yellow-600 rounded-2xl font-bold text-xl">正面</button>
            <button onclick="window.coinFlip('tails')" class="px-8 py-4 bg-yellow-500 hover:bg-yellow-600 rounded-2xl font-bold text-xl">反面</button>
          </div>
        </div>
      </div>
      <div class="mt-6">
        <div class="text-sm text-gray-400 mb-2">下注金额</div>
        <input type="number" id="betAmount" value="1000" class="bg-zinc-800 px-4 py-3 rounded-2xl w-full text-xl">
        <div class="flex gap-2 mt-3">
          <button onclick="window.selectCurrency(0)" class="currency-btn active flex-1 py-2 rounded-2xl">耀星</button>
          <button onclick="window.selectCurrency(1)" class="currency-btn flex-1 py-2 rounded-2xl">金币</button>
          <button onclick="window.selectCurrency(2)" class="currency-btn flex-1 py-2 rounded-2xl">强化石</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 扫雷模态 -->
  <div id="minesweeperModal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[9999] hidden">
    <div class="bg-zinc-900 rounded-3xl p-8 max-w-lg w-full mx-4">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-3xl font-bold">💣 扫雷</h3>
        <button onclick="document.getElementById('minesweeperModal').classList.add('hidden')" class="text-4xl text-gray-400 hover:text-white">×</button>
      </div>
      <div id="minesweeperBoard" class="grid grid-cols-8 gap-1 bg-zinc-950 p-4 rounded-2xl mb-6"></div>
      <div class="flex justify-between text-sm">
        <div>剩余雷数：<span id="mineCount">10</span></div>
        <button onclick="window.startMinesweeper()" class="px-6 py-2 bg-red-600 hover:bg-red-700 rounded-2xl">开始新局</button>
      </div>
    </div>
  </div>

  <!-- 简易抽卡结果模态 -->
  <div id="drawModal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-[99999] hidden">
    <div class="bg-zinc-900 rounded-3xl p-8 max-w-6xl w-full mx-4 max-h-[90vh] overflow-auto">
      <div class="flex justify-between items-center mb-6">
        <div id="drawTitle" class="text-4xl font-bold"></div>
        <button onclick="window.hideDrawModal()" class="text-4xl text-gray-400 hover:text-white">×</button>
      </div>
      <div id="drawResults" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
      <button onclick="window.hideDrawModal()" class="mt-8 w-full py-4 bg-zinc-700 hover:bg-zinc-600 rounded-3xl text-xl font-bold">关闭</button>
    </div>
  </div>

  <!-- 游戏说明 -->
  <div class="max-w-7xl mx-auto px-4 py-12 text-center text-zinc-400 text-sm">
    <p>这是一个简单的抽卡游戏演示 • 所有数据本地存储 • 刷新页面不丢失</p>
    <p class="mt-2">当前版本：抽卡 + 养成 + 探索 + 图鉴（已移除经营和战斗模块）</p>
  </div>

  <!-- 脚本引入（必须按顺序加载） -->
  <script src="js/character-weapon-data.js"></script>
  <script src="js/worldview-data.js"></script>
  <script src="js/player.js"></script>
  <script src="js/draw.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/exploration.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/album.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
