<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>抽卡养成大冒险</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .card-r { border-color: #3b82f6; box-shadow: 0 0 15px #3b82f6; }
    .card-sr { border-color: #a855f7; box-shadow: 0 0 15px #a855f7; }
    .card-ssr { border-color: #eab308; box-shadow: 0 0 15px #eab308; }
    .card-ur { border-color: #ec4899; box-shadow: 0 0 12px #ec4899, 0 0 24px #8b5cf6, 0 0 36px #22d3ee; animation: rainbow-glow 2.5s linear infinite; }
    @keyframes rainbow-glow { 0% { box-shadow: 0 0 12px #ec4899, 0 0 24px #8b5cf6; } 33% { box-shadow: 0 0 12px #8b5cf6, 0 0 24px #22d3ee; } 66% { box-shadow: 0 0 12px #22d3ee, 0 0 24px #eab308; } 100% { box-shadow: 0 0 12px #ec4899, 0 0 24px #8b5cf6; } }
    .rarity-r { background: #3b82f6; }
    .rarity-sr { background: #a855f7; }
    .rarity-ssr { background: #eab308; }
    .rarity-ur { background: linear-gradient(90deg, #ec4899, #8b5cf6, #22d3ee, #eab308); background-size: 300% 300%; animation: gradient-shift 3s ease infinite; }
    @keyframes gradient-shift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .character-img { height: 160px; @apply sm:h-48 lg:h-52; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6)); }
    .draw-card { animation: drawPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; opacity: 0; }
    @keyframes drawPop { 0% { transform: scale(0.3) rotate(-12deg); opacity: 0; } 70% { transform: scale(1.15) rotate(8deg); } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
    .draw-shine { animation: shine 1.8s ease infinite; }
    @keyframes shine { 0% { filter: brightness(1); } 50% { filter: brightness(1.6); } 100% { filter: brightness(1); } }
    .ms-cell { width: 42px; height: 42px; font-size: 22px; display: flex; align-items: center; justify-content: center; user-select: none; border: 2px solid #374151; }
    .star-1 { color: #22c55e; text-shadow: 0 0 8px #22c55e; }
    .star-2 { color: #3b82f6; text-shadow: 0 0 8px #3b82f6; }
    .star-3 { color: #a855f7; text-shadow: 0 0 8px #a855f7; }
    .star-4 { color: #eab308; text-shadow: 0 0 8px #eab308; }
    .star-5 { color: #ec4899; text-shadow: 0 0 12px #ec4899, 0 0 20px #22d3ee; animation: rainbow-star 1.5s linear infinite; }
    @keyframes rainbow-star { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div class="max-w-6xl mx-auto p-3 sm:p-4 lg:p-6">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 sm:mb-8">
      <h1 class="text-3xl sm:text-4xl font-bold flex items-center gap-3">
        <i class="fas fa-dragon text-orange-400"></i> 抽卡养成大冒险
      </h1>
      <div class="flex items-center gap-2 bg-gray-900 px-5 py-2.5 sm:px-6 sm:py-3 rounded-2xl text-lg sm:text-xl">
        <i class="fas fa-gem text-cyan-400"></i>
        <span id="diamonds" class="font-bold">1000</span>
      </div>
    </div>

    <div class="flex flex-wrap gap-2 bg-gray-900 p-2 rounded-3xl mb-8 w-fit mx-auto">
      <button onclick="switchTab(0)" id="tab0" class="tab-btn active px-6 py-3 sm:px-8 sm:py-3 text-base sm:text-lg rounded-2xl font-medium">🃏 抽卡</button>
      <button onclick="switchTab(1)" id="tab1" class="tab-btn px-6 py-3 sm:px-8 sm:py-3 text-base sm:text-lg rounded-2xl font-medium">🏠 养成</button>
      <button onclick="switchTab(2)" id="tab2" class="tab-btn px-6 py-3 sm:px-8 sm:py-3 text-base sm:text-lg rounded-2xl font-medium">🔍 探索</button>
    </div>

    <!-- 抽卡界面 -->
    <div id="panel0" class="panel">
      <div class="text-center py-8 sm:py-12">
        <div class="flex justify-center gap-3 mb-6">
          <button onclick="setDrawPool('char')" id="poolCharBtn" class="pool-btn active px-6 py-2.5 rounded-2xl font-medium flex-1 sm:flex-none">🧙 角色池</button>
          <button onclick="setDrawPool('weapon')" id="poolWeaponBtn" class="pool-btn px-6 py-2.5 rounded-2xl font-medium flex-1 sm:flex-none">⚔️ 武器池</button>
        </div>
        <h2 id="poolTitle" class="text-2xl sm:text-3xl font-bold mb-6">角色池抽取</h2>
        
        <div class="flex flex-col sm:flex-row justify-center gap-4 sm:gap-6">
          <button onclick="drawCard(1)" class="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 px-8 sm:px-10 py-5 sm:py-6 rounded-3xl text-xl sm:text-2xl font-bold shadow-xl transition">单抽 <span class="text-yellow-300">100钻石</span></button>
          <button onclick="drawCard(10)" class="bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 px-8 sm:px-10 py-5 sm:py-6 rounded-3xl text-xl sm:text-2xl font-bold shadow-xl transition">十连 <span class="text-yellow-300">900钻石</span></button>
        </div>
        <p class="mt-8 text-gray-400 text-sm sm:text-base">概率：R 60% • SR 25% • SSR 12% • UR 3%</p>
        <p class="mt-2 text-emerald-400 text-xs sm:text-sm">保底：10抽必出SSR，80抽必出UR（提前出UR重置大保底）</p>
        
        <button onclick="showRecordModal()" class="mt-8 inline-flex items-center gap-2 bg-gray-800 hover:bg-gray-700 px-6 py-3 rounded-2xl text-base font-medium">
          <i class="fas fa-history"></i> 记录查询
        </button>
      </div>
    </div>

    <!-- 养成界面 -->
    <div id="panel1" class="panel hidden">
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
        <div class="flex gap-2">
          <button onclick="setInventoryTab(0)" id="invTab0" class="inv-tab active px-6 py-3 rounded-2xl font-medium">🧙 角色仓库</button>
          <button onclick="setInventoryTab(1)" id="invTab1" class="inv-tab px-6 py-3 rounded-2xl font-medium">⚔️ 武器仓库</button>
        </div>
        <div class="flex items-center gap-4 w-full sm:w-auto">
          <select id="sortSelect" onchange="currentSort = this.value; renderInventory()" class="bg-gray-800 text-white px-4 py-2.5 rounded-2xl border border-gray-700 focus:outline-none text-sm sm:text-base flex-1 sm:flex-none">
            <option value="rarity">排序：稀有度优先</option>
            <option value="stars">排序：星级优先</option>
            <option value="level">排序：等级优先</option>
          </select>
          <button onclick="toggleDecomposeMode()" id="decomposeBtn" class="px-6 py-2.5 bg-red-600 hover:bg-red-700 rounded-2xl font-medium flex items-center gap-2 whitespace-nowrap">
            <i class="fas fa-recycle"></i> 分解
          </button>
        </div>
      </div>

      <div id="decomposeBar" class="hidden bg-red-900/50 border border-red-500 rounded-3xl p-4 mb-6 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
        <div class="flex items-center gap-4">
          <span id="selectedCount" class="font-bold">已选 0 个</span>
          <span id="decomposeValue" class="text-yellow-300 font-bold">预计获得 0 钻石</span>
        </div>
        <div class="flex gap-3 w-full sm:w-auto">
          <button onclick="selectAll()" class="flex-1 sm:flex-none px-5 py-2 bg-gray-700 hover:bg-gray-600 rounded-2xl text-sm">全选（最多300个）</button>
          <button onclick="decomposeSelected()" class="flex-1 sm:flex-none px-8 py-2 bg-red-600 hover:bg-red-700 rounded-2xl font-bold">确认分解</button>
          <button onclick="toggleDecomposeMode()" class="flex-1 sm:flex-none px-5 py-2 bg-gray-700 hover:bg-gray-600 rounded-2xl text-sm">取消</button>
        </div>
      </div>

      <div id="inventory" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6"></div>
    </div>

    <!-- 探索界面 -->
    <div id="panel2" class="panel hidden text-center py-8 sm:py-12">
      <h2 class="text-3xl font-bold mb-8">🔍 探索</h2>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 max-w-4xl mx-auto">
        <button onclick="getDiamonds()" id="diamondBtn" class="bg-emerald-600 hover:bg-emerald-700 p-6 rounded-3xl flex flex-col items-center gap-3 transition">
          <i class="fas fa-gem text-5xl"></i>
          <div>
            <div class="text-2xl font-bold">获取钻石</div>
            <div class="text-sm text-emerald-200">300~500钻石</div>
            <div id="diamondCooldown" class="text-xs text-emerald-300 mt-2"></div>
          </div>
        </button>
        <button onclick="openGambling()" class="bg-amber-600 hover:bg-amber-700 p-6 rounded-3xl flex flex-col items-center gap-3 transition">
          <i class="fas fa-dice text-5xl"></i>
          <div>
            <div class="text-2xl font-bold">赌博</div>
            <div class="text-sm text-amber-200">老虎机</div>
          </div>
        </button>
        <button onclick="openMinesweeper()" class="bg-red-600 hover:bg-red-700 p-6 rounded-3xl flex flex-col items-center gap-3 transition">
          <i class="fas fa-bomb text-5xl"></i>
          <div>
            <div class="text-2xl font-bold">扫雷</div>
            <div class="text-sm text-red-200">每标记一颗雷 +500钻石</div>
          </div>
        </button>
      </div>
    </div>
  </div>

  <!-- 抽卡动画Modal -->
  <div id="drawModal" onclick="if(event.target.id==='drawModal')hideDrawModal()" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[9999] p-4">
    <div class="max-w-[95vw] sm:max-w-5xl w-full bg-gray-900 rounded-3xl p-6 sm:p-8 relative">
      <div class="text-center mb-6 sm:mb-8"><h2 id="drawTitle" class="text-3xl sm:text-4xl font-bold text-yellow-300">🎉 抽卡结果</h2></div>
      <div id="drawResults" class="flex flex-wrap justify-center gap-4 sm:gap-6 min-h-[320px] sm:min-h-[420px]"></div>
      <div class="text-center mt-6 sm:mt-8"><button onclick="hideDrawModal()" class="w-full sm:w-auto px-12 py-4 bg-white text-black rounded-2xl font-bold text-xl hover:bg-yellow-300 transition">返回游戏</button></div>
    </div>
  </div>

  <!-- 角色详情弹窗 -->
  <div id="modal" onclick="if(event.target===this)hideModal()" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[10000] p-4">
    <div onclick="event.stopImmediatePropagation()" class="bg-gray-900 rounded-3xl max-w-full sm:max-w-lg w-full mx-auto overflow-hidden">
      <div id="modalContent" class="p-6"></div>
    </div>
  </div>

  <!-- 赌博Modal -->
  <div id="gamblingModal" onclick="if(event.target.id==='gamblingModal')hideGambling()" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[11000] p-4">
    <div class="bg-gray-900 rounded-3xl max-w-md w-full p-6">
      <h3 class="text-2xl font-bold text-center mb-6">🎰 老虎机</h3>
      <div id="slots" class="flex justify-center gap-4 mb-8 text-7xl">💎 🃏 🔥</div>
      <div class="text-center mb-6">
        <input id="betAmount" type="number" value="1000" min="100" max="10000" step="100" class="bg-gray-800 text-center text-3xl font-bold w-40 py-2 rounded-2xl">
        <span class="ml-2 text-gray-400">钻石</span>
      </div>
      <button onclick="spinSlots()" class="w-full py-5 bg-gradient-to-r from-amber-500 to-red-500 text-2xl font-bold rounded-3xl">开始转动</button>
      <p id="gamblingResult" class="text-center mt-6 min-h-[28px] text-lg"></p>
      <button onclick="hideGambling()" class="mt-6 text-gray-400 block mx-auto">关闭</button>
    </div>
  </div>

  <!-- 扫雷Modal -->
  <div id="minesweeperModal" onclick="if(event.target.id==='minesweeperModal')hideMinesweeper()" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[11000] p-4">
    <div class="bg-gray-900 rounded-3xl w-full max-w-2xl">
      <div class="p-6">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-2xl font-bold">💣 扫雷</h3>
          <div class="flex gap-3">
            <button onclick="startMinesweeper(8,8,10)" class="px-4 py-1 bg-green-600 rounded-xl text-sm">简单</button>
            <button onclick="startMinesweeper(10,10,20)" class="px-4 py-1 bg-yellow-600 rounded-xl text-sm">中等</button>
            <button onclick="startMinesweeper(12,12,30)" class="px-4 py-1 bg-red-600 rounded-xl text-sm">困难</button>
          </div>
          <div id="mineScore" class="text-xl font-bold text-yellow-400">0 钻石</div>
        </div>
        <div id="minesweeperBoard" class="grid mx-auto gap-px bg-gray-700 p-2 rounded-2xl" style="width: fit-content;"></div>
        <div class="text-center mt-6">
          <button onclick="stopMinesweeper()" class="px-8 py-3 bg-gray-700 hover:bg-gray-600 rounded-2xl">停止游戏（保存当前收益）</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 记录查询Modal -->
  <div id="recordModal" onclick="if(event.target.id==='recordModal')hideRecordModal()" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[12000] p-4">
    <div class="bg-gray-900 rounded-3xl max-w-lg w-full p-8">
      <h2 class="text-3xl font-bold text-center mb-6">📊 抽卡记录</h2>
      <div class="flex gap-2 mb-6">
        <button onclick="setRecordTab(0)" id="recordTab0" class="record-tab active flex-1 py-2 rounded-2xl">角色记录</button>
        <button onclick="setRecordTab(1)" id="recordTab1" class="record-tab flex-1 py-2 rounded-2xl">武器记录</button>
      </div>
      
      <div id="recordContent">
        <!-- 动态填充 -->
      </div>

      <div class="pt-6 border-t border-gray-700 flex flex-col sm:flex-row gap-3">
        <button onclick="exportSave()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 py-3 rounded-2xl text-base font-medium flex items-center justify-center gap-2">
          <i class="fas fa-download"></i> 导出存档
        </button>
        <button onclick="document.getElementById('importFile').click()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 py-3 rounded-2xl text-base font-medium flex items-center justify-center gap-2">
          <i class="fas fa-upload"></i> 导入存档
        </button>
        <input type="file" id="importFile" accept=".json" class="hidden" onchange="importSave(event)">
      </div>

      <button onclick="hideRecordModal()" class="mt-8 w-full py-4 bg-white text-black rounded-2xl text-xl font-bold">关闭</button>
    </div>
  </div>

  <script>
    // ====================== 数据池 ======================
    const characterPool = [
      {id:1, name:"森林游侠·艾伦", enName:"Forest Ranger · Allen", rarity:"R", baseHP:125, baseATK:72, baseDEF:48, image:"images/Allen_Illustration.jpg"},
      {id:2, name:"火焰学徒·莎莉", enName:"Flame Apprentice · Sally", rarity:"R", baseHP:108, baseATK:88, baseDEF:38, image:"images/Sally_Illustration.jpg"},
      {id:3, name:"铁壁卫士·巴克", enName:"Ironclad Guardian · Buck", rarity:"R", baseHP:145, baseATK:62, baseDEF:72, image:"images/Buck_Illustration.jpg"},
      {id:4, name:"月影精灵·莉莉", enName:"Moonshadow Elf · Lily", rarity:"R", baseHP:115, baseATK:82, baseDEF:45, image:"images/Lily_Illustration.jpg"},
      {id:5, name:"疾风剑豪·凯尔", enName:"Gale Swordmaster · Kael", rarity:"SR", baseHP:158, baseATK:98, baseDEF:52, image:"images/Kael_Illustration.jpg"},
      {id:6, name:"自然召唤师·米娅", enName:"Natural Summoner · Mia", rarity:"SR", baseHP:132, baseATK:105, baseDEF:48, image:"images/Mia_Illustration.jpg"},
      {id:7, name:"雷鸣骑士·索雷", enName:"Thunder Knight · Sorey", rarity:"SR", baseHP:165, baseATK:90, baseDEF:58, image:"images/Sorey_Illustration.jpg"},
      {id:8, name:"暗夜刺客·影刃", enName:"Shadow Assassin · Shadowblade", rarity:"SR", baseHP:128, baseATK:118, baseDEF:50, image:"images/Shadowblade_Illustration.jpg"},
      {id:9, name:"星辰魔导师·塞尔维亚", enName:"Starlight Archmage · Sylvia", rarity:"SSR", baseHP:185, baseATK:82, baseDEF:78, image:"images/Sylvia_Illustration.jpg"},
      {id:10, name:"幻月弓神·阿蕾莎", enName:"Illusion Moon Archer Goddess · Alesha", rarity:"SSR", baseHP:172, baseATK:95, baseDEF:65, image:"images/Alesha_Illustration.jpg"},
      {id:11, name:"圣辉骑士王·加兰", enName:"Holy Radiance Knight King · Galan", rarity:"SSR", baseHP:198, baseATK:88, baseDEF:85, image:"images/Galan_Illustration.jpg"},
      {id:12, name:"凤凰圣女·菲妮克斯", enName:"Phoenix Saintess · Fenix", rarity:"SSR", baseHP:175, baseATK:110, baseDEF:70, image:"images/Phoenix_Illustration.jpg"},
      {id:13, name:"创世光辉·露娜薇尔", enName:"Genesis Radiance · Lunaviel", rarity:"UR", baseHP:230, baseATK:145, baseDEF:95, image:"images/Lunaviel_Illustration.jpg"},
      {id:14, name:"永恒时女·克罗诺", enName:"Eternal Time Maiden · Chrono", rarity:"UR", baseHP:210, baseATK:155, baseDEF:88, image:"images/Chrono_Illustration.jpg"},
      {id:15, name:"元素起源·埃尔温", enName:"Element Origin · Elwin", rarity:"UR", baseHP:205, baseATK:160, baseDEF:92, image:"images/Elwin_Illustration.jpg"}
    ];

    const weaponPool = [
      {id:1, name:"森林魔杖", enName:"Forest Wand", rarity:"R", type:"权杖", image:"images/ForestWand.jpg"},
      {id:2, name:"铁锋冒险剑", enName:"Iron Edge", rarity:"R", type:"单手剑", image:"images/IronEdge.jpg"},
      {id:3, name:"影林双刃", enName:"Shadowwood Twin Blades", rarity:"R", type:"双刀", image:"images/ShadowwoodTwinBlades.jpg"},
      {id:4, name:"猎手短弓", enName:"Hunter’s Shortbow", rarity:"R", type:"弓箭", image:"images/Hunter'sShortbow.jpg"},
      {id:5, name:"紫晶唤魔杖", enName:"Amethyst Summoning Staff", rarity:"SR", type:"权杖", image:"images/AmethystSummoningStaff.jpg"},
      {id:6, name:"雷鸣圣剑", enName:"Thunderclap Holy Sword", rarity:"SR", type:"单手剑", image:"images/ThunderclapHolySword.jpg"},
      {id:7, name:"夜刃双刺", enName:"Nightblade Twin Daggers", rarity:"SR", type:"双刀", image:"images/NightbladeTwinDaggers.jpg"},
      {id:8, name:"幻影长弓", enName:"Phantom Longbow", rarity:"SR", type:"弓箭", image:"images/PhantomLongbow.jpg"},
      {id:9, name:"星河魔典", enName:"Starriver Codex", rarity:"SSR", type:"权杖", owner:9, image:"images/StarriverCodex.jpg"},
      {id:10, name:"幻月神弓·月影弦", enName:"Lunar Shadow String", rarity:"SSR", type:"弓箭", owner:10, image:"images/LunarShadowString.jpg"},
      {id:11, name:"圣辉王剑·光誓", enName:"Holy Radiance King Sword", rarity:"SSR", type:"单手剑", owner:11, image:"images/HolyRadianceKingSword.jpg"},
      {id:12, name:"涅槃圣杖·凤翼", enName:"Nirvana Holy Staff", rarity:"SSR", type:"权杖", owner:12, image:"images/NirvanaHolyStaff.jpg"},
      {id:13, name:"创世起源杖·光始", enName:"Genesis Origin Staff", rarity:"UR", type:"权杖", owner:13, image:"images/GenesisOriginStaff.jpg"},
      {id:14, name:"永恒逆转杖·时轮", enName:"Chrono Wheel", rarity:"UR", type:"权杖", owner:14, image:"images/ChronoWheel.jpg"},
      {id:15, name:"元素起源杖·万象", enName:"Element Origin Staff", rarity:"UR", type:"权杖", owner:15, image:"images/ElementOriginStaff.jpg"}
    ];

    const rarityWeights = { R: 60, SR: 25, SSR: 12, UR: 3 };
    const decomposeValue = { R: 10, SR: 50, SSR: 200, UR: 1000 };
    const rarityOrder = { UR: 4, SSR: 3, SR: 2, R: 1 };

    // ====================== 玩家数据 ======================
    let player = { 
      diamonds: 1000, 
      owned: [],           // 角色
      weapons: [],         // 武器
      totalCharDraws: 0, rCount: 0, srCount: 0, ssrCount: 0, urCount: 0,
      totalWeaponDraws: 0, wR: 0, wSR: 0, wSSR: 0, wUR: 0,
      charSsrPity: 0, charUrPity: 0,
      weaponSsrPity: 0, weaponUrPity: 0
    };

    let decomposeMode = false;
    let selected = [];
    let currentSort = "rarity";
    let currentDrawPool = "char";
    let currentInventoryTab = 0;
    let currentRecordTab = 0;
    let currentModalIndex = null;

    let diamondCooldownEnd = 0;
    let currentMinesweeperScore = 0;
    let minesweeperBoard = [];
    let mineRows = 0, mineCols = 0, mineCount = 0;
    let minesweeperGameOver = false;   // 新增：防止踩雷后继续操作

    function saveGame() { 
      localStorage.setItem("gachaGame", JSON.stringify(player)); 
    }

    function loadGame() {
      const saved = localStorage.getItem("gachaGame");
      if (saved) {
        let data = JSON.parse(saved);
        if (data.gold !== undefined) data.diamonds = data.gold;
        player = data;
      }
      if (!player.diamonds) player.diamonds = 1000;
      if (!player.owned) player.owned = [];
      if (!player.weapons) player.weapons = [];
      document.getElementById("diamonds").textContent = player.diamonds;
      saveGame();
    }

    function getRarityColor(r) {
      if (r === "UR") return "card-ur";
      if (r === "SSR") return "card-ssr";
      if (r === "SR") return "card-sr";
      return "card-r";
    }

    // ====================== 抽卡保底 ======================
    function drawOne(poolType) {
      const isChar = poolType === "char";
      if (isChar) {
        player.charSsrPity = (player.charSsrPity || 0) + 1;
        player.charUrPity = (player.charUrPity || 0) + 1;
      } else {
        player.weaponSsrPity = (player.weaponSsrPity || 0) + 1;
        player.weaponUrPity = (player.weaponUrPity || 0) + 1;
      }

      let item;
      const pitySSR = isChar ? player.charSsrPity : player.weaponSsrPity;
      const pityUR = isChar ? player.charUrPity : player.weaponUrPity;

      if (pityUR >= 80) {
        const pool = isChar ? characterPool : weaponPool;
        const candidates = pool.filter(c => c.rarity === "UR");
        item = candidates[Math.floor(Math.random() * candidates.length)];
        if (isChar) { player.charSsrPity = 0; player.charUrPity = 0; }
        else { player.weaponSsrPity = 0; player.weaponUrPity = 0; }
      } else if (pitySSR >= 10) {
        const pool = isChar ? characterPool : weaponPool;
        const candidates = pool.filter(c => c.rarity === "SSR" || c.rarity === "UR");
        item = candidates[Math.floor(Math.random() * candidates.length)];
        if (isChar) player.charSsrPity = 0;
        else player.weaponSsrPity = 0;
      } else {
        const total = Object.values(rarityWeights).reduce((a,b)=>a+b, 0);
        let rand = Math.random() * total;
        let sum = 0;
        for (let r in rarityWeights) {
          sum += rarityWeights[r];
          if (rand <= sum) {
            const pool = isChar ? characterPool : weaponPool;
            const candidates = pool.filter(c => c.rarity === r);
            item = candidates[Math.floor(Math.random() * candidates.length)];
            break;
          }
        }
      }

      if (item.rarity === "SSR" || item.rarity === "UR") {
        if (isChar) player.charSsrPity = 0;
        else player.weaponSsrPity = 0;
      }
      if (item.rarity === "UR") {
        if (isChar) player.charUrPity = 0;
        else player.weaponUrPity = 0;
      }
      return item;
    }

    function drawCard(times) {
      const cost = times === 1 ? 100 : 900;
      if (player.diamonds < cost) return alert("钻石不够啦！去探索吧～");
      player.diamonds -= cost;
      document.getElementById("diamonds").textContent = player.diamonds;

      let results = [];
      for (let i = 0; i < times; i++) {
        const item = drawOne(currentDrawPool);
        if (currentDrawPool === "char") {
          player.owned.push({ id: Date.now() + i, charId: item.id, level: 1, stars: 0, equippedWeapon: null });
          player.totalCharDraws++;
          if (item.rarity === "R") player.rCount++;
          else if (item.rarity === "SR") player.srCount++;
          else if (item.rarity === "SSR") player.ssrCount++;
          else if (item.rarity === "UR") player.urCount++;
        } else {
          player.weapons.push({ id: Date.now() + i, weaponId: item.id });
          player.totalWeaponDraws++;
          if (item.rarity === "R") player.wR++;
          else if (item.rarity === "SR") player.wSR++;
          else if (item.rarity === "SSR") player.wSSR++;
          else if (item.rarity === "UR") player.wUR++;
        }
        results.push(item);
      }
      saveGame();
      showDrawAnimation(results, currentDrawPool);
      if (!document.getElementById("panel1").classList.contains("hidden")) renderInventory();
    }

    function showDrawAnimation(results, poolType) {
      const modal = document.getElementById("drawModal");
      const container = document.getElementById("drawResults");
      const title = document.getElementById("drawTitle");
      container.innerHTML = "";
      modal.classList.remove("hidden");
      title.textContent = poolType === "char" ? (results.length === 1 ? "🎉 单抽角色" : "🎉 十连角色") : (results.length === 1 ? "🎉 单抽武器" : "🎉 十连武器");
      results.forEach((item, i) => {
        const delay = results.length === 1 ? 0 : i * 80;
        const div = document.createElement("div");
        div.style.animationDelay = delay + "ms";
        const pool = poolType === "char" ? characterPool : weaponPool;
        const data = pool.find(x => x.id === item.id);
        div.className = `draw-card bg-gray-800 rounded-3xl p-4 border-4 ${getRarityColor(data.rarity)} text-center w-40 sm:w-52`;
        div.innerHTML = `<img src="${data.image}" class="character-img w-full rounded-2xl mx-auto draw-shine"><div class="rarity-${data.rarity.toLowerCase()} text-xs inline-block px-4 py-1 rounded-full text-white font-bold mt-4">${data.rarity}</div><div class="text-lg sm:text-xl font-bold mt-2">${data.name}</div><div class="text-xs text-gray-400">${data.enName || data.type}</div>`;
        container.appendChild(div);
      });
    }

    function hideDrawModal() { document.getElementById("drawModal").classList.add("hidden"); }

    // ====================== 库存渲染 ======================
    function sortOwned(list, isChar) {
      const copy = [...list];
      copy.sort((a, b) => {
        const pool = isChar ? characterPool : weaponPool;
        const charA = pool.find(c => c.id === (isChar ? a.charId : a.weaponId));
        const charB = pool.find(c => c.id === (isChar ? b.charId : b.weaponId));
        const rDiff = rarityOrder[charB.rarity] - rarityOrder[charA.rarity];
        if (rDiff !== 0) return rDiff;
        if (charA.name !== charB.name) return charA.name.localeCompare(charB.name);
        if (isChar) {
          if (a.stars !== b.stars) return b.stars - a.stars;
          return b.level - a.level;
        }
        return 0;
      });
      return copy;
    }

    function renderInventory() {
      const container = document.getElementById("inventory");
      container.innerHTML = "";
      selected = [];
      const isChar = currentInventoryTab === 0;
      const list = isChar ? player.owned : player.weapons;
      const sorted = sortOwned(list, isChar);

      sorted.forEach((item) => {
        const originalIndex = list.findIndex(o => o.id === item.id);
        const pool = isChar ? characterPool : weaponPool;
        const data = pool.find(c => c.id === (isChar ? item.charId : item.weaponId));

        const div = document.createElement("div");
        div.className = `relative bg-gray-800 rounded-3xl p-3 sm:p-4 cursor-pointer border-4 ${getRarityColor(data.rarity)} hover:scale-105 transition`;

        let html = '';

        if (isChar) {
          let equippedName = "无";
          if (item.equippedWeapon) {
            const equippedObj = player.weapons.find(w => w.id === item.equippedWeapon);
            if (equippedObj) {
              const wpData = weaponPool.find(wp => wp.id === equippedObj.weaponId);
              equippedName = wpData ? wpData.name : "无";
            }
          }

          const statMult = 1 + (item.level - 1) * 0.08 + item.stars * 0.25;
          const hp = Math.floor(data.baseHP * statMult);
          const atk = Math.floor(data.baseATK * statMult);
          const def = Math.floor(data.baseDEF * statMult);

          html = `
            <img src="${data.image}" class="character-img w-full rounded-2xl mb-3">
            <div class="text-center">
              <div class="rarity-${data.rarity.toLowerCase()} text-xs inline-block px-4 py-1 rounded-full text-white font-bold mb-2">${data.rarity}</div>
              <div class="text-base sm:text-xl font-bold mb-1">${data.name}</div>
              <div class="text-xs text-gray-400">${data.enName}</div>
              <div class="flex justify-center items-center gap-1 mt-2 mb-3">
                <span class="text-lg font-bold">Lv.${item.level}</span>
                <span class="star-${Math.min(item.stars + 1, 5)} text-2xl">★</span><span class="text-sm text-gray-400">(${item.stars}/5)</span>
              </div>
              <div class="text-xs text-emerald-400">装备：${equippedName}</div>
              <div class="flex justify-between text-sm mt-4">
                <div>❤️ ${hp}</div><div>⚔️ ${atk}</div><div>🛡️ ${def}</div>
              </div>
            </div>
          `;
        } else {
          let equippedBy = "";
          for (let char of player.owned) {
            if (char.equippedWeapon === item.id) {
              const charData = characterPool.find(c => c.id === char.charId);
              equippedBy = `<div class="absolute top-4 right-4 bg-red-600 text-white text-[10px] px-2 py-0.5 rounded-xl">已被${charData.name}装备</div>`;
              break;
            }
          }

          html = `
            ${equippedBy}
            <img src="${data.image}" class="character-img w-full rounded-2xl mb-3">
            <div class="text-center">
              <div class="rarity-${data.rarity.toLowerCase()} text-xs inline-block px-4 py-1 rounded-full text-white font-bold mb-2">${data.rarity}</div>
              <div class="text-base sm:text-xl font-bold mb-1">${data.name}</div>
              <div class="text-xs text-gray-400">${data.type}</div>
            </div>
          `;
        }

        if (decomposeMode) html = `<input type="checkbox" class="absolute top-4 right-4 w-6 h-6 accent-red-500 z-10" data-index="${originalIndex}" onchange="toggleSelect(this)">` + html;
        div.innerHTML = html;
        if (!decomposeMode) {
          if (isChar) div.onclick = () => showCharacterDetail(originalIndex);
          else div.onclick = () => showWeaponDetail(originalIndex);
        }
        container.appendChild(div);
      });

      if (list.length === 0) {
        container.innerHTML = `<p class="text-center text-gray-500 py-12 col-span-full">${isChar ? '还没有角色，快去抽卡吧！' : '还没有武器，快去抽卡吧！'}</p>`;
      }
    }

    function setInventoryTab(n) {
      currentInventoryTab = n;
      document.querySelectorAll('.inv-tab').forEach((b,i) => b.classList.toggle('active', i===n));
      renderInventory();
    }

    // ====================== 角色详情 + 武器装备 ======================
    function showCharacterDetail(index) {
      currentModalIndex = index;
      const item = player.owned[index];
      const char = characterPool.find(c => c.id === item.charId);
      const statMult = 1 + (item.level - 1) * 0.08 + item.stars * 0.25;
      const hp = Math.floor(char.baseHP * statMult);
      const atk = Math.floor(char.baseATK * statMult);
      const def = Math.floor(char.baseDEF * statMult);
      const sameCount = player.owned.filter(o => o.charId === item.charId).length;

      let weaponOptionsHTML = `<option value="">无武器</option>`;
      player.weapons.forEach(w => {
        const wp = weaponPool.find(x => x.id === w.weaponId);
        const canEquip = (wp.rarity === "R" || wp.rarity === "SR") || (wp.owner === item.charId);
        const isEquipped = player.owned.some(c => c.equippedWeapon === w.id);
        if (canEquip && !isEquipped) {
          weaponOptionsHTML += `<option value="${w.id}">${wp.name} (${wp.rarity})</option>`;
        }
      });

      const equippedObj = item.equippedWeapon ? player.weapons.find(w => w.id === item.equippedWeapon) : null;
      const equippedWp = equippedObj ? weaponPool.find(wp => wp.id === equippedObj.weaponId) : null;

      document.getElementById("modalContent").innerHTML = `
        <div class="text-center">
          <img src="${char.image}" class="character-img mx-auto rounded-3xl mb-4">
          <div class="rarity-${char.rarity.toLowerCase()} text-xs inline-block px-6 py-2 rounded-full text-white font-bold">${char.rarity}</div>
          <h2 class="text-3xl sm:text-4xl font-bold my-3">${char.name}</h2>
          <div class="text-sm text-gray-400 mb-4">${char.enName}</div>
          <div class="flex justify-center items-center gap-4 text-xl mb-6">
            <div>Lv.<span class="font-bold text-3xl">${item.level}</span></div>
            <div class="flex items-center gap-px text-4xl">${Array(5).fill(0).map((_,i) => `<span class="star-${i < item.stars ? item.stars : 1}">${i < item.stars ? '★' : '☆'}</span>`).join('')}</div>
          </div>
          <div class="grid grid-cols-3 gap-6 my-8 text-xl">
            <div class="text-center"><div class="text-red-400">❤️ 血量</div><div class="font-bold">${hp}</div></div>
            <div class="text-center"><div class="text-orange-400">⚔️ 攻击</div><div class="font-bold">${atk}</div></div>
            <div class="text-center"><div class="text-blue-400">🛡️ 防御</div><div class="font-bold">${def}</div></div>
          </div>
          <div class="mb-6">
            <div class="text-sm text-gray-400 mb-2">当前装备武器</div>
            <div class="text-lg font-medium">${equippedWp ? equippedWp.name : '无'}</div>
          </div>
          <select id="equipSelect" class="w-full bg-gray-800 text-white py-3 px-4 rounded-2xl mb-4">
            ${weaponOptionsHTML}
          </select>
          <button onclick="equipWeapon()" class="w-full bg-teal-600 hover:bg-teal-700 py-4 rounded-2xl text-xl font-bold">装备选中武器</button>
          <div class="grid grid-cols-2 gap-3 mt-6">
            <button onclick="levelUp()" class="bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl text-xl font-bold">升级 Lv.${item.level} → ${item.level+1}（${item.level*30}钻）</button>
            <button onclick="starUp()" class="bg-purple-600 hover:bg-purple-700 py-4 rounded-2xl text-xl font-bold ${item.stars >= 5 ? 'opacity-50 cursor-not-allowed' : ''}">升星 ★${item.stars} → ★${item.stars+1}</button>
          </div>
          <button onclick="hideModal()" class="mt-6 text-gray-400">关闭</button>
        </div>
      `;
      document.getElementById("modal").classList.remove("hidden");
    }

    function equipWeapon() {
      if (currentModalIndex === null) return;
      const select = document.getElementById("equipSelect");
      const weaponUniqueId = parseInt(select.value);
      if (weaponUniqueId) {
        // 防止重复装备
        const alreadyEquipped = player.owned.some(c => c.equippedWeapon === weaponUniqueId);
        if (alreadyEquipped) return alert("该武器已被其他角色装备！");
      }
      player.owned[currentModalIndex].equippedWeapon = weaponUniqueId || null;
      saveGame();
      hideModal();
      renderInventory();
    }

    function showWeaponDetail(index) {
      alert("武器暂不支持单独升级，可直接装备到对应角色！");
    }

    function levelUp() {
      if (currentModalIndex === null) return;
      const item = player.owned[currentModalIndex];
      const cost = item.level * 30;
      if (player.diamonds < cost) return alert("钻石不够！");
      if (!confirm(`确定花费 ${cost} 钻石升级到 Lv.${item.level + 1} 吗？`)) return;
      player.diamonds -= cost;
      item.level = Math.min(item.level + 1, 100);
      document.getElementById("diamonds").textContent = player.diamonds;
      saveGame();
      showCharacterDetail(currentModalIndex);
    }

    function starUp() {
      if (currentModalIndex === null) return;
      const item = player.owned[currentModalIndex];
      if (item.stars >= 5) return alert("已经满星！");
      const duplicateIndex = player.owned.findIndex(o => o.charId === item.charId && o.id !== item.id && o.stars <= item.stars);
      if (duplicateIndex === -1) return alert("没有可用的相同角色材料！");
      if (!confirm("确定消耗1个相同角色升星吗？")) return;
      player.owned.splice(duplicateIndex, 1);
      item.stars++;
      saveGame();
      showCharacterDetail(currentModalIndex);
    }

    function hideModal() {
      document.getElementById("modal").classList.add("hidden");
      currentModalIndex = null;
      renderInventory();
    }

    // ====================== 分解逻辑 ======================
    function toggleDecomposeMode() {
      decomposeMode = !decomposeMode;
      const btn = document.getElementById("decomposeBtn");
      btn.innerHTML = decomposeMode ? `<i class="fas fa-times"></i> 退出分解` : `<i class="fas fa-recycle"></i> 分解`;
      document.getElementById("decomposeBar").classList.toggle("hidden", !decomposeMode);
      renderInventory();
    }

    function toggleSelect(checkbox) {
      const index = parseInt(checkbox.dataset.index);
      if (checkbox.checked) selected.push(index);
      else selected = selected.filter(i => i !== index);
      updateDecomposeBar();
    }

    function updateDecomposeBar() {
      const count = selected.length;
      let value = 0;
      const isChar = currentInventoryTab === 0;
      const list = isChar ? player.owned : player.weapons;
      selected.forEach(i => {
        const item = list[i];
        const pool = isChar ? characterPool : weaponPool;
        const data = pool.find(c => c.id === (isChar ? item.charId : item.weaponId));
        value += decomposeValue[data.rarity];
      });
      document.getElementById("selectedCount").textContent = `已选 ${count} 个`;
      document.getElementById("decomposeValue").textContent = `预计获得 ${value} 钻石`;
    }

    function selectAll() {
      selected = [];
      const checkboxes = document.querySelectorAll('#inventory input[type="checkbox"]');
      const maxSelect = Math.min(checkboxes.length, 300);
      for (let i = 0; i < maxSelect; i++) {
        checkboxes[i].checked = true;
        selected.push(parseInt(checkboxes[i].dataset.index));
      }
      updateDecomposeBar();
    }

    function decomposeSelected() {
      if (selected.length === 0) return;
      if (selected.length > 300) return alert("一次最多分解300个！");
      const isChar = currentInventoryTab === 0;
      const list = isChar ? player.owned : player.weapons;
      let total = 0;
      selected.sort((a, b) => b - a).forEach(i => {
        const item = list[i];
        const pool = isChar ? characterPool : weaponPool;
        const data = pool.find(c => c.id === (isChar ? item.charId : item.weaponId));
        total += decomposeValue[data.rarity];
        list.splice(i, 1);
      });
      player.diamonds += total;
      document.getElementById("diamonds").textContent = player.diamonds;
      saveGame();
      alert(`✅ 已分解 ${selected.length} 个，获得 ${total} 钻石！`);
      selected = [];
      decomposeMode = false;
      document.getElementById("decomposeBar").classList.add("hidden");
      renderInventory();
    }

    // ====================== 抽卡池切换 ======================
    function setDrawPool(type) {
      currentDrawPool = type;
      document.getElementById("poolCharBtn").classList.toggle("active", type === "char");
      document.getElementById("poolWeaponBtn").classList.toggle("active", type === "weapon");
      document.getElementById("poolTitle").textContent = type === "char" ? "角色池抽取" : "武器池抽取";
    }

    // ====================== 记录查询 ======================
    function setRecordTab(n) {
      currentRecordTab = n;
      document.querySelectorAll('.record-tab').forEach((b,i) => b.classList.toggle('active', i===n));
      showRecordModal();
    }

    function showRecordModal() {
      const isCharTab = currentRecordTab === 0;
      const total = isCharTab ? (player.totalCharDraws || 0) : (player.totalWeaponDraws || 0);
      const ur = isCharTab ? player.urCount : player.wUR;
      const ssrRate = total ? ((isCharTab ? player.ssrCount : player.wSSR) / total * 100).toFixed(2) : 0;
      const urRate = total ? (ur / total * 100).toFixed(2) : 0;

      let html = `
        <div class="space-y-6">
          <div class="flex justify-between text-xl"><span>${isCharTab ? '角色' : '武器'}总抽卡次数</span><span class="font-bold">${total}</span></div>
          <div class="grid grid-cols-2 gap-6">
            <div class="text-center"><div class="text-sm text-gray-400">R</div><div class="text-4xl font-bold text-blue-400">${isCharTab ? player.rCount : player.wR}</div></div>
            <div class="text-center"><div class="text-sm text-gray-400">SR</div><div class="text-4xl font-bold text-purple-400">${isCharTab ? player.srCount : player.wSR}</div></div>
            <div class="text-center"><div class="text-sm text-gray-400">SSR</div><div class="text-4xl font-bold text-yellow-400">${isCharTab ? player.ssrCount : player.wSSR}</div></div>
            <div class="text-center"><div class="text-sm text-gray-400">UR</div><div class="text-4xl font-bold text-orange-400">${ur}</div></div>
          </div>
          <div class="pt-4 border-t border-gray-700">
            <div class="flex justify-between"><span>SSR获得率</span><span class="font-bold">${ssrRate}%</span></div>
            <div class="flex justify-between"><span>UR获得率</span><span class="font-bold">${urRate}%</span></div>
            <div class="flex justify-between mt-3"><span>UR大保底进度</span><span class="font-bold text-amber-400">${isCharTab ? (player.charUrPity || 0) : (player.weaponUrPity || 0)}/80</span></div>
          </div>
        </div>`;

      const luckRate = parseFloat(urRate);
      let luckText = "", luckClass = "";
      if (luckRate <= 1) { luckText = "大非酋"; luckClass = "bg-gradient-to-r from-red-900 to-red-700 text-white"; }
      else if (luckRate <= 2) { luckText = "非酋"; luckClass = "bg-gradient-to-r from-red-700 to-red-500 text-white"; }
      else if (luckRate <= 3) { luckText = "正常玩家"; luckClass = "bg-gray-700 text-white"; }
      else if (luckRate <= 4) { luckText = "小欧皇"; luckClass = "bg-gradient-to-r from-yellow-300 to-yellow-500 text-black"; }
      else if (luckRate <= 5) { luckText = "欧皇"; luckClass = "bg-gradient-to-r from-yellow-400 to-amber-500 text-black"; }
      else { luckText = "欧气满满"; luckClass = "bg-gradient-to-r from-pink-500 via-purple-500 to-cyan-400 text-white animate-pulse"; }

      html += `<div id="luckBox" class="mt-6 p-6 rounded-3xl text-center text-2xl font-bold transition-all"><span class="${luckClass} px-8 py-4 rounded-3xl inline-block">${luckText}（UR概率 ${luckRate}%）</span></div>`;

      document.getElementById("recordContent").innerHTML = html;
      document.getElementById("recordModal").classList.remove("hidden");
    }

    function hideRecordModal() {
      document.getElementById("recordModal").classList.add("hidden");
    }

    // ====================== 存档 ======================
    function exportSave() {
      const dataStr = JSON.stringify(player, null, 2);
      const dataUri = "data:application/json;charset=utf-8," + encodeURIComponent(dataStr);
      const link = document.createElement("a");
      link.setAttribute("href", dataUri);
      link.setAttribute("download", "gacha-save.json");
      link.click();
      alert("✅ 存档已导出！");
    }

    function importSave(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        try {
          player = JSON.parse(ev.target.result);
          document.getElementById("diamonds").textContent = player.diamonds || 1000;
          saveGame();
          alert("✅ 存档导入成功！");
          hideRecordModal();
          renderInventory();
        } catch(err) { alert("❌ 文件格式错误"); }
      };
      reader.readAsText(file);
      e.target.value = "";
    }

    // ====================== 其他功能 ======================
    function getDiamonds() {
      if (Date.now() < diamondCooldownEnd) return;
      const amount = Math.floor(Math.random() * 201) + 300;
      player.diamonds += amount;
      document.getElementById("diamonds").textContent = player.diamonds;
      saveGame();
      const btn = document.getElementById("diamondBtn");
      btn.classList.add("opacity-50", "cursor-not-allowed");
      diamondCooldownEnd = Date.now() + 10000;
      const cd = document.getElementById("diamondCooldown");
      let timeLeft = 10;
      const timer = setInterval(() => {
        timeLeft--;
        cd.textContent = `${timeLeft}秒后可再次获取`;
        if (timeLeft <= 0) {
          clearInterval(timer);
          btn.classList.remove("opacity-50", "cursor-not-allowed");
          cd.textContent = "";
        }
      }, 1000);
    }

    function openGambling() { 
      document.getElementById("gamblingModal").classList.remove("hidden"); 
      document.getElementById("gamblingResult").innerHTML = ""; 
    }
    function hideGambling() { document.getElementById("gamblingModal").classList.add("hidden"); }
    function spinSlots() { 
      const bet = parseInt(document.getElementById("betAmount").value);
      if (bet < 100 || bet > 10000 || bet > player.diamonds) return alert("下注金额不正确！");
      player.diamonds -= bet;
      document.getElementById("diamonds").textContent = player.diamonds;
      const symbols = ["💎","🃏","🔥","🌟","⚡","🧊"];
      const reel1 = symbols[Math.floor(Math.random()*symbols.length)];
      const reel2 = symbols[Math.floor(Math.random()*symbols.length)];
      const reel3 = symbols[Math.floor(Math.random()*symbols.length)];
      document.getElementById("slots").innerHTML = `${reel1} ${reel2} ${reel3}`;
      let win = 0;
      if (reel1 === reel2 && reel2 === reel3) win = bet * 8;
      else if (reel1 === reel2 || reel2 === reel3) win = bet * 2;
      if (win > 0) {
        player.diamonds += win;
        document.getElementById("diamonds").textContent = player.diamonds;
        document.getElementById("gamblingResult").innerHTML = `<span class="text-green-400">🎉 恭喜中奖！获得 ${win} 钻石</span>`;
      } else {
        document.getElementById("gamblingResult").innerHTML = `<span class="text-red-400">😢 未中奖</span>`;
      }
      saveGame();
    }

    function openMinesweeper() { 
      document.getElementById("minesweeperModal").classList.remove("hidden"); 
      startMinesweeper(8,8,10); 
    }
    function hideMinesweeper() { 
      document.getElementById("minesweeperModal").classList.add("hidden"); 
      currentMinesweeperScore = 0;
      minesweeperGameOver = false;
    }
    function startMinesweeper(rows, cols, mines) { 
      mineRows = rows; mineCols = cols; mineCount = mines;
      currentMinesweeperScore = 0;
      minesweeperGameOver = false;
      document.getElementById("mineScore").textContent = "0 钻石";
      minesweeperBoard = Array(rows).fill().map(() => Array(cols).fill().map(() => ({revealed: false, mine: false, flagged: false, adjacent: 0})));
      let placed = 0;
      while (placed < mines) {
        const r = Math.floor(Math.random() * rows);
        const c = Math.floor(Math.random() * cols);
        if (!minesweeperBoard[r][c].mine) { minesweeperBoard[r][c].mine = true; placed++; }
      }
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (minesweeperBoard[r][c].mine) continue;
          let count = 0;
          for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && minesweeperBoard[nr][nc].mine) count++;
          }
          minesweeperBoard[r][c].adjacent = count;
        }
      }
      renderMinesweeperBoard();
    }
    function renderMinesweeperBoard() { 
      const boardEl = document.getElementById("minesweeperBoard");
      boardEl.innerHTML = "";
      boardEl.style.gridTemplateColumns = `repeat(${mineCols}, 42px)`;
      for (let r = 0; r < mineRows; r++) {
        for (let c = 0; c < mineCols; c++) {
          const cell = document.createElement("div");
          cell.className = "ms-cell bg-gray-600 border border-gray-400 hover:bg-gray-500 rounded cursor-pointer flex items-center justify-center text-xl font-bold";
          cell.dataset.r = r; cell.dataset.c = c;
          cell.addEventListener("click", handleMineClick);
          cell.addEventListener("contextmenu", (e) => { e.preventDefault(); handleMineFlag(r, c); });
          boardEl.appendChild(cell);
        }
      }
    }
    function handleMineClick(e) { 
      if (minesweeperGameOver) return;
      const r = parseInt(e.target.dataset.r); 
      const c = parseInt(e.target.dataset.c);
      const cellData = minesweeperBoard[r][c];
      if (cellData.revealed || cellData.flagged) return;
      if (cellData.mine) { 
        minesweeperGameOver = true;
        alert("💥 踩雷了！游戏结束"); 
        hideMinesweeper(); 
        return; 
      }
      floodFill(r, c);
    }
    function floodFill(r, c) { 
      if (r < 0 || r >= mineRows || c < 0 || c >= mineCols) return;
      const cellData = minesweeperBoard[r][c];
      if (cellData.revealed || cellData.flagged || cellData.mine) return;
      cellData.revealed = true;
      const cellEl = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
      if (cellEl) {
        cellEl.classList.add("bg-gray-800");
        if (cellData.adjacent > 0) {
          cellEl.textContent = cellData.adjacent;
          cellEl.style.color = ["#1e90ff","#00b700","#ff0000","#800080","#ffa500","#00ffff","#000000","#808080"][cellData.adjacent-1];
        }
      }
      if (cellData.adjacent === 0) {
        for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          floodFill(r + dr, c + dc);
        }
      }
    }
    function handleMineFlag(r, c) { 
      if (minesweeperGameOver) return;
      const cellData = minesweeperBoard[r][c];
      if (cellData.revealed) return;
      cellData.flagged = !cellData.flagged;
      const cellEl = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
      if (cellEl) cellEl.textContent = cellData.flagged ? "🚩" : "";
      if (cellData.flagged && cellData.mine) {
        currentMinesweeperScore += 500;
        document.getElementById("mineScore").textContent = `${currentMinesweeperScore} 钻石`;
      }
    }
    function stopMinesweeper() {
      if (minesweeperGameOver) return;
      player.diamonds += currentMinesweeperScore;
      document.getElementById("diamonds").textContent = player.diamonds;
      saveGame();
      hideMinesweeper();
      alert(`🎉 扫雷结束！获得 ${currentMinesweeperScore} 钻石`);
    }

    function switchTab(n) {
      document.querySelectorAll(".panel").forEach(p => p.classList.add("hidden"));
      document.getElementById("panel" + n).classList.remove("hidden");
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active", "bg-white", "text-black"));
      document.getElementById("tab" + n).classList.add("active", "bg-white", "text-black");
      if (n === 1) {
        decomposeMode = false;
        document.getElementById("decomposeBar").classList.add("hidden");
        renderInventory();
      }
    }

    // 按用户要求保留这行代码（防止bug）
    window.addEventListener('beforeunload', () => { localStorage.removeItem("gachaGame"); });

    window.onload = () => {
      loadGame();
      switchTab(0);
    };
  </script>
</body>
</html>
