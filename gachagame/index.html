<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>抽卡养成大冒险</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .card-r { border-color: #3b82f6; box-shadow: 0 0 15px #3b82f6; }
    .card-sr { border-color: #a855f7; box-shadow: 0 0 15px #a855f7; }
    .card-ssr { border-color: #eab308; box-shadow: 0 0 15px #eab308; }
    .card-ur { border-color: #ec4899; box-shadow: 0 0 12px #ec4899, 0 0 24px #8b5cf6, 0 0 36px #22d3ee; animation: rainbow-glow 2.5s linear infinite; }
    @keyframes rainbow-glow { 0% { box-shadow: 0 0 12px #ec4899, 0 0 24px #8b5cf6; } 33% { box-shadow: 0 0 12px #8b5cf6, 0 0 24px #22d3ee; } 66% { box-shadow: 0 0 12px #22d3ee, 0 0 24px #eab308; } 100% { box-shadow: 0 0 12px #ec4899, 0 0 24px #8b5cf6; } }
    .rarity-r { background: #3b82f6; }
    .rarity-sr { background: #a855f7; }
    .rarity-ssr { background: #eab308; }
    .rarity-ur { background: linear-gradient(90deg, #ec4899, #8b5cf6, #22d3ee, #eab308); background-size: 300% 300%; animation: gradient-shift 3s ease infinite; }
    @keyframes gradient-shift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .character-img { height: 160px; @apply sm:h-48 lg:h-52; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6)); }
    
    .draw-card { animation: drawPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; opacity: 0; }
    @keyframes drawPop { 
      0% { transform: scale(0.3) rotate(-25deg); opacity: 0; } 
      60% { transform: scale(1.25) rotate(12deg); } 
      80% { transform: scale(0.95) rotate(-8deg); } 
      100% { transform: scale(1) rotate(0deg); opacity: 1; } 
    }
    .draw-shine { animation: shine 1.2s ease infinite; position: relative; }
    .draw-shine::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 40%;
      height: 300%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.9), transparent);
      animation: drawShineMove 2s linear infinite;
      opacity: 0.6;
    }
    @keyframes shine { 0% { filter: brightness(1); } 50% { filter: brightness(1.8); } 100% { filter: brightness(1); } }
    @keyframes drawShineMove { 0% { transform: translateX(-100%); } 100% { transform: translateX(300%); } }

    .star-burst {
      animation: starBurst 800ms ease-out forwards;
    }
    @keyframes starBurst {
      0% { transform: scale(0.6) rotate(0deg); opacity: 1; }
      40% { transform: scale(1.6) rotate(180deg); }
      70% { transform: scale(1.2) rotate(300deg); }
      100% { transform: scale(1) rotate(360deg); opacity: 0; }
    }

    .btn-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .btn-hover:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3); }
    .stat-box { transition: all 0.4s ease; }
    .modal-content { animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }

    .ms-cell { width: 42px; height: 42px; font-size: 22px; display: flex; align-items: center; justify-content: center; user-select: none; border: 2px solid #374151; }
    .star-1 { color: #22c55e; text-shadow: 0 0 8px #22c55e; }
    .star-2 { color: #3b82f6; text-shadow: 0 0 8px #3b82f6; }
    .star-3 { color: #a855f7; text-shadow: 0 0 8px #a855f7; }
    .star-4 { color: #eab308; text-shadow: 0 0 8px #eab308; }
    .star-5 { color: #ec4899; text-shadow: 0 0 12px #ec4899, 0 0 20px #22d3ee; animation: rainbow-star 1.5s linear infinite; }
    @keyframes rainbow-star { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div class="max-w-6xl mx-auto p-3 sm:p-4 lg:p-6">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 sm:mb-8">
      <h1 class="text-3xl sm:text-4xl font-bold flex items-center gap-3">
        <i class="fas fa-dragon text-orange-400"></i> 抽卡养成大冒险
      </h1>
      <div class="flex items-center gap-6">
        <div class="flex items-center gap-2 bg-gray-900 px-5 py-2.5 sm:px-6 sm:py-3 rounded-2xl text-lg sm:text-xl">
          <i class="fas fa-gem text-cyan-400"></i>
          <span id="diamonds" class="font-bold">1000</span>
        </div>
        <div class="flex items-center gap-2 bg-gray-900 px-5 py-2.5 sm:px-6 sm:py-3 rounded-2xl text-lg sm:text-xl">
          <i class="fas fa-coins text-yellow-400"></i>
          <span id="gold" class="font-bold">0</span>
        </div>
        <div class="flex items-center gap-2 bg-gray-900 px-5 py-2.5 sm:px-6 sm:py-3 rounded-2xl text-lg sm:text-xl">
          <i class="fas fa-flask text-purple-400"></i>
          <span id="magicPotion" class="font-bold">0</span>
        </div>
        <button onclick="openConsolePrompt()" class="text-xs bg-gray-800 hover:bg-gray-700 px-3 py-1 rounded-xl">控制台</button>
      </div>
    </div>

    <div class="flex flex-wrap gap-2 bg-gray-900 p-2 rounded-3xl mb-8 w-fit mx-auto">
      <button onclick="switchTab(0)" id="tab0" class="tab-btn active px-6 py-3 sm:px-8 sm:py-3 text-base sm:text-lg rounded-2xl font-medium btn-hover">🃏 抽卡</button>
      <button onclick="switchTab(1)" id="tab1" class="tab-btn px-6 py-3 sm:px-8 sm:py-3 text-base sm:text-lg rounded-2xl font-medium btn-hover">🏠 养成</button>
      <button onclick="switchTab(2)" id="tab2" class="tab-btn px-6 py-3 sm:px-8 sm:py-3 text-base sm:text-lg rounded-2xl font-medium btn-hover">🔍 探索</button>
    </div>

    <!-- 抽卡界面 -->
    <div id="panel0" class="panel">
      <div class="text-center py-8 sm:py-12">
        <div class="flex justify-center gap-3 mb-6">
          <button onclick="setDrawPool('char')" id="poolCharBtn" class="pool-btn active px-6 py-2.5 rounded-2xl font-medium flex-1 sm:flex-none btn-hover">🧙 角色池</button>
          <button onclick="setDrawPool('weapon')" id="poolWeaponBtn" class="pool-btn px-6 py-2.5 rounded-2xl font-medium flex-1 sm:flex-none btn-hover">⚔️ 武器池</button>
        </div>
        <h2 id="poolTitle" class="text-2xl sm:text-3xl font-bold mb-6">角色池抽取</h2>
        
        <div class="flex flex-col sm:flex-row justify-center gap-4 sm:gap-6">
          <button onclick="drawCard(1)" class="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 px-8 sm:px-10 py-5 sm:py-6 rounded-3xl text-xl sm:text-2xl font-bold shadow-xl transition btn-hover">单抽 <span class="text-yellow-300">100钻石</span></button>
          <button onclick="drawCard(10)" class="bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 px-8 sm:px-10 py-5 sm:py-6 rounded-3xl text-xl sm:text-2xl font-bold shadow-xl transition btn-hover">十连 <span class="text-yellow-300">900钻石</span></button>
        </div>
        <p class="mt-8 text-gray-400 text-sm sm:text-base">概率：R 60% • SR 25% • SSR 12% • UR 3%</p>
        <p class="mt-2 text-emerald-400 text-xs sm:text-sm">保底：10抽必出SSR，80抽必出UR（提前出UR重置大保底）</p>
        
        <button onclick="showRecordModal()" class="mt-8 inline-flex items-center gap-2 bg-gray-800 hover:bg-gray-700 px-6 py-3 rounded-2xl text-base font-medium btn-hover">
          <i class="fas fa-history"></i> 记录查询
        </button>
      </div>
    </div>

    <!-- 养成界面 -->
    <div id="panel1" class="panel hidden">
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
        <div class="flex gap-2">
          <button onclick="setInventoryTab(0)" id="invTab0" class="inv-tab active px-6 py-3 rounded-2xl font-medium btn-hover">🧙 角色仓库</button>
          <button onclick="setInventoryTab(1)" id="invTab1" class="inv-tab px-6 py-3 rounded-2xl font-medium btn-hover">⚔️ 武器仓库</button>
        </div>
        <div class="flex items-center gap-4 w-full sm:w-auto">
          <select id="sortSelect" onchange="currentSort = this.value; renderInventory()" class="bg-gray-800 text-white px-4 py-2.5 rounded-2xl border border-gray-700 focus:outline-none text-sm sm:text-base flex-1 sm:flex-none">
            <option value="rarity">排序：稀有度优先</option>
            <option value="stars">排序：星级优先</option>
            <option value="level">排序：等级优先</option>
          </select>
          <button onclick="toggleDecomposeMode()" id="decomposeBtn" class="px-6 py-2.5 bg-red-600 hover:bg-red-700 rounded-2xl font-medium flex items-center gap-2 whitespace-nowrap btn-hover">
            <i class="fas fa-recycle"></i> 分解
          </button>
        </div>
      </div>

      <div id="decomposeBar" class="hidden bg-red-900/50 border border-red-500 rounded-3xl p-4 mb-6 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
        <div class="flex items-center gap-4">
          <span id="selectedCount" class="font-bold">已选 0 个</span>
          <span id="decomposeValue" class="text-yellow-300 font-bold">预计获得 0 钻石</span>
        </div>
        <div class="flex gap-3 w-full sm:w-auto">
          <button onclick="selectAll()" class="flex-1 sm:flex-none px-5 py-2 bg-gray-700 hover:bg-gray-600 rounded-2xl text-sm btn-hover">全选（最多300个）</button>
          <button onclick="decomposeSelected()" class="flex-1 sm:flex-none px-8 py-2 bg-red-600 hover:bg-red-700 rounded-2xl font-bold btn-hover">确认分解</button>
          <button onclick="toggleDecomposeMode()" class="flex-1 sm:flex-none px-5 py-2 bg-gray-700 hover:bg-gray-600 rounded-2xl text-sm btn-hover">取消</button>
        </div>
      </div>

      <div id="inventory" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6"></div>
    </div>

    <!-- 探索界面 -->
    <div id="panel2" class="panel hidden text-center py-8 sm:py-12">
      <h2 class="text-3xl font-bold mb-8">🔍 探索</h2>
      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4 max-w-6xl mx-auto">
        <button onclick="getDiamonds()" id="diamondBtn" class="bg-emerald-600 hover:bg-emerald-700 p-6 rounded-3xl flex flex-col items-center gap-3 transition btn-hover">
          <i class="fas fa-gem text-5xl"></i>
          <div>
            <div class="text-2xl font-bold">获取钻石</div>
            <div class="text-sm text-emerald-200">300~500钻石</div>
            <div id="diamondCooldown" class="text-xs text-emerald-300 mt-2"></div>
          </div>
        </button>
        <button onclick="getGold()" id="goldBtn" class="bg-yellow-600 hover:bg-yellow-700 p-6 rounded-3xl flex flex-col items-center gap-3 transition btn-hover">
          <i class="fas fa-coins text-5xl"></i>
          <div>
            <div class="text-2xl font-bold">获取金币</div>
            <div class="text-sm text-yellow-200">500~1000金币</div>
            <div id="goldCooldown" class="text-xs text-yellow-300 mt-2"></div>
          </div>
        </button>
        <button onclick="getMagicPotion()" id="potionBtn" class="bg-purple-600 hover:bg-purple-700 p-6 rounded-3xl flex flex-col items-center gap-3 transition btn-hover">
          <i class="fas fa-flask text-5xl"></i>
          <div>
            <div class="text-2xl font-bold">魔药炼制</div>
            <div class="text-sm text-purple-200">5~10魔药</div>
            <div id="potionCooldown" class="text-xs text-purple-300 mt-2"></div>
          </div>
        </button>
        <button onclick="openGambling()" class="bg-amber-600 hover:bg-amber-700 p-6 rounded-3xl flex flex-col items-center gap-3 transition btn-hover">
          <i class="fas fa-dice text-5xl"></i>
          <div>
            <div class="text-2xl font-bold">赌博</div>
            <div class="text-sm text-amber-200">老虎机</div>
          </div>
        </button>
        <button onclick="openMinesweeper()" class="bg-red-600 hover:bg-red-700 p-6 rounded-3xl flex flex-col items-center gap-3 transition btn-hover">
          <i class="fas fa-bomb text-5xl"></i>
          <div>
            <div class="text-2xl font-bold">扫雷</div>
            <div class="text-sm text-red-200">每标记一颗雷 +500钻石</div>
          </div>
        </button>
      </div>
    </div>
  </div>

  <!-- 抽卡动画Modal -->
  <div id="drawModal" onclick="if(event.target.id==='drawModal')hideDrawModal()" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[9999] p-4">
    <div class="max-w-[95vw] sm:max-w-5xl w-full bg-gray-900 rounded-3xl p-6 sm:p-8 relative">
      <div class="text-center mb-6 sm:mb-8"><h2 id="drawTitle" class="text-3xl sm:text-4xl font-bold text-yellow-300">🎉 抽卡结果</h2></div>
      <div id="drawResults" class="flex flex-wrap justify-center gap-4 sm:gap-6 min-h-[320px] sm:min-h-[420px]"></div>
      <div class="text-center mt-6 sm:mt-8"><button onclick="hideDrawModal()" class="w-full sm:w-auto px-12 py-4 bg-white text-black rounded-2xl font-bold text-xl hover:bg-yellow-300 transition btn-hover">返回游戏</button></div>
    </div>
  </div>

  <!-- 角色/武器详情弹窗 -->
  <div id="modal" onclick="if(event.target===this)hideModal()" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[10000] p-4">
    <div onclick="event.stopImmediatePropagation()" id="modalInner" class="modal-content bg-gray-900 rounded-3xl max-w-full sm:max-w-4xl w-full mx-auto overflow-hidden">
      <div id="modalContent" class="p-6"></div>
    </div>
  </div>

  <!-- 赌博Modal -->
  <div id="gamblingModal" onclick="if(event.target.id==='gamblingModal')hideGambling()" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[11000] p-4">
    <div class="bg-gray-900 rounded-3xl max-w-md w-full p-6">
      <h3 class="text-2xl font-bold text-center mb-6">🎰 老虎机</h3>
      <div id="slots" class="flex justify-center gap-4 mb-8 text-7xl">💎 🃏 🔥</div>
      <div class="text-center mb-6">
        <input id="betAmount" type="number" value="1000" min="100" max="10000" step="100" class="bg-gray-800 text-center text-3xl font-bold w-40 py-2 rounded-2xl">
        <span class="ml-2 text-gray-400">钻石</span>
      </div>
      <button onclick="spinSlots()" class="w-full py-5 bg-gradient-to-r from-amber-500 to-red-500 text-2xl font-bold rounded-3xl btn-hover">开始转动</button>
      <p id="gamblingResult" class="text-center mt-6 min-h-[28px] text-lg"></p>
      <button onclick="hideGambling()" class="mt-6 text-gray-400 block mx-auto">关闭</button>
    </div>
  </div>

  <!-- 扫雷Modal -->
  <div id="minesweeperModal" onclick="if(event.target.id==='minesweeperModal')hideMinesweeper()" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[11000] p-4">
    <div class="bg-gray-900 rounded-3xl w-full max-w-2xl">
      <div class="p-6">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-2xl font-bold">💣 扫雷</h3>
          <div class="flex gap-3">
            <button onclick="startMinesweeper(8,8,10)" class="px-4 py-1 bg-green-600 rounded-xl text-sm btn-hover">简单</button>
            <button onclick="startMinesweeper(10,10,20)" class="px-4 py-1 bg-yellow-600 rounded-xl text-sm btn-hover">中等</button>
            <button onclick="startMinesweeper(12,12,30)" class="px-4 py-1 bg-red-600 rounded-xl text-sm btn-hover">困难</button>
          </div>
          <div id="mineScore" class="text-xl font-bold text-yellow-400">0 钻石</div>
        </div>
        <div id="minesweeperBoard" class="grid mx-auto gap-px bg-gray-700 p-2 rounded-2xl" style="width: fit-content;"></div>
        <div class="text-center mt-6">
          <button onclick="stopMinesweeper()" class="px-8 py-3 bg-gray-700 hover:bg-gray-600 rounded-2xl btn-hover">停止游戏（保存当前收益）</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 记录查询Modal -->
  <div id="recordModal" onclick="if(event.target.id==='recordModal')hideRecordModal()" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[12000] p-4">
    <div class="bg-gray-900 rounded-3xl max-w-lg w-full p-8">
      <h2 class="text-3xl font-bold text-center mb-6">📊 抽卡记录</h2>
      <div class="flex gap-2 mb-6">
        <button onclick="setRecordTab(0)" id="recordTab0" class="record-tab active flex-1 py-2 rounded-2xl btn-hover">角色记录</button>
        <button onclick="setRecordTab(1)" id="recordTab1" class="record-tab flex-1 py-2 rounded-2xl btn-hover">武器记录</button>
      </div>
      <div id="recordContent"></div>
      <div class="pt-6 border-t border-gray-700 flex flex-col sm:flex-row gap-3">
        <button onclick="exportSave()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 py-3 rounded-2xl text-base font-medium flex items-center justify-center gap-2 btn-hover">
          <i class="fas fa-download"></i> 导出存档
        </button>
        <button onclick="document.getElementById('importFile').click()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 py-3 rounded-2xl text-base font-medium flex items-center justify-center gap-2 btn-hover">
          <i class="fas fa-upload"></i> 导入存档
        </button>
        <input type="file" id="importFile" accept=".json" class="hidden" onchange="importSave(event)">
      </div>
      <button onclick="hideRecordModal()" class="mt-8 w-full py-4 bg-white text-black rounded-2xl text-xl font-bold btn-hover">关闭</button>
    </div>
  </div>

  <!-- 开发者控制台Modal -->
  <div id="consoleModal" onclick="if(event.target.id==='consoleModal')hideConsole()" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[13000] p-4">
    <div class="bg-gray-900 rounded-3xl max-w-lg w-full p-8">
      <h2 class="text-3xl font-bold text-center mb-6 flex items-center justify-center gap-3">
        <i class="fas fa-terminal text-green-400"></i> 开发者控制台
      </h2>
      <input id="consoleInput" type="text" placeholder="输入命令，例如：give 999 50" class="w-full bg-gray-800 text-white px-5 py-4 rounded-2xl text-lg mb-6 font-mono">
      <button onclick="executeConsoleCommand()" class="w-full py-4 bg-green-600 hover:bg-green-700 rounded-2xl text-xl font-bold">执行命令</button>
      <div id="consoleLog" class="mt-6 text-sm font-mono text-green-300 h-48 overflow-y-auto bg-black/30 rounded-2xl p-4"></div>
      <button onclick="hideConsole()" class="mt-8 w-full py-3 bg-gray-700 hover:bg-gray-600 rounded-2xl">关闭控制台</button>
    </div>
  </div>

  <script>
    // ====================== 数据池 ======================
    const characterPool = [
      {id:1, name:"森林游侠·艾伦", enName:"Forest Ranger · Allen", rarity:"R", baseHP:125, baseATK:72, baseDEF:48, category:"强袭", image:"images/Allen_Illustration.jpg"},
      {id:2, name:"火焰学徒·莎莉", enName:"Flame Apprentice · Sally", rarity:"R", baseHP:108, baseATK:88, baseDEF:38, category:"辅助", image:"images/Sally_Illustration.jpg"},
      {id:3, name:"铁壁卫士·巴克", enName:"Ironclad Guardian · Buck", rarity:"R", baseHP:145, baseATK:62, baseDEF:72, category:"近卫", image:"images/Buck_Illustration.jpg"},
      {id:4, name:"月影精灵·莉莉", enName:"Moonshadow Elf · Lily", rarity:"R", baseHP:115, baseATK:82, baseDEF:45, category:"辅助", image:"images/Lily_Illustration.jpg"},
      {id:5, name:"疾风剑豪·凯尔", enName:"Gale Swordmaster · Kael", rarity:"SR", baseHP:158, baseATK:98, baseDEF:52, category:"强袭", image:"images/Kael_Illustration.jpg"},
      {id:6, name:"自然召唤师·米娅", enName:"Natural Summoner · Mia", rarity:"SR", baseHP:132, baseATK:105, baseDEF:48, category:"辅助", image:"images/Mia_Illustration.jpg"},
      {id:7, name:"雷鸣骑士·索雷", enName:"Thunder Knight · Sorey", rarity:"SR", baseHP:165, baseATK:90, baseDEF:58, category:"强袭", image:"images/Sorey_Illustration.jpg"},
      {id:8, name:"暗夜刺客·影刃", enName:"Shadow Assassin · Shadowblade", rarity:"SR", baseHP:128, baseATK:118, baseDEF:50, category:"强袭", image:"images/Shadowblade_Illustration.jpg"},
      {id:9, name:"星辰魔导师·塞尔维亚", enName:"Starlight Archmage · Sylvia", rarity:"SSR", baseHP:185, baseATK:82, baseDEF:78, category:"辅助", image:"images/Sylvia_Illustration.jpg"},
      {id:10, name:"幻月弓神·阿蕾莎", enName:"Illusion Moon Archer Goddess · Alesha", rarity:"SSR", baseHP:172, baseATK:95, baseDEF:65, category:"强袭", image:"images/Alesha_Illustration.jpg"},

    function loadGame() {

        player = data;

    function getRarityColor(r) {
      if (r === "UR") return "card-ur";
      if (r === "SSR") return "card-ssr";
      if (r === "SR") return "card-sr";
      return "card-r";
    }

    function getRarityBorderClass(r) {
      if (r === "R") return "border-blue-500";
      if (r === "SR") return "border-purple-500";
      if (r === "SSR") return "border-yellow-400";
      if (r === "UR") return "border-transparent bg-gradient-to-r from-pink-500 via-purple-500 to-cyan-400";
      return "border-orange-500";
    }

    // ====================== 数值计算 ======================
    function calculateStats(item, char, equippedWeapon = null) {
      const levelMult = Math.pow(1.06, item.level);
      const starMult = 1 + item.stars * 0.25;
      let hp = Math.floor(char.baseHP * levelMult * starMult);
      let atk = Math.floor(char.baseATK * levelMult * starMult);
      let def = Math.floor(char.baseDEF * levelMult * starMult);
      let critRate = 0.05;
      let critDamage = 0.5;

      if (equippedWeapon) {
        const weaponData = weaponPool.find(w => w.id === equippedWeapon.weaponId);
        const wLevelMult = Math.pow(1.06, equippedWeapon.level);
        const wStarMult = 1 + equippedWeapon.stars * 0.25;
        hp += Math.floor(weaponData.baseHP * wLevelMult * wStarMult);
        atk += Math.floor(weaponData.baseATK * wLevelMult * wStarMult);
        def += Math.floor(weaponData.baseDEF * wLevelMult * wStarMult);
        critRate += weaponData.baseCritRate * wStarMult;
        critDamage += weaponData.baseCritDamage * wStarMult;
      }
      return { hp, atk, def, critRate: Math.min(critRate, 1), critDamage };
    }

    function calculateWeaponStats(item, weapon) {
      const levelMult = Math.pow(1.06, item.level);
      const starMult = 1 + item.stars * 0.25;
      const hp = Math.floor(weapon.baseHP * levelMult * starMult);
      const atk = Math.floor(weapon.baseATK * levelMult * starMult);
      const def = Math.floor(weapon.baseDEF * levelMult * starMult);
      const critRate = weapon.baseCritRate * starMult;
      const critDamage = weapon.baseCritDamage * starMult;
      return { hp, atk, def, critRate, critDamage };
    }

    // ====================== 抽卡保底 ======================
    function drawOne(poolType) {
      const isChar = poolType === "char";
      if (isChar) {
        player.charSsrPity = (player.charSsrPity || 0) + 1;
        player.charUrPity = (player.charUrPity || 0) + 1;
      } else {
        player.weaponSsrPity = (player.weaponSsrPity || 0) + 1;
        player.weaponUrPity = (player.weaponUrPity || 0) + 1;
      }

      let item;
      const pitySSR = isChar ? player.charSsrPity : player.weaponSsrPity;
      const pityUR = isChar ? player.charUrPity : player.weaponUrPity;

      if (pityUR >= 80) {
        const pool = isChar ? characterPool : weaponPool;
        const candidates = pool.filter(c => c.rarity === "UR");
        item = candidates[Math.floor(Math.random() * candidates.length)];
        if (isChar) { player.charSsrPity = 0; player.charUrPity = 0; }
        else { player.weaponSsrPity = 0; player.weaponUrPity = 0; }
      } else if (pitySSR >= 10) {
        const pool = isChar ? characterPool : weaponPool;
        const candidates = pool.filter(c => c.rarity === "SSR" || c.rarity === "UR");
        item = candidates[Math.floor(Math.random() * candidates.length)];
        if (isChar) player.charSsrPity = 0;
        else player.weaponSsrPity = 0;
      } else {
        const total = Object.values(rarityWeights).reduce((a,b)=>a+b, 0);
        let rand = Math.random() * total;
        let sum = 0;
        for (let r in rarityWeights) {
          sum += rarityWeights[r];
          if (rand <= sum) {
            const pool = isChar ? characterPool : weaponPool;
            const candidates = pool.filter(c => c.rarity === r);
            item = candidates[Math.floor(Math.random() * candidates.length)];
            break;
          }
        }
      }

      if (item.rarity === "SSR" || item.rarity === "UR") {
        if (isChar) player.charSsrPity = 0;
        else player.weaponSsrPity = 0;
      }
      if (item.rarity === "UR") {
        if (isChar) player.charUrPity = 0;
        else player.weaponUrPity = 0;
      }
      return item;
    }

    function drawCard(times) {
      const cost = times === 1 ? 100 : 900;
      if (player.diamonds < cost) return alert("钻石不够啦！去探索吧～");
      player.diamonds -= cost;
      document.getElementById("diamonds").textContent = player.diamonds;

      let results = [];
      for (let i = 0; i < times; i++) {
        const item = drawOne(currentDrawPool);
        if (currentDrawPool === "char") {
          player.owned.push({ id: Date.now() + i, charId: item.id, level: 1, stars: 0, equippedWeapon: null });
          player.totalCharDraws++;
          if (item.rarity === "R") player.rCount++;
          else if (item.rarity === "SR") player.srCount++;
          else if (item.rarity === "SSR") player.ssrCount++;
          else if (item.rarity === "UR") player.urCount++;
        } else {
          player.weapons.push({ id: Date.now() + i, weaponId: item.id, level: 1, stars: 0 });
          player.totalWeaponDraws++;
          if (item.rarity === "R") player.wR++;
          else if (item.rarity === "SR") player.wSR++;
          else if (item.rarity === "SSR") player.wSSR++;
          else if (item.rarity === "UR") player.wUR++;
        }
        results.push(item);
      }
      saveGame();
      showDrawAnimation(results, currentDrawPool);
      if (!document.getElementById("panel1").classList.contains("hidden")) renderInventory();
    }

    function showDrawAnimation(results, poolType) {
      const modal = document.getElementById("drawModal");
      const container = document.getElementById("drawResults");
      const title = document.getElementById("drawTitle");
      container.innerHTML = "";
      modal.classList.remove("hidden");
      title.textContent = poolType === "char" ? (results.length === 1 ? "🎉 单抽角色" : "🎉 十连角色") : (results.length === 1 ? "🎉 单抽武器" : "🎉 十连武器");

      results.forEach((item, i) => {
        const delay = results.length === 1 ? 0 : i * 80;
        const div = document.createElement("div");
        div.style.animationDelay = delay + "ms";
        const pool = poolType === "char" ? characterPool : weaponPool;
        const data = pool.find(x => x.id === item.id);
        const hasShine = (data.rarity === "SSR" || data.rarity === "UR");
        div.className = `draw-card bg-gray-800 rounded-3xl p-4 border-4 ${getRarityColor(data.rarity)} text-center w-40 sm:w-52`;
        div.innerHTML = `
          <img src="${data.image}" class="character-img w-full rounded-2xl mx-auto ${hasShine ? 'draw-shine' : ''}">
          <div class="rarity-${data.rarity.toLowerCase()} text-xs inline-block px-4 py-1 rounded-full text-white font-bold mt-4">${data.rarity}</div>
          <div class="text-lg sm:text-xl font-bold mt-2">${data.name}</div>
          <div class="text-xs text-gray-400">${data.category || data.type}</div>
        `;
        container.appendChild(div);
      });
    }

    function hideDrawModal() { document.getElementById("drawModal").classList.add("hidden"); }

    // ====================== 库存渲染 ======================
    function sortOwned(list, isChar) {
      const copy = [...list];
      copy.sort((a, b) => {
        const pool = isChar ? characterPool : weaponPool;
        const charA = pool.find(c => c.id === (isChar ? a.charId : a.weaponId));
        const charB = pool.find(c => c.id === (isChar ? b.charId : b.weaponId));
        const rDiff = rarityOrder[charB.rarity] - rarityOrder[charA.rarity];
        if (rDiff !== 0) return rDiff;
        if (charA.name !== charB.name) return charA.name.localeCompare(charB.name);
        if (a.stars !== b.stars) return b.stars - a.stars;
        return b.level - a.level;
      });
      return copy;
    }

      if (currentModalIndex === null || currentModalType !== "char") return;
      const select = document.getElementById("equipSelect");
      const weaponUniqueId = parseInt(select.value);
      if (weaponUniqueId) {
        const alreadyEquipped = player.owned.some(c => c.equippedWeapon === weaponUniqueId);
        if (alreadyEquipped) return alert("该武器已被其他角色装备！");

      saveGame();

    function levelUp() {
      if (currentModalIndex === null) return;
      let item;
      if (currentModalType === "char") item = player.owned[currentModalIndex];
      else item = player.weapons[currentModalIndex];
      const cost = item.level * 30;
      if (player.gold < cost) return alert("金币不够！");
      player.gold -= cost;
      item.level = Math.min(item.level + 1, 100);
      document.getElementById("gold").textContent = player.gold;
      saveGame();
      if (currentModalType === "char") showCharacterDetail(currentModalIndex);
      else showWeaponDetail(currentModalIndex);
    }

    function starUp() {
      if (currentModalIndex === null) return;
      let item, list;
      if (currentModalType === "char") {
        item = player.owned[currentModalIndex];
        list = player.owned;
      } else {
        item = player.weapons[currentModalIndex];
        list = player.weapons;
      }
      if (item.stars >= 5) return alert("已经满星！");
      const duplicateIndex = list.findIndex(o => (currentModalType === "char" ? o.charId : o.weaponId) === (currentModalType === "char" ? item.charId : item.weaponId) && o.id !== item.id && o.stars <= item.stars);
      if (duplicateIndex === -1) return alert("没有可用的相同材料！");

      const potionCost = 10 + item.stars * 10;
      if (player.magicPotion < potionCost) return alert(`魔药不足！需要 ${potionCost} 个魔药`);

      if (!confirm(`确定消耗 ${potionCost} 个魔药 + 1个相同材料升星吗？`)) return;

      player.magicPotion -= potionCost;
      list.splice(duplicateIndex, 1);
      item.stars++;

      document.getElementById("magicPotion").textContent = player.magicPotion;
      saveGame();

      const burst = document.createElement("div");
      burst.className = "fixed inset-0 flex items-center justify-center pointer-events-none z-[99999]";
      burst.innerHTML = `<div class="text-8xl flex gap-4 star-burst">★★★</div>`;
      document.body.appendChild(burst);

      setTimeout(() => {
        burst.remove();
        if (currentModalType === "char") showCharacterDetail(currentModalIndex);
        else showWeaponDetail(currentModalIndex);
      }, 900);
    }

    function updateDecomposeBar() {
      const count = selected.length;
      let value = 0;
      const isChar = currentInventoryTab === 0;
      const list = isChar ? player.owned : player.weapons;
      selected.forEach(i => {
        const item = list[i];
        const pool = isChar ? characterPool : weaponPool;
        const data = pool.find(c => c.id === (isChar ? item.charId : item.weaponId));
        value += decomposeValue[data.rarity];
      });
      document.getElementById("selectedCount").textContent = `已选 ${count} 个`;
      document.getElementById("decomposeValue").textContent = `预计获得 ${value} 钻石`;
    }

    function selectAll() {
      selected = [];
      const checkboxes = document.querySelectorAll('#inventory input[type="checkbox"]');
      const maxSelect = Math.min(checkboxes.length, 300);
      for (let i = 0; i < maxSelect; i++) {
        checkboxes[i].checked = true;
        selected.push(parseInt(checkboxes[i].dataset.index));
      }
      updateDecomposeBar();
    }

    function decomposeSelected() {
      if (selected.length === 0) return;
      if (selected.length > 300) return alert("一次最多分解300个！");
      const isChar = currentInventoryTab === 0;
      const list = isChar ? player.owned : player.weapons;
      let total = 0;
      selected.sort((a, b) => b - a).forEach(i => {
        const item = list[i];
        const pool = isChar ? characterPool : weaponPool;
        const data = pool.find(c => c.id === (isChar ? item.charId : item.weaponId));
        total += decomposeValue[data.rarity];
        list.splice(i, 1);
      });
      player.diamonds += total;
      document.getElementById("diamonds").textContent = player.diamonds;
      saveGame();
      alert(`✅ 已分解 ${selected.length} 个，获得 ${total} 钻石！`);
      selected = [];
      decomposeMode = false;
      document.getElementById("decomposeBar").classList.add("hidden");
      renderInventory();
    }

    function openMinesweeper() { document.getElementById("minesweeperModal").classList.remove("hidden"); startMinesweeper(8,8,10); }
    function hideMinesweeper() { 
      document.getElementById("minesweeperModal").classList.add("hidden"); 
      currentMinesweeperScore = 0;
      minesweeperGameOver = false;
    }
    function startMinesweeper(rows, cols, mines) { 
      mineRows = rows; mineCols = cols; mineCount = mines;
      currentMinesweeperScore = 0;
      minesweeperGameOver = false;
      document.getElementById("mineScore").textContent = "0 钻石";
      minesweeperBoard = Array(rows).fill().map(() => Array(cols).fill().map(() => ({revealed: false, mine: false, flagged: false, adjacent: 0})));
      let placed = 0;
      while (placed < mines) {
        const r = Math.floor(Math.random() * rows);
        const c = Math.floor(Math.random() * cols);
        if (!minesweeperBoard[r][c].mine) { minesweeperBoard[r][c].mine = true; placed++; }
      }
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (minesweeperBoard[r][c].mine) continue;
          let count = 0;
          for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && minesweeperBoard[nr][nc].mine) count++;
          }
          minesweeperBoard[r][c].adjacent = count;
        }
      }
      renderMinesweeperBoard();
    }
    function renderMinesweeperBoard() { 
      const boardEl = document.getElementById("minesweeperBoard");
      boardEl.innerHTML = "";
      boardEl.style.gridTemplateColumns = `repeat(${mineCols}, 42px)`;
      for (let r = 0; r < mineRows; r++) {
        for (let c = 0; c < mineCols; c++) {
          const cell = document.createElement("div");
          cell.className = "ms-cell bg-gray-600 border border-gray-400 hover:bg-gray-500 rounded cursor-pointer flex items-center justify-center text-xl font-bold";
          cell.dataset.r = r; cell.dataset.c = c;
          cell.addEventListener("click", handleMineClick);
          cell.addEventListener("contextmenu", (e) => { e.preventDefault(); handleMineFlag(r, c); });
          boardEl.appendChild(cell);
        }
      }
    }
    function handleMineClick(e) { 
      if (minesweeperGameOver) return;
      const r = parseInt(e.target.dataset.r); 
      const c = parseInt(e.target.dataset.c);
      const cellData = minesweeperBoard[r][c];
      if (cellData.revealed || cellData.flagged) return;
      if (cellData.mine) { 
        minesweeperGameOver = true;
        alert("💥 踩雷了！游戏结束"); 
        hideMinesweeper(); 
        return; 
      }
      floodFill(r, c);
    }
    function floodFill(r, c) { 
      if (r < 0 || r >= mineRows || c < 0 || c >= mineCols) return;
      const cellData = minesweeperBoard[r][c];
      if (cellData.revealed || cellData.flagged || cellData.mine) return;
      cellData.revealed = true;
      const cellEl = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
      if (cellEl) {
        cellEl.classList.add("bg-gray-800");
        if (cellData.adjacent > 0) {
          cellEl.textContent = cellData.adjacent;
          cellEl.style.color = ["#1e90ff","#00b700","#ff0000","#800080","#ffa500","#00ffff","#000000","#808080"][cellData.adjacent-1];
        }
      }
      if (cellData.adjacent === 0) {
        for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          floodFill(r + dr, c + dc);
        }
      }
    }
    function handleMineFlag(r, c) { 
      if (minesweeperGameOver) return;
      const cellData = minesweeperBoard[r][c];
      if (cellData.revealed) return;
      cellData.flagged = !cellData.flagged;
      const cellEl = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
      if (cellEl) cellEl.textContent = cellData.flagged ? "🚩" : "";
      if (cellData.flagged && cellData.mine) {
        currentMinesweeperScore += 500;
        document.getElementById("mineScore").textContent = `${currentMinesweeperScore} 钻石`;
      }
    }
    function stopMinesweeper() {
      if (minesweeperGameOver) return;
      player.diamonds += currentMinesweeperScore;
      document.getElementById("diamonds").textContent = player.diamonds;
      saveGame();
      hideMinesweeper();
      alert(`🎉 扫雷结束！获得 ${currentMinesweeperScore} 钻石`);
    }

    function switchTab(n) {
      document.querySelectorAll(".panel").forEach(p => p.classList.add("hidden"));
      document.getElementById("panel" + n).classList.remove("hidden");
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active", "bg-white", "text-black"));
      document.getElementById("tab" + n).classList.add("active", "bg-white", "text-black");
      if (n === 1) {
        decomposeMode = false;
        document.getElementById("decomposeBar").classList.add("hidden");
        renderInventory();
      }
    }

    // ====================== 开发者控制台 ======================
    function openConsolePrompt() {
      const code = prompt("请输入作者命令开启控制台：");
      if (code === "114514") {
        document.getElementById("consoleModal").classList.remove("hidden");
        document.getElementById("consoleLog").innerHTML = "控制台已开启<br>可用命令：<br>give {物品id} {数量}<br>give {角色id} {等级} {星级}<br>give {武器id} {等级} {星级}";
      } else {
        alert("命令错误！");
      }
    }

    function hideConsole() {
      document.getElementById("consoleModal").classList.add("hidden");
    }

    function executeConsoleCommand() {
      const input = document.getElementById("consoleInput").value.trim();
      const log = document.getElementById("consoleLog");
      log.innerHTML += `<span class="text-green-400">&gt; ${input}</span><br>`;

      const parts = input.split(" ");
      if (parts[0].toLowerCase() === "give") {
        const id = parseInt(parts[1]);
        let amount = parseInt(parts[2]) || 1;

        if (id === 999) {
          // 魔药
          player.magicPotion += amount;
          document.getElementById("magicPotion").textContent = player.magicPotion;
          log.innerHTML += `已获得 ${amount} 个魔药<br>`;
        } else if (id >= 1 && id <= 15) {
          // 角色
          const level = parseInt(parts[2]) || 1;
          const stars = parseInt(parts[3]) || 0;
          player.owned.push({ id: Date.now(), charId: id, level: Math.min(level, 100), stars: Math.min(stars, 5), equippedWeapon: null });
          log.innerHTML += `已获得角色 ${characterPool.find(c => c.id === id).name} Lv.${level} ★${stars}<br>`;
        } else if (id >= 100 && id <= 115) {
          // 武器 (武器id = 角色id + 99)
          const weaponRealId = id - 99;
          const level = parseInt(parts[2]) || 1;
          const stars = parseInt(parts[3]) || 0;
          player.weapons.push({ id: Date.now(), weaponId: weaponRealId, level: Math.min(level, 100), stars: Math.min(stars, 5) });
          log.innerHTML += `已获得武器 ${weaponPool.find(w => w.id === weaponRealId).name} Lv.${level} ★${stars}<br>`;
        } else {
          log.innerHTML += `未知物品ID<br>`;
        }
        saveGame();
      } else {
        log.innerHTML += `未知命令<br>`;
      }
      document.getElementById("consoleInput").value = "";
      log.scrollTop = log.scrollHeight;
    }

    window.addEventListener('beforeunload', () => { localStorage.removeItem("gachaGame"); });

    window.onload = () => {
      loadGame();
      switchTab(0);
    };
  </script>
</body>
</html>
