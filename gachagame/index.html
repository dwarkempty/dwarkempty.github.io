<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>抽卡养成大冒险</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .card-r { border-color: #3b82f6; box-shadow: 0 0 15px #3b82f6; }
    .card-sr { border-color: #a855f7; box-shadow: 0 0 15px #a855f7; }
    .card-ssr { border-color: #eab308; box-shadow: 0 0 15px #eab308; }
    .card-ur { border-color: #ec4899; box-shadow: 0 0 12px #ec4899, 0 0 24px #8b5cf6, 0 0 36px #22d3ee; animation: rainbow-glow 2.5s linear infinite; }
    @keyframes rainbow-glow { 0% { box-shadow: 0 0 12px #ec4899, 0 0 24px #8b5cf6; } 33% { box-shadow: 0 0 12px #8b5cf6, 0 0 24px #22d3ee; } 66% { box-shadow: 0 0 12px #22d3ee, 0 0 24px #eab308; } 100% { box-shadow: 0 0 12px #ec4899, 0 0 24px #8b5cf6; } }
    .rarity-r { background: #3b82f6; }
    .rarity-sr { background: #a855f7; }
    .rarity-ssr { background: #eab308; }
    .rarity-ur { background: linear-gradient(90deg, #ec4899, #8b5cf6, #22d3ee, #eab308); background-size: 300% 300%; animation: gradient-shift 3s ease infinite; }
    @keyframes gradient-shift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .character-img { height: 160px; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6)); }
    .draw-card { animation: drawPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; opacity: 0; }
    @keyframes drawPop { 0% { transform: scale(0.3) rotate(-12deg); opacity: 0; } 70% { transform: scale(1.15) rotate(8deg); } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
    .draw-shine { animation: shine 1.8s ease infinite; }
    @keyframes shine { 0% { filter: brightness(1); } 50% { filter: brightness(1.6); } 100% { filter: brightness(1); } }
    .ms-cell { width: 42px; height: 42px; font-size: 22px; display: flex; align-items: center; justify-content: center; user-select: none; border: 2px solid #374151; }
    .star-1 { color: #22c55e; text-shadow: 0 0 8px #22c55e; }
    .star-2 { color: #3b82f6; text-shadow: 0 0 8px #3b82f6; }
    .star-3 { color: #a855f7; text-shadow: 0 0 8px #a855f7; }
    .star-4 { color: #eab308; text-shadow: 0 0 8px #eab308; }
    .star-5 { color: #ec4899; text-shadow: 0 0 12px #ec4899, 0 0 20px #22d3ee; animation: rainbow-star 1.5s linear infinite; }
    @keyframes rainbow-star { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
    .battle-slot { transition: all 0.3s; }
    .battle-slot.dead { opacity: 0.4; filter: grayscale(100%); pointer-events: none; }
    .enemy-slot { transition: all 0.3s; }
    .battle-log { max-height: 180px; overflow-y: auto; scrollbar-width: thin; background: #111827; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div class="max-w-6xl mx-auto p-3 sm:p-4 lg:p-6">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 sm:mb-8">
      <h1 class="text-3xl sm:text-4xl font-bold flex items-center gap-3">
        <i class="fas fa-dragon text-orange-400"></i> 抽卡养成大冒险
      </h1>
      <div class="flex items-center gap-2 bg-gray-900 px-5 py-2.5 sm:px-6 sm:py-3 rounded-2xl text-lg sm:text-xl">
        <i class="fas fa-gem text-cyan-400"></i>
        <span id="diamonds" class="font-bold">1000</span>
      </div>
    </div>

    <div class="flex flex-wrap gap-2 bg-gray-900 p-2 rounded-3xl mb-8 w-fit mx-auto">
      <button onclick="switchTab(0)" id="tab0" class="tab-btn active px-6 py-3 sm:px-8 sm:py-3 text-base sm:text-lg rounded-2xl font-medium">🃏 抽卡</button>
      <button onclick="switchTab(1)" id="tab1" class="tab-btn px-6 py-3 sm:px-8 sm:py-3 text-base sm:text-lg rounded-2xl font-medium">🏠 养成</button>
      <button onclick="switchTab(2)" id="tab2" class="tab-btn px-6 py-3 sm:px-8 sm:py-3 text-base sm:text-lg rounded-2xl font-medium">🔍 探索</button>
    </div>

    <!-- 抽卡界面 -->
    <div id="panel0" class="panel">
      <div class="text-center py-8 sm:py-12">
        <div class="flex justify-center gap-3 mb-6">
          <button onclick="setDrawPool('char')" id="poolCharBtn" class="pool-btn active px-6 py-2.5 rounded-2xl font-medium flex-1 sm:flex-none">🧙 角色池</button>
          <button onclick="setDrawPool('weapon')" id="poolWeaponBtn" class="pool-btn px-6 py-2.5 rounded-2xl font-medium flex-1 sm:flex-none">⚔️ 武器池</button>
        </div>
        <h2 id="poolTitle" class="text-2xl sm:text-3xl font-bold mb-6">角色池抽取</h2>
        
        <div class="flex flex-col sm:flex-row justify-center gap-4 sm:gap-6">
          <button onclick="drawCard(1)" class="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 px-8 sm:px-10 py-5 sm:py-6 rounded-3xl text-xl sm:text-2xl font-bold shadow-xl transition">单抽 <span class="text-yellow-300">100钻石</span></button>
          <button onclick="drawCard(10)" class="bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 px-8 sm:px-10 py-5 sm:py-6 rounded-3xl text-xl sm:text-2xl font-bold shadow-xl transition">十连 <span class="text-yellow-300">900钻石</span></button>
        </div>
        <p class="mt-8 text-gray-400 text-sm sm:text-base">概率：R 60% • SR 25% • SSR 12% • UR 3%</p>
        <p class="mt-2 text-emerald-400 text-xs sm:text-sm">保底：10抽必出SSR，80抽必出UR（提前出UR重置大保底）</p>
        
        <button onclick="showRecordModal()" class="mt-8 inline-flex items-center gap-2 bg-gray-800 hover:bg-gray-700 px-6 py-3 rounded-2xl text-base font-medium">
          <i class="fas fa-history"></i> 记录查询
        </button>
      </div>
    </div>

    <!-- 养成界面 -->
    <div id="panel1" class="panel hidden">
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
        <div class="flex gap-2">
          <button onclick="setInventoryTab(0)" id="invTab0" class="inv-tab active px-6 py-3 rounded-2xl font-medium">🧙 角色仓库</button>
          <button onclick="setInventoryTab(1)" id="invTab1" class="inv-tab px-6 py-3 rounded-2xl font-medium">⚔️ 武器仓库</button>
        </div>
        <div class="flex items-center gap-4 w-full sm:w-auto">
          <select id="sortSelect" onchange="currentSort = this.value; renderInventory()" class="bg-gray-800 text-white px-4 py-2.5 rounded-2xl border border-gray-700 focus:outline-none text-sm sm:text-base flex-1 sm:flex-none">
            <option value="rarity">排序：稀有度优先</option>
            <option value="stars">排序：星级优先</option>
            <option value="level">排序：等级优先</option>
          </select>
          <button onclick="toggleDecomposeMode()" id="decomposeBtn" class="px-6 py-2.5 bg-red-600 hover:bg-red-700 rounded-2xl font-medium flex items-center gap-2 whitespace-nowrap">
            <i class="fas fa-recycle"></i> 分解
          </button>
        </div>
      </div>

      <div id="decomposeBar" class="hidden bg-red-900/50 border border-red-500 rounded-3xl p-4 mb-6 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
        <div class="flex items-center gap-4">
          <span id="selectedCount" class="font-bold">已选 0 个</span>
          <span id="decomposeValue" class="text-yellow-300 font-bold">预计获得 0 钻石</span>
        </div>
        <div class="flex gap-3 w-full sm:w-auto">
          <button onclick="selectAll()" class="flex-1 sm:flex-none px-5 py-2 bg-gray-700 hover:bg-gray-600 rounded-2xl text-sm">全选（最多300个）</button>
          <button onclick="decomposeSelected()" class="flex-1 sm:flex-none px-8 py-2 bg-red-600 hover:bg-red-700 rounded-2xl font-bold">确认分解</button>
          <button onclick="toggleDecomposeMode()" class="flex-1 sm:flex-none px-5 py-2 bg-gray-700 hover:bg-gray-600 rounded-2xl text-sm">取消</button>
        </div>
      </div>

      <div id="inventory" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6"></div>
    </div>

    <!-- 探索界面 -->
    <div id="panel2" class="panel hidden text-center py-8 sm:py-12">
      <h2 class="text-3xl font-bold mb-8">🔍 探索</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 max-w-5xl mx-auto">
        <button onclick="getDiamonds()" id="diamondBtn" class="bg-emerald-600 hover:bg-emerald-700 p-6 rounded-3xl flex flex-col items-center gap-3 transition">
          <i class="fas fa-gem text-5xl"></i>
          <div>
            <div class="text-2xl font-bold">获取钻石</div>
            <div class="text-sm text-emerald-200">300~500钻石</div>
            <div id="diamondCooldown" class="text-xs text-emerald-300 mt-2"></div>
          </div>
        </button>
        <button onclick="openGambling()" class="bg-amber-600 hover:bg-amber-700 p-6 rounded-3xl flex flex-col items-center gap-3 transition">
          <i class="fas fa-dice text-5xl"></i>
          <div>
            <div class="text-2xl font-bold">赌博</div>
            <div class="text-sm text-amber-200">老虎机</div>
          </div>
        </button>
        <button onclick="openMinesweeper()" class="bg-red-600 hover:bg-red-700 p-6 rounded-3xl flex flex-col items-center gap-3 transition">
          <i class="fas fa-bomb text-5xl"></i>
          <div>
            <div class="text-2xl font-bold">扫雷</div>
            <div class="text-sm text-red-200">每标记一颗雷 +500钻石</div>
          </div>
        </button>
        <button onclick="showTeamSelection()" class="bg-gradient-to-r from-red-600 to-rose-600 hover:from-red-700 hover:to-rose-700 p-6 rounded-3xl flex flex-col items-center gap-3 transition text-xl font-bold">
          ⚔️ 战斗测试
        </button>
      </div>
    </div>
  </div>

  <!-- 抽卡动画Modal -->
  <div id="drawModal" onclick="if(event.target.id==='drawModal')hideDrawModal()" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[9999] p-4">
    <div class="max-w-[95vw] sm:max-w-5xl w-full bg-gray-900 rounded-3xl p-6 sm:p-8 relative">
      <div class="text-center mb-6 sm:mb-8"><h2 id="drawTitle" class="text-3xl sm:text-4xl font-bold text-yellow-300">🎉 抽卡结果</h2></div>
      <div id="drawResults" class="flex flex-wrap justify-center gap-4 sm:gap-6 min-h-[320px] sm:min-h-[420px]"></div>
      <div class="text-center mt-6 sm:mt-8"><button onclick="hideDrawModal()" class="w-full sm:w-auto px-12 py-4 bg-white text-black rounded-2xl font-bold text-xl hover:bg-yellow-300 transition">返回游戏</button></div>
    </div>
  </div>

  <!-- 角色详情弹窗 -->
  <div id="modal" onclick="if(event.target===this)hideModal()" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[10000] p-4">
    <div onclick="event.stopImmediatePropagation()" class="bg-gray-900 rounded-3xl max-w-full sm:max-w-lg w-full mx-auto overflow-hidden">
      <div id="modalContent" class="p-6"></div>
    </div>
  </div>

  <!-- 赌博Modal -->
  <div id="gamblingModal" onclick="if(event.target.id==='gamblingModal')hideGambling()" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[11000] p-4">
    <div class="bg-gray-900 rounded-3xl max-w-md w-full p-6">
      <h3 class="text-2xl font-bold text-center mb-6">🎰 老虎机</h3>
      <div id="slots" class="flex justify-center gap-4 mb-8 text-7xl">💎 🃏 🔥</div>
      <div class="text-center mb-6">
        <input id="betAmount" type="number" value="1000" min="100" max="10000" step="100" class="bg-gray-800 text-center text-3xl font-bold w-40 py-2 rounded-2xl">
        <span class="ml-2 text-gray-400">钻石</span>
      </div>
      <button onclick="spinSlots()" class="w-full py-5 bg-gradient-to-r from-amber-500 to-red-500 text-2xl font-bold rounded-3xl">开始转动</button>
      <p id="gamblingResult" class="text-center mt-6 min-h-[28px] text-lg"></p>
      <button onclick="hideGambling()" class="mt-6 text-gray-400 block mx-auto">关闭</button>
    </div>
  </div>

  <!-- 扫雷Modal -->
  <div id="minesweeperModal" onclick="if(event.target.id==='minesweeperModal')hideMinesweeper()" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[11000] p-4">
    <div class="bg-gray-900 rounded-3xl w-full max-w-2xl">
      <div class="p-6">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-2xl font-bold">💣 扫雷</h3>
          <div class="flex gap-3">
            <button onclick="startMinesweeper(8,8,10)" class="px-4 py-1 bg-green-600 rounded-xl text-sm">简单</button>
            <button onclick="startMinesweeper(10,10,20)" class="px-4 py-1 bg-yellow-600 rounded-xl text-sm">中等</button>
            <button onclick="startMinesweeper(12,12,30)" class="px-4 py-1 bg-red-600 rounded-xl text-sm">困难</button>
          </div>
          <div id="mineScore" class="text-xl font-bold text-yellow-400">0 钻石</div>
        </div>
        <div id="minesweeperBoard" class="grid mx-auto gap-px bg-gray-700 p-2 rounded-2xl" style="width: fit-content;"></div>
        <div class="text-center mt-6">
          <button onclick="stopMinesweeper()" class="px-8 py-3 bg-gray-700 hover:bg-gray-600 rounded-2xl">停止游戏（保存当前收益）</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 记录查询Modal -->
  <div id="recordModal" onclick="if(event.target.id==='recordModal')hideRecordModal()" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[12000] p-4">
    <div class="bg-gray-900 rounded-3xl max-w-lg w-full p-8">
      <h2 class="text-3xl font-bold text-center mb-6">📊 抽卡记录</h2>
      <div class="flex gap-2 mb-6">
        <button onclick="setRecordTab(0)" id="recordTab0" class="record-tab active flex-1 py-2 rounded-2xl">角色记录</button>
        <button onclick="setRecordTab(1)" id="recordTab1" class="record-tab flex-1 py-2 rounded-2xl">武器记录</button>
      </div>
      <div id="recordContent"></div>
      <div class="pt-6 border-t border-gray-700 flex flex-col sm:flex-row gap-3">
        <button onclick="exportSave()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 py-3 rounded-2xl text-base font-medium flex items-center justify-center gap-2">
          <i class="fas fa-download"></i> 导出存档
        </button>
        <button onclick="document.getElementById('importFile').click()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 py-3 rounded-2xl text-base font-medium flex items-center justify-center gap-2">
          <i class="fas fa-upload"></i> 导入存档
        </button>
        <input type="file" id="importFile" accept=".json" class="hidden" onchange="importSave(event)">
      </div>
      <button onclick="hideRecordModal()" class="mt-8 w-full py-4 bg-white text-black rounded-2xl text-xl font-bold">关闭</button>
    </div>
  </div>

  <!-- 战斗前选人界面 -->
  <div id="teamSelectModal" onclick="if(event.target.id==='teamSelectModal')hideTeamSelection()" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[13000] p-4">
    <div class="bg-gray-900 rounded-3xl w-full max-w-7xl max-h-[92vh] overflow-hidden flex flex-col">
      <div class="p-6 border-b border-gray-700 flex justify-between items-center">
        <h2 class="text-3xl font-bold">⚔️ 战斗前选人界面</h2>
        <button onclick="hideTeamSelection()" class="text-red-400 text-2xl">✕</button>
      </div>
      <div class="flex-1 flex overflow-hidden">
        <!-- 左：角色仓库 -->
        <div class="w-2/3 p-6 overflow-y-auto border-r border-gray-700">
          <h3 class="text-xl mb-4 flex items-center gap-2"><span class="text-2xl">🧙</span> 角色仓库 (排序逻辑不变)</h3>
          <div id="teamSelectInventory" class="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>
        <!-- 右：阵型 -->
        <div class="w-1/3 p-6 bg-gray-950 flex flex-col">
          <h3 class="text-xl mb-6 flex items-center gap-2"><span class="text-2xl">⚔️</span> 我的阵型</h3>
          <div class="flex-1 grid grid-cols-2 gap-6">
            <div onclick="selectPosition(2)" id="pos-back-a" class="border-2 border-dashed border-blue-400 hover:border-blue-500 rounded-3xl p-8 flex flex-col items-center justify-center cursor-pointer transition-all">
              <div class="text-4xl mb-3">🏹</div>
              <div class="font-bold text-lg">后排 a</div>
            </div>
            <div onclick="selectPosition(1)" id="pos-front-a" class="border-2 border-dashed border-red-400 hover:border-red-500 rounded-3xl p-8 flex flex-col items-center justify-center cursor-pointer transition-all">
              <div class="text-4xl mb-3">🛡️</div>
              <div class="font-bold text-lg">前排 a</div>
            </div>
            <div onclick="selectPosition(3)" id="pos-back-b" class="border-2 border-dashed border-blue-400 hover:border-blue-500 rounded-3xl p-8 flex flex-col items-center justify-center cursor-pointer transition-all">
              <div class="text-4xl mb-3">🏹</div>
              <div class="font-bold text-lg">后排 b</div>
            </div>
            <div onclick="selectPosition(0)" id="pos-front-b" class="border-2 border-dashed border-red-400 hover:border-red-500 rounded-3xl p-8 flex flex-col items-center justify-center cursor-pointer transition-all">
              <div class="text-4xl mb-3">🛡️</div>
              <div class="font-bold text-lg">前排 b</div>
            </div>
          </div>
          <button onclick="startBattle()" class="mt-auto py-6 bg-red-600 hover:bg-red-700 text-2xl font-bold rounded-3xl flex items-center justify-center gap-3">
            <i class="fas fa-swords"></i> 开始战斗
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 战斗主界面 -->
  <div id="battleModal" class="hidden fixed inset-0 bg-black/95 flex flex-col z-[14000]">
    <div class="flex-1 max-w-7xl mx-auto w-full p-4 flex flex-col">
      <!-- 顶部 -->
      <div class="flex justify-between items-center mb-4">
        <div class="flex items-center gap-3 bg-gray-900 px-8 py-4 rounded-3xl text-xl">
          <span>当前能量点</span>
          <span id="battleEnergy" class="text-5xl font-bold text-yellow-300">4</span>
          <span class="text-gray-400">/6</span>
        </div>
        <button onclick="endBattle()" class="px-8 py-4 bg-gray-800 hover:bg-red-600 rounded-3xl text-lg font-medium flex items-center gap-2">
          <i class="fas fa-sign-out-alt"></i> 退出战斗
        </button>
      </div>

      <div class="flex flex-1 gap-8">
        <!-- 我方 -->
        <div class="flex-1 flex flex-col justify-center gap-8">
          <div class="grid grid-cols-2 gap-6">
            <div onclick="openBattleCharacterPanel(2)" id="player-back-a" class="battle-slot border-4 border-blue-500 rounded-3xl p-6 cursor-pointer"></div>
            <div onclick="openBattleCharacterPanel(1)" id="player-front-a" class="battle-slot border-4 border-red-500 rounded-3xl p-6 cursor-pointer"></div>
            <div onclick="openBattleCharacterPanel(3)" id="player-back-b" class="battle-slot border-4 border-blue-500 rounded-3xl p-6 cursor-pointer"></div>
            <div onclick="openBattleCharacterPanel(0)" id="player-front-b" class="battle-slot border-4 border-red-500 rounded-3xl p-6 cursor-pointer"></div>
          </div>
        </div>

        <!-- 敌人 -->
        <div class="flex flex-col justify-center gap-8 w-80">
          <div onclick="selectTarget(0)" id="enemy-0" class="enemy-slot border-4 border-orange-500 rounded-3xl p-8 cursor-pointer"></div>
          <div onclick="selectTarget(1)" id="enemy-1" class="enemy-slot border-4 border-orange-500 rounded-3xl p-8 cursor-pointer"></div>
        </div>
      </div>

      <!-- 实时信息 -->
      <div class="mt-6 bg-gray-900 rounded-3xl p-6">
        <div class="flex justify-between items-center mb-3">
          <div class="text-2xl font-bold">战斗实时信息</div>
          <button onclick="endPlayerTurn()" class="px-10 py-3 bg-emerald-600 hover:bg-emerald-700 rounded-3xl text-xl font-bold flex items-center gap-2">
            结束本回合 <i class="fas fa-arrow-right"></i>
          </button>
        </div>
        <div id="battleLog" class="battle-log text-sm p-4 rounded-2xl h-48 overflow-auto"></div>
      </div>
    </div>
  </div>

  <!-- 战斗中点击角色界面 -->
  <div id="battleCharModal" onclick="if(event.target.id==='battleCharModal')hideBattleCharModal()" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[15000] p-4">
    <div onclick="event.stopImmediatePropagation()" class="bg-gray-900 rounded-3xl max-w-4xl w-full p-8">
      <div class="flex gap-8">
        <!-- 立绘 -->
        <div class="flex-1">
          <div class="text-3xl font-bold mb-4 text-center" id="battleCharName"></div>
          <img id="battleCharIllust" src="" class="w-full rounded-3xl shadow-2xl" style="height:420px;object-fit:contain">
        </div>
        <!-- 属性 -->
        <div class="flex-1 space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div class="bg-gray-800 rounded-2xl p-4"><div class="text-xs text-gray-400">等级</div><div id="battleCharLevel" class="text-3xl font-bold"></div></div>

    const weaponPool = [
      {id:1, name:"森林魔杖", rarity:"R", image:"images/ForestWand.jpg"},

      {id:9, name:"圣辉王剑", rarity:"SSR", image:"images/HolyRadianceKingSword.jpg"},

      {id:11, name:"凤凰圣杖", rarity:"SSR", image:"images/NirvanaHolyStaff.jpg"},
      {id:12, name:"幻月弓", rarity:"SSR", image:"images/PhantomLongbow.jpg"},
      {id:13, name:"创世轮", rarity:"UR", image:"images/ChronoWheel.jpg"},
      {id:14, name:"起源法杖", rarity:"UR", image:"images/GenesisOriginStaff.jpg"},
      {id:15, name:"永恒时轮", rarity:"UR", image:"images/AmethystSummoningStaff.jpg"}
    ];

    const decomposeValue = { R: 10, SR: 50, SSR: 200, UR: 1000 };

    // ====================== 战斗系统核心类 ======================
    class BattleCharacter {
      constructor(poolData, ownedData, position) {
        this.charId = ownedData.charId;
        this.name = poolData.name;
        this.rarity = poolData.rarity;
        this.level = ownedData.level || 1;
        this.stars = ownedData.stars || 0;
        this.equippedWeapon = ownedData.equippedWeapon;
        this.baseHP = poolData.baseHP;
        this.baseATK = poolData.baseATK;
        this.baseDEF = poolData.baseDEF;
        this.type = poolData.type;
        this.skills = poolData.skills || [];
        this.currentHP = this.getMaxHP();
        this.position = position;
        this.buffs = [];
        this.isDead = false;
        this.hasActed = false;
      }
      getMaxHP() {
        return Math.floor(this.baseHP * Math.pow(1.06, this.level - 1) * (1 + this.stars * 0.25));
      }
      getCombatStats() {
        let atk = Math.floor(this.baseATK * Math.pow(1.06, this.level - 1) * (1 + this.stars * 0.25));
        let def = Math.floor(this.baseDEF * Math.pow(1.06, this.level - 1) * (1 + this.stars * 0.25));
        return { atk, def, hp: this.currentHP };
      }
    }

    const BattleSystem = {
      playerTeam: new Array(4).fill(null),
      enemyTeam: [
        { name: "哥布林战士", hp: 800, maxHP: 800, atk: 65, def: 40, isDead: false },
        { name: "森林魔狼", hp: 650, maxHP: 650, atk: 85, def: 25, isDead: false }
      ],
      energy: 4,
      maxEnergy: 6,
      turn: 1,
      log: [],
      actingChar: null,

      addLog(msg) {
        this.log.unshift(`[回合 ${this.turn}] ${msg}`);
        if (this.log.length > 20) this.log.pop();
        const el = document.getElementById('battleLog');
        if (el) el.innerHTML = this.log.map(l => `<div class="py-0.5">${l}</div>`).join('');
      },

      renderBattleUI() {
        // 我方4位置
        const posIds = ['player-front-b', 'player-front-a', 'player-back-a', 'player-back-b'];
        for (let i = 0; i < 4; i++) {
          const slot = document.getElementById(posIds[i]);
          const char = this.playerTeam[i];
          if (char && !char.isDead) {
            slot.innerHTML = `
              <div class="text-center">
                <img src="${characterPool.find(c => c.id === char.charId).image}" class="w-24 h-24 mx-auto rounded-2xl object-contain">
                <div class="font-bold text-sm mt-2">${char.name}</div>
                <div class="text-emerald-400 text-xs">${char.currentHP}/${char.getMaxHP()}</div>
              </div>`;
            slot.classList.remove('dead');
          } else if (char && char.isDead) {
            slot.classList.add('dead');
            slot.innerHTML = `<div class="text-red-400 text-center">💀 已阵亡</div>`;
          } else {
            slot.innerHTML = `<div class="text-gray-400 text-xs text-center">空位</div>`;
          }
        }
        // 敌人
        for (let i = 0; i < 2; i++) {
          const slot = document.getElementById(`enemy-${i}`);
          const e = this.enemyTeam[i];
          if (!e.isDead) {
            slot.innerHTML = `
              <div class="text-center">
                <div class="text-6xl mb-2">👹</div>
                <div class="font-bold">${e.name}</div>
                <div class="text-red-400 text-sm">${e.hp}/${e.maxHP}</div>
              </div>`;
          } else {
            slot.innerHTML = `<div class="text-gray-500 text-center text-sm">已阵亡</div>`;
          }
        }
        document.getElementById('battleEnergy').textContent = this.energy;
      },

      checkDeath() {
        this.playerTeam.forEach(c => { if (c && c.currentHP <= 0) c.isDead = true; });
        this.enemyTeam.forEach(e => { if (e.hp <= 0) e.isDead = true; });
        if (this.enemyTeam.every(e => e.isDead)) {
          this.addLog('🎉 全敌阵亡！战斗胜利！获得 300 钻石');
          player.diamonds += 300;
          document.getElementById('diamonds').textContent = player.diamonds;
          setTimeout(() => endBattle(true), 1200);
        }
        if (this.playerTeam.every(c => !c || c.isDead)) {
          this.addLog('💀 我方全灭……战斗失败');
          setTimeout(() => endBattle(false), 1200);
        }
      },

      executeSkill(attacker, skillIndex, targetIndex) {
        const skill = attacker.skills[skillIndex];
        if (!skill) return;
        const cost = skill.cost || 1;
        if (this.energy < cost) return this.addLog('能量不足！');
        this.energy -= cost;
        this.addLog(`${attacker.name} 释放 ${skill.name}`);
        // 简化伤害计算（实际可按描述.txt 精确实现每个技能）
        if (targetIndex >= 0) {
          const target = this.enemyTeam[targetIndex];
          if (target && !target.isDead) {
            const dmg = Math.floor(attacker.getCombatStats().atk * 1.2);
            target.hp = Math.max(0, target.hp - dmg);
            this.addLog(`对 ${target.name} 造成 ${dmg} 伤害`);
          }
        }
        attacker.hasActed = true;
        this.checkDeath();
        this.renderBattleUI();
      },

      enemyTurn() {
        this.addLog('=== 敌人回合 ===');
        this.enemyTeam.forEach((enemy, i) => {
          if (enemy.isDead) return;
          const target = this.playerTeam[Math.floor(Math.random() * 4)];
          if (target && !target.isDead) {
            const dmg = Math.floor(enemy.atk * 0.9);
            target.currentHP = Math.max(0, target.currentHP - dmg);
            this.addLog(`${enemy.name} 攻击 ${target.name}，造成 ${dmg} 伤害`);
          }
        });
        this.checkDeath();
        this.renderBattleUI();
      }
    };

    // ====================== 工具函数 ======================
    function saveGame() {
      localStorage.setItem('gachaGame', JSON.stringify(player));
    }

    function loadGame() {
      const saved = localStorage.getItem('gachaGame');
      if (saved) {
        player = JSON.parse(saved);
        document.getElementById('diamonds').textContent = player.diamonds;
      }
    }

    function switchTab(n) {
      document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
      const panel = document.getElementById('panel' + n);
      if (panel) panel.classList.remove('hidden');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'bg-white', 'text-black'));
      document.getElementById('tab' + n).classList.add('active', 'bg-white', 'text-black');
      if (n === 1) renderInventory();
    }

    function setDrawPool(type) {
      currentDrawPool = type;
      document.getElementById('poolCharBtn').classList.toggle('active', type === 'char');
      document.getElementById('poolWeaponBtn').classList.toggle('active', type === 'weapon');
      document.getElementById('poolTitle').textContent = type === 'char' ? '角色池抽取' : '武器池抽取';
    }

    function drawCard(count) {
      const cost = count === 1 ? 100 : 900;
      if (player.diamonds < cost) return alert('钻石不足！');
      player.diamonds -= cost;
      document.getElementById('diamonds').textContent = player.diamonds;

      const results = [];
      for (let i = 0; i < count; i++) {
        const isChar = currentDrawPool === 'char';
        const pool = isChar ? characterPool : weaponPool;
        let roll = Math.random() * 100;
        let rarity;
        if (roll < 60) rarity = 'R';
        else if (roll < 85) rarity = 'SR';
        else if (roll < 97) rarity = 'SSR';
        else rarity = 'UR';

        const filtered = pool.filter(c => c.rarity === rarity);
        const item = filtered[Math.floor(Math.random() * filtered.length)];

        if (isChar) {
          const existing = player.owned.find(o => o.charId === item.id);
          const newChar = {
            id: Date.now() + i,
            charId: item.id,
            level: 1,
            stars: 0,
            equippedWeapon: null
          };
          player.owned.unshift(newChar);
          results.push({ ...item, ownedId: newChar.id, isChar: true });
        } else {
          const newWeapon = { id: Date.now() + i, weaponId: item.id };
          player.weapons.unshift(newWeapon);
          results.push({ ...item, isChar: false });
        }
      }
      showDrawResults(results);
      saveGame();
    }

    function showDrawResults(results) {
      const modal = document.getElementById('drawModal');
      const container = document.getElementById('drawResults');
      container.innerHTML = '';
      results.forEach((r, i) => {
        const div = document.createElement('div');
        div.className = `draw-card card-${r.rarity.toLowerCase()} bg-gray-800 rounded-3xl p-4 w-40 text-center`;
        div.innerHTML = `
          <img src="${r.image}" class="character-img mx-auto">
          <div class="mt-3 font-bold">${r.name}</div>
          <div class="rarity-${r.rarity.toLowerCase()} text-white text-xs px-4 py-1 rounded-2xl inline-block">${r.rarity}</div>
        `;
        container.appendChild(div);
      });
      modal.classList.remove('hidden');
    }

    function hideDrawModal() {
      document.getElementById('drawModal').classList.add('hidden');
    }

    function renderInventory() {
      const container = document.getElementById('inventory');
      container.innerHTML = '';
      let list = currentInventoryTab === 0 ? player.owned : player.weapons;
      const isChar = currentInventoryTab === 0;

      // 排序
      if (currentSort === 'stars') list.sort((a, b) => (b.stars || 0) - (a.stars || 0));
      else if (currentSort === 'level') list.sort((a, b) => (b.level || 1) - (a.level || 1));
      else list.sort((a, b) => {
        const ra = isChar ? characterPool.find(c => c.id === a.charId).rarity : weaponPool.find(w => w.id === a.weaponId).rarity;
        const rb = isChar ? characterPool.find(c => c.id === b.charId).rarity : weaponPool.find(w => w.id === b.weaponId).rarity;
        const order = { UR: 4, SSR: 3, SR: 2, R: 1 };
        return order[rb] - order[ra];
      });

      list.forEach((item, index) => {
        const poolData = isChar ? characterPool.find(c => c.id === item.charId) : weaponPool.find(w => w.id === item.weaponId);
        const div = document.createElement('div');
        div.className = `card-${poolData.rarity.toLowerCase()} bg-gray-900 rounded-3xl p-4 cursor-pointer border-2`;
        if (isChar) {
          div.innerHTML = `
            <img src="${poolData.image}" class="character-img mx-auto">
            <div class="font-bold text-center mt-2">${poolData.name}</div>
            <div class="flex justify-center gap-1 mt-2">
              ${Array(5).fill(0).map((_, i) => `<span class="star-${Math.min(item.stars || 0, 5)}">★</span>`).join('')}
            </div>
            <div class="text-xs text-center text-gray-400">Lv.${item.level || 1}</div>
          `;
          div.onclick = () => showCharacterDetail(index);
        } else {
          div.innerHTML = `<img src="${poolData.image}" class="character-img mx-auto"><div class="font-bold text-center mt-2">${poolData.name}</div>`;
          div.onclick = () => showWeaponDetail(index);
        }
        if (decomposeMode) {
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.className = 'absolute top-3 right-3';
          cb.dataset.index = index;
          cb.onchange = (e) => toggleSelect(e.target);
          div.style.position = 'relative';
          div.appendChild(cb);
        }
        container.appendChild(div);
      });
    }

    function showCharacterDetail(index) {
      currentModalIndex = index;
      const item = player.owned[index];
      const data = characterPool.find(c => c.id === item.charId);
      const html = `
        <div class="flex flex-col items-center">
          <img src="${data.image}" class="character-img mb-4">
          <h2 class="text-2xl font-bold">${data.name}</h2>
          <div class="flex gap-6 mt-6 w-full">
            <div>等级 <span class="font-mono">${item.level}</span></div>
            <div>星级 <span class="font-mono">${'★'.repeat(item.stars || 0)}</span></div>
          </div>
          <div class="mt-8 grid grid-cols-2 gap-4 w-full">
            <button onclick="equipWeapon()" class="py-4 bg-teal-600 hover:bg-teal-700 rounded-2xl">装备选中武器</button>
            <button onclick="levelUp()" class="py-4 bg-blue-600 hover:bg-blue-700 rounded-2xl">升级 Lv.${item.level} → ${item.level+1}</button>
            <button onclick="starUp()" class="py-4 bg-purple-600 hover:bg-purple-700 rounded-2xl">升星 ★${item.stars || 0} → ★${(item.stars || 0)+1}</button>
          </div>
          <button onclick="hideModal()" class="mt-8 text-gray-400">关闭</button>
        </div>`;
      document.getElementById('modalContent').innerHTML = html;
      document.getElementById('modal').classList.remove('hidden');
    }

    function equipWeapon() {
      if (currentModalIndex === null) return;
      alert('武器装备功能已保留（后续可扩展）');
      hideModal();
      renderInventory();
    }

    function levelUp() {
      if (currentModalIndex === null) return;
      const item = player.owned[currentModalIndex];
      const cost = item.level * 30;
      if (player.diamonds < cost) return alert('钻石不够！');
      player.diamonds -= cost;
      item.level = Math.min(item.level + 1, 100);
      document.getElementById('diamonds').textContent = player.diamonds;
      saveGame();
      showCharacterDetail(currentModalIndex);
    }

    function starUp() {
      if (currentModalIndex === null) return;
      const item = player.owned[currentModalIndex];
      if (item.stars >= 5) return alert('已经满星！');
      const dupIndex = player.owned.findIndex(o => o.charId === item.charId && o.id !== item.id);
      if (dupIndex === -1) return alert('没有可用的相同角色材料！');
      player.owned.splice(dupIndex, 1);
      item.stars++;
      saveGame();
      showCharacterDetail(currentModalIndex);
    }

    function showWeaponDetail(index) {
      alert('武器暂不支持单独升级，可直接装备到对应角色！');
    }

    function hideModal() {
      document.getElementById('modal').classList.add('hidden');
      currentModalIndex = null;
      renderInventory();
    }

    function toggleDecomposeMode() {
      decomposeMode = !decomposeMode;
      const btn = document.getElementById('decomposeBtn');
      btn.innerHTML = decomposeMode ? `<i class="fas fa-times"></i> 退出分解` : `<i class="fas fa-recycle"></i> 分解`;
      document.getElementById('decomposeBar').classList.toggle('hidden', !decomposeMode);
      renderInventory();
    }

    function toggleSelect(cb) {
      const index = parseInt(cb.dataset.index);
      if (cb.checked) selected.push(index);
      else selected = selected.filter(i => i !== index);
      updateDecomposeBar();
    }

    function updateDecomposeBar() {
      const count = selected.length;
      let value = 0;
      const list = currentInventoryTab === 0 ? player.owned : player.weapons;
      selected.forEach(i => {
        const item = list[i];
        const data = currentInventoryTab === 0 ? characterPool.find(c => c.id === item.charId) : weaponPool.find(w => w.id === item.weaponId);
        value += decomposeValue[data.rarity];
      });
      document.getElementById('selectedCount').textContent = `已选 ${count} 个`;
      document.getElementById('decomposeValue').textContent = `预计获得 ${value} 钻石`;
    }

    function selectAll() {
      selected = [];
      const checkboxes = document.querySelectorAll('#inventory input[type="checkbox"]');
      const max = Math.min(checkboxes.length, 300);
      for (let i = 0; i < max; i++) {
        checkboxes[i].checked = true;
        selected.push(parseInt(checkboxes[i].dataset.index));
      }
      updateDecomposeBar();
    }

    function decomposeSelected() {
      if (selected.length === 0) return;
      if (selected.length > 300) return alert('一次最多分解300个！');
      const isChar = currentInventoryTab === 0;
      const list = isChar ? player.owned : player.weapons;
      let total = 0;
      selected.sort((a, b) => b - a).forEach(i => {
        const item = list[i];
        const data = isChar ? characterPool.find(c => c.id === item.charId) : weaponPool.find(w => w.id === item.weaponId);
        total += decomposeValue[data.rarity];
        list.splice(i, 1);
      });
      player.diamonds += total;
      document.getElementById('diamonds').textContent = player.diamonds;
      saveGame();
      alert(`✅ 已分解 ${selected.length} 个，获得 ${total} 钻石！`);
      selected = [];
      decomposeMode = false;
      document.getElementById('decomposeBar').classList.add('hidden');
      renderInventory();
    }

    function setInventoryTab(n) {
      currentInventoryTab = n;
      document.querySelectorAll('.inv-tab').forEach((b, i) => b.classList.toggle('active', i === n));
      renderInventory();
    }

    function getDiamonds() {
      if (Date.now() - (player.lastDiamondTime || 0) < 10000) return;
      const amount = Math.floor(Math.random() * 201) + 300;
      player.diamonds += amount;
      document.getElementById('diamonds').textContent = player.diamonds;
      player.lastDiamondTime = Date.now();
      saveGame();
      const btn = document.getElementById('diamondBtn');
      btn.classList.add('opacity-50', 'cursor-not-allowed');
      const cd = document.getElementById('diamondCooldown');
      let t = 10;
      const timer = setInterval(() => {
        t--;
        cd.textContent = `${t}秒后可再次获取`;
        if (t <= 0) {
          clearInterval(timer);
          btn.classList.remove('opacity-50', 'cursor-not-allowed');
          cd.textContent = '';
        }
      }, 1000);
    }

    function openGambling() {
      document.getElementById('gamblingModal').classList.remove('hidden');
      document.getElementById('gamblingResult').innerHTML = '';
    }

    function hideGambling() {
      document.getElementById('gamblingModal').classList.add('hidden');
    }

    function spinSlots() {
      const bet = parseInt(document.getElementById('betAmount').value);
      if (bet < 100 || bet > 10000 || bet > player.diamonds) return alert('下注金额不正确！');
      player.diamonds -= bet;
      document.getElementById('diamonds').textContent = player.diamonds;
      const symbols = ['💎', '🃏', '🔥', '🌟', '⚡', '🧊'];
      const r1 = symbols[Math.floor(Math.random() * symbols.length)];
      const r2 = symbols[Math.floor(Math.random() * symbols.length)];
      const r3 = symbols[Math.floor(Math.random() * symbols.length)];
      document.getElementById('slots').innerHTML = `${r1} ${r2} ${r3}`;
      let win = 0;
      if (r1 === r2 && r2 === r3) win = bet * 8;
      else if (r1 === r2 || r2 === r3) win = bet * 2;
      if (win > 0) {
        player.diamonds += win;
        document.getElementById('diamonds').textContent = player.diamonds;
        document.getElementById('gamblingResult').innerHTML = `<span class="text-green-400">🎉 恭喜中奖！获得 ${win} 钻石</span>`;
      } else {
        document.getElementById('gamblingResult').innerHTML = `<span class="text-red-400">😢 未中奖</span>`;
      }
      saveGame();
    }

    function openMinesweeper() {
      document.getElementById('minesweeperModal').classList.remove('hidden');
      startMinesweeper(8, 8, 10);
    }

    function hideMinesweeper() {
      document.getElementById('minesweeperModal').classList.add('hidden');
    }

    let mineRows, mineCols, mineCount, currentMinesweeperScore = 0, minesweeperBoard = [];
    function startMinesweeper(rows, cols, mines) {
      mineRows = rows; mineCols = cols; mineCount = mines;
      currentMinesweeperScore = 0;
      document.getElementById('mineScore').textContent = '0 钻石';
      minesweeperBoard = Array(rows).fill().map(() => Array(cols).fill().map(() => ({revealed: false, mine: false, flagged: false, adjacent: 0})));
      let placed = 0;
      while (placed < mines) {
        const r = Math.floor(Math.random() * rows);
        const c = Math.floor(Math.random() * cols);
        if (!minesweeperBoard[r][c].mine) {
          minesweeperBoard[r][c].mine = true;
          placed++;
        }
      }
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (minesweeperBoard[r][c].mine) continue;
          let count = 0;
          for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
              if (dr === 0 && dc === 0) continue;
              const nr = r + dr, nc = c + dc;
              if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && minesweeperBoard[nr][nc].mine) count++;
            }
          }
          minesweeperBoard[r][c].adjacent = count;
        }
      }
      renderMinesweeperBoard();
    }

    function renderMinesweeperBoard() {
      const boardEl = document.getElementById('minesweeperBoard');
      boardEl.innerHTML = '';
      boardEl.style.gridTemplateColumns = `repeat(${mineCols}, 42px)`;
      for (let r = 0; r < mineRows; r++) {
        for (let c = 0; c < mineCols; c++) {
          const cell = document.createElement('div');
          cell.className = 'ms-cell bg-gray-600 border border-gray-400 hover:bg-gray-500 rounded cursor-pointer flex items-center justify-center text-xl font-bold';
          cell.dataset.r = r; cell.dataset.c = c;
          cell.addEventListener('click', handleMineClick);
          cell.addEventListener('contextmenu', (e) => { e.preventDefault(); handleMineFlag(r, c); });
          boardEl.appendChild(cell);
        }
      }
    }

    function handleMineClick(e) {
      const r = parseInt(e.target.dataset.r);
      const c = parseInt(e.target.dataset.c);
      const cellData = minesweeperBoard[r][c];
      if (cellData.revealed || cellData.flagged) return;
      if (cellData.mine) {
        alert('💥 踩雷了！');
        hideMinesweeper();
        return;
      }
      floodFill(r, c);
    }

    function floodFill(r, c) {
      if (r < 0 || r >= mineRows || c < 0 || c >= mineCols) return;
      const cellData = minesweeperBoard[r][c];
      if (cellData.revealed || cellData.flagged || cellData.mine) return;
      cellData.revealed = true;
      const cellEl = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
      if (cellEl) {
        cellEl.classList.add('bg-gray-800');
        if (cellData.adjacent > 0) {
          cellEl.textContent = cellData.adjacent;
          cellEl.style.color = ['#1e90ff','#00b700','#ff0000','#800080','#ffa500','#00ffff','#000000','#808080'][cellData.adjacent-1];
        }
      }
      if (cellData.adjacent === 0) {
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            floodFill(r + dr, c + dc);
          }
        }
      }
    }

    function handleMineFlag(r, c) {
      const cellData = minesweeperBoard[r][c];
      if (cellData.revealed) return;
      cellData.flagged = !cellData.flagged;
      const cellEl = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
      if (cellEl) cellEl.textContent = cellData.flagged ? '🚩' : '';
      if (cellData.flagged && cellData.mine) {
        currentMinesweeperScore += 500;
        document.getElementById('mineScore').textContent = `${currentMinesweeperScore} 钻石`;
      }
    }

    function stopMinesweeper() {
      player.diamonds += currentMinesweeperScore;
      document.getElementById('diamonds').textContent = player.diamonds;
      saveGame();
      hideMinesweeper();
      alert(`🎉 扫雷结束！获得 ${currentMinesweeperScore} 钻石`);
    }

    function showRecordModal() {
      const isCharTab = currentRecordTab === 0;
      const total = isCharTab ? (player.totalCharDraws || 0) : (player.totalWeaponDraws || 0);
      let html = `
        <div class="space-y-6">
          <div class="flex justify-between text-xl"><span>${isCharTab ? '角色' : '武器'}总抽卡次数</span><span class="font-bold">${total}</span></div>
          <div class="grid grid-cols-2 gap-6">
            <div class="text-center"><div class="text-sm text-gray-400">R</div><div class="text-4xl font-bold text-blue-400">${isCharTab ? player.rCount : player.wR}</div></div>
            <div class="text-center"><div class="text-sm text-gray-400">SR</div><div class="text-4xl font-bold text-purple-400">${isCharTab ? player.srCount : player.wSR}</div></div>
            <div class="text-center"><div class="text-sm text-gray-400">SSR</div><div class="text-4xl font-bold text-yellow-400">${isCharTab ? player.ssrCount : player.wSSR}</div></div>
            <div class="text-center"><div class="text-sm text-gray-400">UR</div><div class="text-4xl font-bold text-orange-400">${isCharTab ? player.urCount : player.wUR}</div></div>
          </div>
        </div>`;
      document.getElementById('recordContent').innerHTML = html;
      document.getElementById('recordModal').classList.remove('hidden');
    }

    function hideRecordModal() {
      document.getElementById('recordModal').classList.add('hidden');
    }

    function setRecordTab(n) {
      currentRecordTab = n;
      document.querySelectorAll('.record-tab').forEach((b, i) => b.classList.toggle('active', i === n));
      showRecordModal();
    }

    function exportSave() {
      const dataStr = JSON.stringify(player, null, 2);
      const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
      const link = document.createElement('a');
      link.setAttribute('href', dataUri);
      link.setAttribute('download', 'gacha-save.json');
      link.click();
      alert('✅ 存档已导出！');
    }

    function importSave(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        try {
          player = JSON.parse(ev.target.result);
          document.getElementById('diamonds').textContent = player.diamonds || 1000;
          saveGame();
          alert('✅ 存档导入成功！');
          hideRecordModal();
          renderInventory();
        } catch(err) { alert('❌ 文件格式错误'); }
      };
      reader.readAsText(file);
      e.target.value = '';
    }

    // ====================== 战斗相关函数 ======================
    function showTeamSelection() {
      document.getElementById('teamSelectModal').classList.remove('hidden');
      renderTeamSelectInventory();
      BattleSystem.playerTeam = new Array(4).fill(null);
    }

    function hideTeamSelection() {
      document.getElementById('teamSelectModal').classList.add('hidden');
    }

    function renderTeamSelectInventory() {
      const container = document.getElementById('teamSelectInventory');
      container.innerHTML = '';
      player.owned.forEach((owned, idx) => {
        const data = characterPool.find(c => c.id === owned.charId);
        if (!data) return;
        const div = document.createElement('div');
        div.className = `card-${data.rarity.toLowerCase()} bg-gray-900 rounded-3xl p-3 cursor-pointer border-2`;
        div.innerHTML = `
          <img src="${data.image}" class="w-20 h-20 mx-auto object-contain rounded-2xl">
          <div class="text-center text-sm font-bold mt-2">${data.name}</div>
        `;
        div.onclick = () => addToTeam(owned, idx);
        container.appendChild(div);
      });
    }

    function addToTeam(owned, idx) {
      const emptySlot = BattleSystem.playerTeam.findIndex(slot => slot === null);
      if (emptySlot === -1) return alert('队伍已满！');
      const poolData = characterPool.find(c => c.id === owned.charId);
      const battleChar = new BattleCharacter(poolData, owned, emptySlot);
      BattleSystem.playerTeam[emptySlot] = battleChar;
      alert(`${poolData.name} 已加入阵型！`);
    }

    function selectPosition(pos) {
      // 已通过 onclick 直接绑定
    }

    function startBattle() {
      if (BattleSystem.playerTeam.filter(Boolean).length !== 4) {
        return alert('必须组成完整的 4 人队伍！');
      }
      hideTeamSelection();
      document.getElementById('battleModal').classList.remove('hidden');
      BattleSystem.energy = 4;
      BattleSystem.log = [];
      BattleSystem.turn = 1;
      BattleSystem.addLog('⚔️ 战斗开始！玩家先手');
      BattleSystem.renderBattleUI();
    }

    function endBattle(win = true) {
      document.getElementById('battleModal').classList.add('hidden');
      BattleSystem.playerTeam = new Array(4).fill(null);
      if (win) alert('🎉 恭喜胜利！');
      else alert('💀 战斗失败，下次再来！');
    }

    function openBattleCharacterPanel(posIndex) {
      const char = BattleSystem.playerTeam[posIndex];
      if (!char || char.isDead) return;
      BattleSystem.actingChar = { char, posIndex };
      // 填充面板
      document.getElementById('battleCharName').textContent = char.name;
      document.getElementById('battleCharIllust').src = characterPool.find(c => c.id === char.charId).image;
      const stats = char.getCombatStats();
      document.getElementById('battleCharLevel').textContent = char.level;
      document.getElementById('battleCharStars').innerHTML = '★'.repeat(char.stars);
      document.getElementById('battleCharATK').textContent = stats.atk;
      document.getElementById('battleCharHP').textContent = `${char.currentHP}/${char.getMaxHP()}`;
      document.getElementById('battleCharDEF').textContent = stats.def;
      document.getElementById('battleCharCrit').textContent = '5%';
      // 技能按钮
      document.getElementById('normalBtn').innerHTML = `普攻 <span class="text-xs text-gray-400 ml-auto">${char.skills[0].desc}</span>`;
      document.getElementById('skill1Btn').innerHTML = `${char.skills[1].name} <span class="text-xs text-gray-400 ml-auto">消耗 ${char.skills[1].cost} 能量</span>`;
      document.getElementById('skill2Btn').classList.add('hidden');
      document.getElementById('battleCharModal').classList.remove('hidden');
    }

    function hideBattleCharModal() {
      document.getElementById('battleCharModal').classList.add('hidden');
      BattleSystem.actingChar = null;
    }

    function performAction(type) {
      if (!BattleSystem.actingChar) return;
      const { char, posIndex } = BattleSystem.actingChar;
      if (type === 'normal') {
        const targetIndex = Math.floor(Math.random() * 2);
        BattleSystem.executeSkill(char, 0, targetIndex);
      } else if (type === 'skill1') {
        const targetIndex = Math.floor(Math.random() * 2);
        BattleSystem.executeSkill(char, 1, targetIndex);
      }
      hideBattleCharModal();
      BattleSystem.renderBattleUI();
    }

    function selectTarget(enemyIndex) {
      if (!BattleSystem.actingChar) return;
      const { char } = BattleSystem.actingChar;
      BattleSystem.executeSkill(char, 1, enemyIndex);
      hideBattleCharModal();
    }

    function endPlayerTurn() {
      // 检查是否所有角色都已行动（简化：直接进入敌人回合）
      BattleSystem.enemyTurn();
      BattleSystem.turn++;
      BattleSystem.energy = Math.min(BattleSystem.energy + 2, BattleSystem.maxEnergy);
      BattleSystem.renderBattleUI();
      // 重置行动状态
      BattleSystem.playerTeam.forEach(c => { if (c) c.hasActed = false; });
    }

    // ====================== 初始化 ======================
    window.onload = () => {
      loadGame();
      switchTab(0);
      console.log('%c✅ 完整游戏代码已加载！战斗系统 + 所有原有功能 100% 保留', 'color:#22c55e;font-size:16px;font-weight:bold');
    };
  </script>
