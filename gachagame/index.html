<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>抽卡养成大冒险</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-20">

<!-- 顶部资源栏 -->
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between border-b border-zinc-800">
    <div class="flex items-center gap-4">
    <!-- 初始化按钮 -->
    <button onclick="resetGame()" 
            class="px-5 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-bold rounded-2xl flex items-center gap-2 transition btn-hover">
      <i class="fas fa-sync-alt"></i>
      初始化网页
    </button>
      
    <div class="flex items-center gap-8">
      <div class="flex items-center gap-2">
        <span class="text-3xl">⭐</span>
        <span id="yaoXing" class="text-3xl font-bold text-yellow-400">1000</span>
        <span class="text-xl font-medium">耀星</span>
      </div>
      <div class="flex items-center gap-2">
        <i class="fas fa-coins text-3xl text-yellow-500"></i>
        <span id="gold" class="text-3xl font-bold text-yellow-400">0</span>
        <span class="text-xl font-medium">金币</span>
      </div>
      <div class="flex items-center gap-2">
        <i class="fas fa-gem text-3xl text-purple-400"></i>
        <span id="reinforceStone" class="text-3xl font-bold text-purple-400">0</span>
        <span class="text-xl font-medium">强化石</span>
      </div>
    </div>
    <button onclick="openConsolePrompt()" class="px-6 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center gap-2 text-sm">
      <i class="fas fa-terminal"></i> 控制台
    </button>
  </div>

<!-- 导航栏 -->
  <div class="max-w-7xl mx-auto px-4 pt-6">
    <div class="flex justify-center gap-2 mt-6 border-b border-zinc-800 pb-4">
      <button onclick="switchTab(0)" id="tab0" class="tab-btn active px-8 py-3 rounded-3xl flex items-center gap-2 text-xl font-bold">🧙 抽卡</button>
      <button onclick="switchTab(1)" id="tab1" class="tab-btn px-8 py-3 rounded-3xl flex items-center gap-2 text-xl font-bold">🏠 养成</button>
      <button onclick="switchTab(2)" id="tab2" class="tab-btn px-8 py-3 rounded-3xl flex items-center gap-2 text-xl font-bold">🔍 探索</button>
      <button onclick="switchTab(3)" id="tab3" class="tab-btn px-8 py-3 rounded-3xl flex items-center gap-2 text-xl font-bold">📖 图鉴</button>
      <button onclick="switchTab(4)" id="tab4" class="tab-btn px-8 py-3 rounded-3xl flex items-center gap-2 text-xl font-bold">🏪 经营</button>
    </div>
  </div>

  <!-- Panel 0: 抽卡 -->
  <div id="panel0" class="panel max-w-7xl mx-auto px-4">
    <div class="flex justify-between items-center mt-8 mb-6">
      <div class="flex gap-6">
        <button onclick="setDrawPool('char')" id="poolCharBtn" class="active px-8 py-3 bg-zinc-900 hover:bg-zinc-800 rounded-3xl font-bold text-lg flex items-center gap-3">🧙 角色池</button>
        <button onclick="setDrawPool('weapon')" id="poolWeaponBtn" class="px-8 py-3 bg-zinc-900 hover:bg-zinc-800 rounded-3xl font-bold text-lg flex items-center gap-3">⚔️ 武器池</button>
      </div>
      <div class="text-right">
        <div id="poolTitle" class="text-3xl font-bold">角色池抽取</div>
        <div class="text-sm text-emerald-400">概率：R 60% • SR 25% • SSR 12% • UR 3%</div>
        <div class="text-xs text-amber-400 mt-1">保底：10抽必出SSR，80抽必出UR</div>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-6 max-w-md mx-auto">
          <button onclick="drawCard(1)" class="bg-gradient-to-br from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 py-8 rounded-3xl text-2xl font-bold flex flex-col items-center gap-2 transition btn-hover">
            单抽<br><span class="text-4xl">100 ⭐</span>
          </button>
          <button onclick="drawCard(10)" class="bg-gradient-to-br from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 py-8 rounded-3xl text-2xl font-bold flex flex-col items-center gap-2 transition btn-hover">
            十连<br><span class="text-4xl">900 ⭐</span>
          </button>
        </div>
      </div>

    <div class="mt-8 text-center">
      <button onclick="showRecordModal()" class="px-8 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-3xl text-lg flex items-center gap-3 mx-auto">
        📜 记录查询
      </button>
    </div>
  </div>

  <!-- Panel 1: 养成 -->
  <div id="panel1" class="panel hidden max-w-7xl mx-auto px-4">
    <div class="flex justify-between items-center mt-8 mb-6">
      <div class="flex gap-6">
        <button onclick="setInventoryTab(0)" class="inv-tab active px-8 py-3 bg-zinc-900 hover:bg-zinc-800 rounded-3xl font-bold text-lg">🧙 角色仓库</button>
        <button onclick="setInventoryTab(1)" class="inv-tab px-8 py-3 bg-zinc-900 hover:bg-zinc-800 rounded-3xl font-bold text-lg">⚔️ 武器仓库</button>
      </div>
      
      <div class="flex items-center gap-4">
        <select onchange="currentSort=this.value;renderInventory()" class="bg-zinc-900 px-6 py-3 rounded-3xl text-lg">
          <option value="rarity">排序：稀有度优先</option>
          <option value="stars">排序：星级优先</option>
          <option value="level">排序：等级优先</option>
        </select>
        <button onclick="toggleDecomposeMode()" id="decomposeBtn" class="px-8 py-3 bg-red-600 hover:bg-red-500 rounded-3xl font-bold flex items-center gap-2">
          <i class="fas fa-recycle"></i> 分解
        </button>
      </div>
    </div>

    <div id="inventory" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6"></div>

<!-- 分解栏 -->
    <div id="decomposeBar" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 bg-zinc-900 border border-red-500 rounded-3xl px-8 py-5 flex items-center gap-8 shadow-2xl z-50">
      <div class="flex items-center gap-6">
        <span id="selectedCount" class="text-xl font-bold">已选 0 个</span>
        <span id="decomposeValue" class="text-xl font-bold text-emerald-400">预计获得 0 钻石</span>
      </div>
      
      <select id="decomposeType" class="bg-zinc-800 px-4 py-3 rounded-3xl text-base">
        <option value="all">全部分解</option>
        <option value="r">仅R级及以下</option>
        <option value="sr">仅SR级及以下</option>
      </select>

      <div class="flex gap-4">
        <button onclick="selectAll()" class="px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-3xl text-sm">全选（最多500个）</button>
        <button onclick="decomposeSelected()" class="px-8 py-3 bg-red-600 hover:bg-red-500 rounded-3xl font-bold">确认分解</button>
        <button onclick="toggleDecomposeMode()" class="px-6 py-3 bg-zinc-700 hover:bg-zinc-600 rounded-3xl">取消</button>
      </div>
    </div>
  </div>

  <!-- Panel 2: 探索 -->
  <div id="panel2" class="panel hidden max-w-7xl mx-auto px-4">
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6 mt-8" id="explorationGrid"></div>
  </div>

  <!-- 抽卡结果 Modal -->
  <div id="drawModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999]">
    <div class="bg-zinc-900 rounded-3xl max-w-5xl w-full mx-4 p-8">
      <div id="drawTitle" class="text-4xl font-bold text-center mb-8"></div>
      <div id="drawResults" class="flex flex-wrap justify-center gap-6"></div>
      <div class="text-center mt-10">
        <button onclick="hideDrawModal()" class="px-12 py-6 bg-emerald-600 hover:bg-emerald-500 text-2xl font-bold rounded-3xl">返回游戏</button>
      </div>
    </div>
  </div>
  
  <!-- Panel 3: 图鉴 -->
  <div id="panel3" class="panel hidden max-w-7xl mx-auto px-4">
    <div class="flex justify-between items-center mt-8 mb-6">
      <h2 class="text-3xl font-bold">📖 冒险图鉴</h2>
      <div class="flex gap-4">
        <button onclick="setAlbumTab(0)" id="albumTab0" class="album-tab active px-6 py-2 bg-zinc-900 rounded-3xl">🧙 角色图鉴</button>
        <button onclick="setAlbumTab(1)" id="albumTab1" class="album-tab px-6 py-2 bg-zinc-900 rounded-3xl">⚔️ 武器图鉴</button>
      </div>
    </div>
    <div id="albumGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6"></div>
  </div>

<!-- 经营面板 -->
<div id="panel4" class="panel max-w-7xl mx-auto px-4 py-8 hidden">
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <!-- 左侧：我的商店（包含材料仓库） -->
    <div class="lg:col-span-7 bg-zinc-900 rounded-3xl p-8 border-4 border-orange-500">
      <h2 class="text-4xl font-bold mb-6 flex items-center gap-3">
        <i class="fas fa-store"></i> 我的商店
      </h2>
      
      <!-- 商店信息 -->
      <div class="bg-zinc-950 rounded-2xl p-6 mb-8">
        <div class="flex justify-between items-center mb-4">
          <div>
            <span class="text-orange-400">商店等级</span> 
            <span id="shopLevelDisplay" class="text-5xl font-bold text-orange-400">Lv.1</span>
          </div>
          <div class="text-right">
            <div class="text-sm text-gray-400">经营值</div>
            <div class="flex items-center gap-3">
              <div class="flex-1 h-3 bg-zinc-700 rounded-full overflow-hidden">
                <div id="operatingBar" class="h-3 bg-gradient-to-r from-orange-400 to-yellow-400 w-1/3"></div>
              </div>
              <span id="operatingPointsDisplay" class="font-bold">245 / 800</span>
            </div>
          </div>
        </div>
        <div class="text-sm text-gray-400 mb-2">已解锁配方</div>
        <div class="flex gap-3 flex-wrap" id="unlockedRecipes"></div>
      </div>

      <!-- 开始经营按钮 -->
      <button onclick="startOperating()" 
              class="w-full py-6 text-3xl font-bold bg-gradient-to-r from-orange-500 to-yellow-500 hover:from-orange-600 hover:to-yellow-600 rounded-3xl transition btn-hover flex items-center justify-center gap-4 mb-8">
        <i class="fas fa-play-circle text-4xl"></i>
        开始经营
      </button>

      <!-- 新增：材料仓库 -->
      <div>
        <h3 class="text-2xl font-bold mb-4 flex items-center gap-2">
          <i class="fas fa-box"></i> 材料仓库
        </h3>
        <div id="materialsWarehouse" class="bg-zinc-950 rounded-2xl p-6 min-h-[280px]"></div>
      </div>
    </div>

    <!-- 右侧：三大功能 -->
    <div class="lg:col-span-5 space-y-6">
      <button onclick="openPlanting()" 
              class="w-full bg-emerald-600 hover:bg-emerald-700 p-8 rounded-3xl flex flex-col items-center gap-4 transition btn-hover">
        <i class="fas fa-seedling text-6xl"></i>
        <div class="text-3xl font-bold">种植</div>
        <div class="text-emerald-200">获取基础原材料</div>
      </button>
      
      <button onclick="openMerchant()" 
              class="w-full bg-amber-600 hover:bg-amber-700 p-8 rounded-3xl flex flex-col items-center gap-4 transition btn-hover">
        <i class="fas fa-handshake text-6xl"></i>
        <div class="text-3xl font-bold">商人</div>
        <div class="text-amber-200">随机刷新商品购买</div>
      </button>
      
      <button onclick="openDungeon()" 
              class="w-full bg-red-600 hover:bg-red-700 p-8 rounded-3xl flex flex-col items-center gap-4 transition btn-hover">
        <i class="fas fa-dungeon text-6xl"></i>
        <div class="text-3xl font-bold">地牢冒险</div>
        <div class="text-red-200">挑战怪物获取稀有材料</div>
      </button>
    </div>
  </div>
</div>
  
  <!-- 赌博 Modal -->
  <div id="gamblingModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999]">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-4xl mx-4 p-8">
      <div class="flex justify-between items-center mb-6">
        <div class="text-3xl font-bold">🎰 赌博</div>
        <button onclick="hideGambling()" class="text-4xl leading-none">✕</button>
      </div>
      <div class="flex border-b border-zinc-700 mb-6">
        <button onclick="switchGamblingTab(0)" class="gambling-tab active flex-1 py-4 text-xl font-bold">老虎机</button>
        <button onclick="switchGamblingTab(1)" class="gambling-tab flex-1 py-4 text-xl font-bold">21点</button>
      </div>
      <div id="slotPanel">
        <div class="flex gap-2 mb-6">
                <button onclick="selectCurrency(0)" class="currency-btn active flex-1 py-3 rounded-2xl">⭐ 耀星</button>
                <button onclick="selectCurrency(1)" class="currency-btn flex-1 py-3 rounded-2xl">🪙 金币</button>
                <button onclick="selectCurrency(2)" class="currency-btn flex-1 py-3 rounded-2xl">💎 强化石</button>
        </div>
        <div class="text-center text-6xl mb-8" id="slots">💎 🃏 🔥</div>
        <div class="flex justify-center gap-4 mb-6">
          <input id="betAmount" type="number" value="1000" class="bg-zinc-800 text-center w-40 py-4 rounded-3xl text-2xl">
          <span id="betUnit" class="self-center text-xl">耀星</span>
        </div>
        <button onclick="spinSlots()" class="w-full py-6 bg-amber-500 hover:bg-amber-400 text-3xl font-bold rounded-3xl">开始转动</button>
        <div id="gamblingResult" class="mt-6 text-center text-xl min-h-[2.5rem]"></div>
      </div>
      <div id="blackjackPanel" class="hidden">
        <div class="flex justify-between mb-4">
          <div class="text-center">
            <div class="text-xl">庄家 (AI)</div>
            <div id="dealerCards" class="flex gap-2 justify-center my-4"></div>
            <div id="dealerScore" class="text-xl">得分：11 (隐藏一张)</div>
          </div>
          <div class="text-center">
            <div class="text-xl">玩家</div>
            <div id="playerCards" class="flex gap-2 justify-center my-4"></div>
            <div id="playerScore" class="text-xl">得分：0</div>
          </div>
        </div>
        <!-- 【修复】补全缺失的BetInfo -->
        <div id="blackjackBetInfo" class="text-center text-lg mb-4"></div>
        <div class="flex justify-center gap-4">
          <button id="hitBtn" onclick="hitBlackjack()" class="px-10 py-4 bg-emerald-600 hover:bg-emerald-500 rounded-3xl text-xl">摸牌</button>
          <button id="standBtn" onclick="standBlackjack()" class="px-10 py-4 bg-red-600 hover:bg-red-500 rounded-3xl text-xl">停牌</button>
        </div>
        <div id="blackjackResult" class="mt-8 text-center text-2xl"></div>
        <div class="mt-6 flex justify-center">
          <button onclick="startBlackjack()" class="px-8 py-4 bg-amber-500 hover:bg-amber-400 rounded-3xl text-xl">开始新局</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 扫雷 Modal -->
  <div id="minesweeperModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999]">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-3xl mx-4 p-8">
      <div class="flex justify-between mb-6">
        <div class="text-3xl font-bold">💣 扫雷</div>
        <button onclick="hideMinesweeper()" class="text-4xl">✕</button>
      </div>
      <div class="flex gap-4 justify-center mb-6">
        <button onclick="startMinesweeper(8,8,10)" class="px-6 py-3 bg-emerald-600 rounded-3xl">简单</button>
        <button onclick="startMinesweeper(12,12,20)" class="px-6 py-3 bg-amber-600 rounded-3xl">中等</button>
        <button onclick="startMinesweeper(16,16,40)" class="px-6 py-3 bg-red-600 rounded-3xl">困难</button>
      </div>
      <div id="minesweeperBoard" class="grid gap-1 mx-auto mb-8"></div>
      <div class="flex justify-between items-center">
        <div id="mineScore" class="text-2xl font-bold text-emerald-400">0 钻石</div>
        <button onclick="stopMinesweeper()" class="px-8 py-4 bg-zinc-700 hover:bg-zinc-600 rounded-3xl">停止游戏（保存当前收益）</button>
      </div>
    </div>
  </div>

  <!-- 记录查询 Modal -->
  <div id="recordModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999]">
    <div class="bg-zinc-900 rounded-3xl max-w-2xl w-full mx-4 p-8">
      <div class="flex justify-between items-center mb-6">
        <div class="text-3xl font-bold">📊 抽卡记录</div>
        <button onclick="hideRecordModal()" class="text-4xl">✕</button>
      </div>
      <div class="flex border-b border-zinc-700 mb-8">
        <button onclick="setRecordTab(0)" class="record-tab active flex-1 py-3 text-xl font-bold">角色记录</button>
        <button onclick="setRecordTab(1)" class="record-tab flex-1 py-3 text-xl font-bold">武器记录</button>
      </div>
      <div id="recordContent" class="min-h-[320px]"></div>
      <div class="flex gap-4 mt-10">
        <button onclick="exportSave()" class="flex-1 py-4 bg-zinc-700 hover:bg-zinc-600 rounded-3xl">导出存档</button>
        <label class="flex-1 py-4 bg-zinc-700 hover:bg-zinc-600 rounded-3xl text-center cursor-pointer">导入存档<input type="file" id="importFile" accept=".json" onchange="importSave(event)" class="hidden"></label>
      </div>
    </div>
  </div>

  <!-- 开发者控制台 Modal -->
  <div id="consoleModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[99999]">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-2xl mx-4 p-8">
      <div class="flex justify-between mb-6">
        <div class="text-3xl font-bold">⚙️ 开发者控制台</div>
        <button onclick="hideConsole()" class="text-4xl">✕</button>
      </div>
      <div id="consoleLog" class="bg-black text-emerald-400 font-mono h-96 overflow-auto p-4 rounded-2xl mb-6 text-sm"></div>
      <div class="flex gap-3">
        <input id="consoleInput" type="text" class="flex-1 bg-zinc-800 rounded-3xl px-6 py-4 text-xl" placeholder="输入命令...">
        <button onclick="executeConsoleCommand()" class="px-10 bg-emerald-600 rounded-3xl font-bold">执行</button>
      </div>
    </div>
  </div>

  <!-- 角色/武器详情 Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999]">
    <div id="modalInner" class="modal-content bg-gray-900 rounded-3xl max-w-full sm:max-w-4xl w-full mx-4 overflow-hidden border-4">
      <div id="modalContent" class="p-8"></div>
    </div>
  </div>

  <!-- 公告 Modal -->
  <div id="announcementModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100000]">
    <div class="bg-zinc-900 rounded-3xl max-w-lg w-full mx-4 p-10 text-center">
      <div class="text-6xl mb-6">📢</div>
      <h2 class="text-3xl font-bold mb-6">欢迎来到抽卡养成大冒险！</h2>
      <p class="text-xl leading-relaxed text-gray-300">本页面全权由AI代写，目前还在不断完善！</p>
      <button onclick="hideAnnouncement()" class="mt-10 px-12 py-5 bg-emerald-600 hover:bg-emerald-500 rounded-3xl text-xl font-bold">我知道了，进入游戏</button>
    </div>
  </div>

  <script src="js/constants.js"></script>
  <script src="js/player.js"></script>
  <script src="js/draw.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/exploration.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/album.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
